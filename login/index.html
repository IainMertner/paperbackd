<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sign in - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="auth-page">

  <main class="auth-main" id="auth-main" hidden>
    <h1 class="auth-logo">paperbackd<span class="title-dot">.</span></h1>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" data-tab="signin"  role="tab" aria-selected="true">Sign in</button>
      <button class="auth-tab"        data-tab="register" role="tab" aria-selected="false">Create account</button>
    </div>

    <div class="card auth-card">
      <form id="auth-form" novalidate>
        <div class="auth-field">
          <label class="auth-label" id="username-label" for="username">Username or email</label>
          <input class="auth-input" id="username" type="text"
            autocomplete="username" autocapitalize="none" spellcheck="false" required>
          <p class="auth-hint" id="username-hint" hidden>
            3–16 characters. Lowercase letters, numbers, underscores only.
          </p>
        </div>
        <div class="auth-field" id="displayname-field" hidden>
          <label class="auth-label" for="displayname">Display name</label>
          <input class="auth-input" id="displayname" type="text"
            autocomplete="name" maxlength="50" spellcheck="false" style="text-transform:lowercase">
          <p class="auth-hint" style="display:block;margin-top:.3rem">
            The name displayed at the top of your profile.
          </p>
        </div>
        <div class="auth-field" id="email-field" hidden>
          <label class="auth-label" for="email">Email</label>
          <input class="auth-input" id="email" type="email"
            autocomplete="email" autocapitalize="none" spellcheck="false">
          <p class="auth-hint" style="display:block;margin-top:.3rem">
            Used to verify your account. Never shown publicly.
          </p>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" id="password" type="password"
            autocomplete="current-password" required>
          <p class="auth-hint" id="password-hint" hidden>
            At least 6 characters.
          </p>
        </div>
        <div class="auth-error" id="auth-error" hidden></div>
        <button class="auth-submit" id="auth-submit" type="submit">Sign in</button>
        <p id="forgot-password-link" style="margin:.75rem 0 0;text-align:center;font-size:.82rem">
          <button type="button" id="forgot-btn" style="background:none;border:none;padding:0;color:var(--text-muted);cursor:pointer;font:inherit;text-decoration:underline">Forgot password?</button>
        </p>
      </form>
    </div>
  </main>

  <script type="module">
    import { signIn, signUp, resendVerificationEmail, resetPassword, onAuth, logOut, ROOT } from '../js/firebase.js';

    // Show form once we know the user isn't signed in; redirect if they are.
    // Store unsubscribe so we can stop the listener before submitting the form —
    // otherwise it fires mid-signup (after Auth creates the user but before the
    // Firestore writes finish) and navigates away too early.
    const offAuth = onAuth(user => {
      if (user) {
        window.location.replace(ROOT);
      } else {
        document.getElementById('auth-main').hidden = false;
        document.getElementById('username').focus();
      }
    });

    // ── Tab switching ─────────────────────────────────────────────────────────
    let mode = 'signin';
    const tabs             = document.querySelectorAll('.auth-tab');
    const submitBtn        = document.getElementById('auth-submit');
    const passInput        = document.getElementById('password');
    const usernameHint     = document.getElementById('username-hint');
    const passwordHint     = document.getElementById('password-hint');
    const displaynameField = document.getElementById('displayname-field');
    const emailField       = document.getElementById('email-field');

    // Show banner if redirected here because email isn't verified
    const _params = new URLSearchParams(location.search);
    if (_params.get('unverified') === '1') {
      const banner = document.getElementById('auth-error');
      banner.textContent = 'Please verify your email address before signing in.';
      banner.hidden = false;
    }
    if (_params.get('verify_email') === '1') {
      const banner = document.getElementById('auth-error');
      banner.textContent = 'Check your inbox and click the verification link. Once verified, sign in with your username or email.';
      banner.hidden = false;
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        mode = tab.dataset.tab;
        tabs.forEach(t => {
          t.classList.toggle('active', t === tab);
          t.setAttribute('aria-selected', t === tab);
        });
        submitBtn.textContent         = mode === 'signin' ? 'Sign in' : 'Create account';
        passInput.autocomplete        = mode === 'signin' ? 'current-password' : 'new-password';
        usernameHint.hidden           = mode === 'signin';
        passwordHint.hidden           = mode === 'signin';
        displaynameField.hidden       = mode === 'signin';
        emailField.hidden             = mode === 'signin';
        document.getElementById('username-label').textContent = mode === 'signin' ? 'Username or email' : 'Username';
        document.getElementById('forgot-password-link').hidden = mode !== 'signin';
        document.getElementById('auth-error').hidden = true;
      });
    });

    // ── Form submission ───────────────────────────────────────────────────────
    document.getElementById('auth-form').addEventListener('submit', async e => {
      e.preventDefault();
      offAuth(); // prevent the auth listener from redirecting before Firestore writes finish

      const username    = document.getElementById('username').value.trim().toLowerCase();
      const password    = document.getElementById('password').value;
      const displayName = document.getElementById('displayname').value.trim();
      const email       = document.getElementById('email').value.trim();
      const errorEl     = document.getElementById('auth-error');

      if (mode === 'register' && !displayName) {
        errorEl.textContent = 'Please enter a display name.';
        errorEl.hidden = false;
        return;
      }

      errorEl.hidden      = true;
      submitBtn.disabled  = true;
      submitBtn.textContent = mode === 'signin' ? 'Signing in…' : 'Creating account…';

      try {
        if (mode === 'signin') {
          await signIn(username, password);
          window.location.replace(ROOT);
        } else {
          await signUp(username, password, displayName, email);
          await logOut();
          showVerifyScreen(email);
        }
      } catch (err) {
        if (err.code === 'auth/email-not-verified') {
          errorEl.innerHTML = 'Please verify your email before signing in. <button type="button" id="resend-btn" style="background:none;border:none;padding:0;color:var(--accent);cursor:pointer;font:inherit;text-decoration:underline">Resend verification email</button>';
          errorEl.hidden = false;
          document.getElementById('resend-btn').addEventListener('click', async () => {
            const resendBtn = document.getElementById('resend-btn');
            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending…';
            try {
              await resendVerificationEmail(username, password);
              errorEl.textContent = 'Verification email sent. Check your inbox.';
            } catch (e) {
              errorEl.textContent = friendlyError(e);
            }
          });
        } else {
          errorEl.textContent = friendlyError(err);
          errorEl.hidden      = false;
        }
        submitBtn.disabled    = false;
        submitBtn.textContent = mode === 'signin' ? 'Sign in' : 'Create account';
      }
    });

    document.getElementById('forgot-btn').addEventListener('click', () => {
      const usernameVal = document.getElementById('username').value.trim();
      document.querySelector('.auth-card').innerHTML = `
        <p style="margin:0 0 1rem;font-size:.85rem;color:var(--text-muted);line-height:1.5">Enter your username or email and we'll send you a reset link.</p>
        <div class="auth-field">
          <label class="auth-label" for="reset-input">Username or email</label>
          <input class="auth-input" id="reset-input" type="text" autocapitalize="none" spellcheck="false" value="${usernameVal.replace(/"/g, '&quot;')}">
        </div>
        <div class="auth-error" id="reset-error" hidden></div>
        <button type="button" class="auth-submit" id="reset-submit">Send reset link</button>
        <p style="margin:.75rem 0 0;text-align:center;font-size:.82rem">
          <button type="button" id="reset-back" style="background:none;border:none;padding:0;color:var(--text-muted);cursor:pointer;font:inherit;text-decoration:underline">Back to sign in</button>
        </p>
      `;
      document.getElementById('reset-back').addEventListener('click', () => location.replace(location.pathname));
      document.getElementById('reset-submit').addEventListener('click', async () => {
        const val = document.getElementById('reset-input').value.trim();
        const errEl = document.getElementById('reset-error');
        const btn = document.getElementById('reset-submit');
        errEl.hidden = true;
        if (!val) { errEl.textContent = 'Please enter your username or email.'; errEl.hidden = false; return; }
        btn.disabled = true;
        btn.textContent = 'Sending…';
        try {
          await resetPassword(val);
          document.querySelector('.auth-card').innerHTML = `
            <p style="margin:0 0 1rem;line-height:1.5">A reset link has been sent. Check your inbox.</p>
            <button type="button" class="auth-submit" id="reset-done">Back to sign in</button>
          `;
          document.getElementById('reset-done').addEventListener('click', () => location.replace(location.pathname));
        } catch (e) {
          errEl.textContent = e.message || 'Something went wrong.';
          errEl.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Send reset link';
        }
      });
    });

    function showVerifyScreen(email) {
      const safe = email.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      document.querySelector('.auth-card').innerHTML = `
        <p style="margin:0 0 1rem;line-height:1.5">We've sent a verification link to <strong>${safe}</strong>. Click the link in that email, then come back here to sign in.</p>
        <p style="margin:0 0 1.5rem;font-size:.85rem;color:var(--text-muted);line-height:1.5">Don't see it? Check your spam folder.</p>
        <button type="button" class="auth-submit" id="back-to-signin">Back to sign in</button>
      `;
      document.getElementById('back-to-signin').addEventListener('click', () => location.replace(location.pathname));
    }

    function friendlyError(err) {
      const code = err.code || '';
      if (code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) {
        return 'Invalid username or password.';
      }
      if (code.includes('email-already-in-use')) return 'An account with that email already exists.';
      if (code.includes('invalid-email'))        return 'Please enter a valid email address.';
      if (code.includes('weak-password'))        return 'Password must be at least 6 characters.';
      if (code.includes('too-many-requests'))    return 'Too many attempts. Please try again later.';
      return err.message || 'Something went wrong. Please try again.';
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
