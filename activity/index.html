<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>activity - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title" id="page-title">activity<span class="title-dot">.</span></h1>
    <div id="feed-container"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getFeed, getBookByGbid } from '../js/firebase.js';

    (async () => {
    const { user, profile: myProfile } = await requireAuth();
    const params  = new URLSearchParams(location.search);
    const targetU = params.get('u')?.toLowerCase();
    const main    = document.getElementById('feed-container');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function toAuthorSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function dayLabel(ts) {
      if (!ts?.seconds) return null;
      const d   = new Date(ts.seconds * 1000);
      const now = new Date();
      const today    = new Date(now.getFullYear(),  now.getMonth(),  now.getDate());
      const eventDay = new Date(d.getFullYear(),    d.getMonth(),    d.getDate());
      const diffDays = Math.round((today - eventDay) / 86400000);
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      const opts = d.getFullYear() === now.getFullYear()
        ? { day: 'numeric', month: 'long' }
        : { day: 'numeric', month: 'long', year: 'numeric' };
      return d.toLocaleDateString('en-GB', opts);
    }

    function showReviewModal(reviewText, bookTitle, username, rating) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', () => overlay.remove());
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.15rem;padding-right:1.5rem';
      title.textContent = bookTitle;
      const byline = document.createElement('div');
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.75rem';
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem';
      byline.textContent = `${username}'s review`;
      const starsRow = document.createElement('div');
      starsRow.style.cssText = 'margin-bottom:.75rem';
      starsRow.innerHTML = rating ? renderStars(rating) : '';
      const body = document.createElement('div');
      body.style.cssText = 'font-size:.9rem;line-height:1.6;white-space:pre-wrap';
      body.textContent = reviewText;
      modal.append(closeBtn, title, byline, starsRow, body);
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function aggregateFollows(events) {
      const out = [];
      const byDay = {};
      for (const e of events) {
        if (e.type !== 'followed') { out.push(e); continue; }
        const day = dayLabel(e.timestamp) || '';
        if (byDay[day]) {
          byDay[day].targets.push(e.targetUsername);
        } else {
          const agg = { ...e, targets: [e.targetUsername] };
          byDay[day] = agg;
          out.push(agg);
        }
      }
      return out;
    }

    function renderEvent(event, avatarUrl, borderColor) {
      const card = document.createElement('div');
      card.className = 'card';
      const initial = (event.username?.[0] || '?').toUpperCase();
      const avatarContent = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="">`
        : esc(initial);
      const borderStyle = borderColor ? `border-color:${borderColor};` : '';
      const bookLink = event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const followTargets = (event.targets || [event.targetUsername]).map(
        u => `<a href="../profile/?u=${esc(u)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(u)}</a>`
      );
      const followPhrase = followTargets.length === 1
        ? followTargets[0]
        : followTargets.length === 2
          ? `${followTargets[0]} and ${followTargets[1]}`
          : `${followTargets.slice(0, -1).join(', ')}, and ${followTargets[followTargets.length - 1]}`;
      const action = event.type === 'started'
        ? `started reading ${bookLink}`
        : event.type === 'followed'
          ? `started following ${followPhrase}`
          : `finished ${bookLink}`;
      const author = (event.type === 'followed' || !event.bookAuthor) ? '' : event.bookAuthor
        ? `<span style="color:var(--text-muted)"> by <a href="../author/?slug=${toAuthorSlug(event.bookAuthor)}" style="color:inherit;text-decoration:none">${esc(event.bookAuthor)}</a></span>`
        : '';
      const reviewBtn = event.hasReview && event.gbid
        ? `<button class="review-btn" style="font-size:.75rem;color:var(--accent);background:none;border:none;padding:0;cursor:pointer;font-family:inherit">Read review</button>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${reviewBtn}</div>`
        : '';
      const coverThumb = event.coverUrl && event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:block"><img src="${esc(event.coverUrl)}" alt="" style="width:22px;border-radius:2px;display:block;box-shadow:0 1px 4px rgba(0,0,0,.4)"></a>`
        : '';
      const pct = event._totalPages ? Math.round((event._currentPage / event._totalPages) * 100) : 0;
      const progressRow = (event.type === 'started' && event._totalPages)
        ? `<div style="margin-top:.3rem;display:flex;align-items:center;gap:.5rem"><div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">Page ${event._currentPage} of ${event._totalPages} · ${pct}%</div><div style="height:3px;background:var(--bg-alt);border-radius:2px;overflow:hidden;width:60px;flex-shrink:0"><div style="height:100%;background:var(--accent);width:${pct}%"></div></div></div>`
        : '';
      card.innerHTML = `<div class="friend-item">
        <div style="position:relative;flex-shrink:0;width:36px;height:36px">
          <a class="friend-avatar" href="../profile/?u=${esc(event.username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
          ${coverThumb}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4"><a href="../profile/?u=${esc(event.username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(event.username)}</a> ${action}${author}</div>
          ${progressRow}${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;
      const btn = card.querySelector('.review-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.textContent = 'Loading…';
          btn.disabled = true;
          try {
            const book = await getBookByGbid(event.uid, event.gbid);
            if (book?.review) showReviewModal(book.review, event.bookTitle, event.username, event.rating);
          } finally {
            btn.textContent = 'Read review';
            btn.disabled = false;
          }
        });
      }
      return card;
    }

    try {
      if (!targetU) {
        main.innerHTML = '<p style="color:var(--text-muted)">No user specified.</p>';
        document.body.classList.remove('auth-loading');
        return;
      }

      const target = await getProfileByUsername(targetU);
      if (!target) {
        main.innerHTML = '<p style="color:var(--text-muted)">User not found.</p>';
        document.body.classList.remove('auth-loading');
        return;
      }

      document.title = `activity - paperbackd`;
      if (targetU !== myProfile.username?.toLowerCase()) {
        document.getElementById('page-title').innerHTML = `<a href="../profile/?u=${encodeURIComponent(target.username)}" style="color:var(--accent);text-decoration:none">${esc(target.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>activity<span class="title-dot">.</span>`;
      }


      const avatarUrl   = target.avatarUrl || null;
      const borderColor = target.avatarBorderColor || null;

      const { events: raw } = await getFeed(target.uid, []);
      const feed = aggregateFollows(raw.filter(e => e.uid === target.uid));

      // Backfill coverUrl and progress data
      const needsFetch = feed.filter(e => e.gbid);
      if (needsFetch.length) {
        await Promise.all(needsFetch.map(async e => {
          const book = await getBookByGbid(e.uid, e.gbid);
          if (!book) return;
          if (book.coverUrl) e.coverUrl = book.coverUrl;
          if (e.type === 'started' && book.status === 'reading' && book.totalPages) {
            e._currentPage = book.currentPage || 0;
            e._totalPages  = book.totalPages;
          }
        }));
      }

      if (!feed.length) {
        main.innerHTML = '<p style="color:var(--text-muted);font-size:.9rem">No activity yet.</p>';
      } else {
        let lastDay = null;
        feed.forEach(e => {
          const label = dayLabel(e.timestamp);
          if (label !== lastDay) {
            lastDay = label;
            const div = document.createElement('div');
            div.className = 'feed-day-divider';
            div.textContent = label || '';
            main.appendChild(div);
          }
          main.appendChild(renderEvent(e, avatarUrl, borderColor));
        });
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
    })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
