  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="ink-edge" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="brush-line" x="-1%" y="-600%" width="102%" height="1300%">
        <feMorphology operator="dilate" radius="0 0.5" result="thick"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.45" numOctaves="4" seed="8" result="noise"/>
        <feDisplacementMap in="thick" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="bg-halo" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
        <feMorphology operator="dilate" radius="1" in="SourceGraphic" result="dilated"/>
        <feFlood style="flood-color:var(--bg-card)" result="color"/>
        <feComposite in="color" in2="dilated" operator="in" result="halo"/>
        <feMerge>
          <feMergeNode in="halo"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <style>
    .card {
      position: relative;
      isolation: isolate;
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      filter: url(#ink-edge);
      z-index: -1;

    .card--finished::before {
      border: 1px solid var(--border);
    }
    .card--five-star::before {
      border: 1px solid #F2BA00;
      box-shadow: var(--shadow);
    }
    .feed-day-divider {
      font-family: 'Arvo', serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: .7rem;
    }
    .feed-day-divider::after {
      height: 1px;
      filter: url(#brush-line);
      overflow: visible;
    }
  </style>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getProfile, getFeed, getBookByGbid, removeActivityEvent, toggleReaction } from '../js/firebase.js';

    (async () => {
    const { user, profile: myProfile } = await requireAuth();
    const params  = new URLSearchParams(location.search);
    const targetU = params.get('u')?.toLowerCase();
    const main    = document.getElementById('feed-container');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function toAuthorSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function dayLabel(ts) {
      if (!ts?.seconds) return null;
      const d   = new Date(ts.seconds * 1000);
      const now = new Date();
      const today    = new Date(now.getFullYear(),  now.getMonth(),  now.getDate());
      const eventDay = new Date(d.getFullYear(),    d.getMonth(),    d.getDate());
      const diffDays = Math.round((today - eventDay) / 86400000);
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      const opts = d.getFullYear() === now.getFullYear()
        ? { day: 'numeric', month: 'long' }
        : { day: 'numeric', month: 'long', year: 'numeric' };
      return d.toLocaleDateString('en-GB', opts);
    }

    let avatarMap = {};
    let usernameMap = {};

    const REACTIONS = [
      { key: 'heart',        svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.593C6.37 16.054 1 11.296 1 7.191 1 3.4 4.068 2 6.281 2c1.312 0 4.151.501 5.719 4.457C13.59 2.489 16.464 2 17.726 2 20.266 2 23 3.621 23 7.181c0 4.069-5.136 8.625-11 14.412z"/></svg>` },
      { key: 'broken_heart', svg: `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21.593C6.37 16.054 1 11.296 1 7.191 1 3.4 4.068 2 6.281 2c1.312 0 4.151.501 5.719 4.457C13.59 2.489 16.464 2 17.726 2 20.266 2 23 3.621 23 7.181c0 4.069-5.136 8.625-11 14.412z"/><polyline points="12,6 10,10 13.5,12.5 10,17"/></svg>` },
      { key: 'shocked',      svg: `<svg viewBox="0 0 36 36" width="15" height="15" fill="none" stroke="currentColor" stroke-width="3.5"><circle cx="18" cy="18" r="15.5"/><ellipse cx="12" cy="13.5" rx="2.5" ry="3.5" fill="currentColor" stroke="none"/><ellipse cx="24" cy="13.5" rx="2.5" ry="3.5" fill="currentColor" stroke="none"/><ellipse cx="18" cy="25" rx="4" ry="5" fill="currentColor" stroke="none"/></svg>` },
      { key: 'laugh_cry',    svg: `<svg viewBox="0 0 512 512" width="15" height="15" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M256,0C114.618,0,0,114.618,0,256s114.618,256,256,256s256-114.618,256-256S397.382,0,256,0z M256,469.333c-117.818,0-213.333-95.515-213.333-213.333S138.182,42.667,256,42.667S469.333,138.182,469.333,256S373.818,469.333,256,469.333z"/><path d="M384,298.667H128c-11.782,0-21.333,9.551-21.333,21.333c0,77.189,65.715,128,149.333,128s149.333-50.811,149.333-128C405.333,308.218,395.782,298.667,384,298.667z M256,405.333c-52.965,0-93.164-25.064-103.851-64h207.701C349.164,380.269,308.965,405.333,256,405.333z"/><path d="M134.248,249.752c8.331,8.331,21.839,8.331,30.17,0l42.667-42.667c8.331-8.331,8.331-21.839,0-30.17l-42.667-42.667c-8.331-8.331-21.839-8.331-30.17,0s-8.331,21.839,0,30.17L161.83,192l-27.582,27.582C125.917,227.913,125.917,241.42,134.248,249.752z"/><path d="M347.582,249.752c8.331,8.331,21.839,8.331,30.17,0c8.331-8.331,8.331-21.839,0-30.17L350.17,192l27.582-27.582c8.331-8.331,8.331-21.839,0-30.17c-8.331-8.331-21.839-8.331-30.17,0l-42.667,42.667c-8.331,8.331-8.331,21.839,0,30.17L347.582,249.752z"/></svg>` },
    ];
    let openPickerClose = null;
    document.addEventListener('click', () => {
      if (openPickerClose) { openPickerClose(); openPickerClose = null; }
    });

    function buildReactionsBar(event) {
      const state = {};
      REACTIONS.forEach(({ key }) => { state[key] = [...((event.reactions || {})[key] || [])]; });

      const bar = document.createElement('div');
      bar.style.cssText = 'position:absolute;bottom:.35rem;right:.5rem;display:flex;align-items:center;gap:0';

      const wrap = document.createElement('span');
      wrap.style.cssText = 'position:relative;display:inline-flex;align-items:center;gap:.15rem';

      const totalBadge = document.createElement('span');
      totalBadge.style.cssText = 'font-size:.65rem;font-weight:600;color:var(--text-muted);opacity:.55;font-variant-numeric:tabular-nums;display:none;line-height:1';

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.style.cssText = 'position:relative;display:inline-flex;align-items:center;justify-content:center;width:1.5rem;height:1.5rem;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text-muted);opacity:.55;padding:0;flex-shrink:0';
      addBtn.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6.5"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>';

      const picker = document.createElement('div');
      picker.style.cssText = 'display:none;position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.3rem .5rem;gap:.3rem;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:1000;white-space:nowrap';

      let pickerOpen = false;
      const closePicker = () => {
        pickerOpen = false;
        picker.style.display = 'none';
        if (picker.parentNode === document.body) document.body.removeChild(picker);
      };

      function updateTotal() {
        const total = Object.values(state).reduce((sum, arr) => sum + arr.length, 0);
        totalBadge.textContent = total || '';
        totalBadge.style.display = total > 0 ? 'inline' : 'none';
      }

      function renderInline() {
        [...bar.children].forEach(ch => { if (ch !== wrap) ch.remove(); });
        const active = REACTIONS.filter(({ key }) => state[key].length > 0);
        active.forEach(({ key, svg }, i) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = `position:relative;z-index:${i};display:inline-flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;padding:0;color:var(--accent);flex-shrink:0;filter:url(#bg-halo);${i > 0 ? 'margin-left:-3px;' : ''}`;
          btn.innerHTML = svg;
          btn.addEventListener('click', async e => {
            e.stopPropagation();
            const prevKey = REACTIONS.find(r => state[r.key].includes(user.uid))?.key;
            const toggling = prevKey === key;
            const promises = [];
            if (prevKey && !toggling) {
              state[prevKey] = state[prevKey].filter(u => u !== user.uid);
              promises.push(toggleReaction(event.id, prevKey, user.uid, false));
            }
            if (toggling) {
              state[key] = state[key].filter(u => u !== user.uid);
              promises.push(toggleReaction(event.id, key, user.uid, false));
            } else {
              state[key] = [...state[key], user.uid];
              promises.push(toggleReaction(event.id, key, user.uid, true));
            }
            renderInline();
            updateTotal();
            renderPicker();
            Promise.all(promises).catch(console.error);
          });
          bar.insertBefore(btn, wrap);
        });
        wrap.style.marginLeft = active.length > 0 ? '.35rem' : '0';
      }

      function renderPicker() {
        picker.innerHTML = '';
        picker.style.flexDirection = 'column';
        picker.style.alignItems = 'stretch';

        const emojiRow = document.createElement('div');
        emojiRow.style.cssText = 'display:flex;gap:.3rem';

        REACTIONS.forEach(({ key, svg }) => {
          const users = state[key];
          const mine = users.includes(user.uid);
          const eb = document.createElement('button');
          eb.type = 'button';
          eb.style.cssText = `position:relative;background:${mine ? 'var(--bg-alt)' : 'none'};border:none;cursor:pointer;padding:.3rem .35rem .45rem;border-radius:6px;line-height:1;display:inline-flex;align-items:center;justify-content:center;color:var(--accent)`;
          eb.innerHTML = svg;
          if (users.length) {
            const badge = document.createElement('span');
            badge.style.cssText = 'position:absolute;bottom:3px;right:3px;font-size:.48rem;font-weight:700;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums';
            badge.textContent = users.length;
            eb.appendChild(badge);
          }
          eb.addEventListener('click', async e => {
            e.stopPropagation();
            const prevKey = REACTIONS.find(r => state[r.key].includes(user.uid))?.key;
            const toggling = prevKey === key;
            const promises = [];
            if (prevKey && !toggling) {
              state[prevKey] = state[prevKey].filter(u => u !== user.uid);
              promises.push(toggleReaction(event.id, prevKey, user.uid, false));
            }
            if (toggling) {
              state[key] = state[key].filter(u => u !== user.uid);
              promises.push(toggleReaction(event.id, key, user.uid, false));
            } else {
              state[key] = [...state[key], user.uid];
              promises.push(toggleReaction(event.id, key, user.uid, true));
            }
            renderInline();
            updateTotal();
            renderPicker();
            Promise.all(promises).catch(console.error);
          });
          emojiRow.appendChild(eb);
        });
        picker.appendChild(emojiRow);

        const total = Object.values(state).reduce((sum, arr) => sum + arr.length, 0);
        if (total > 0) {
          const listEl = document.createElement('div');
          listEl.style.cssText = 'display:flex;flex-direction:column;gap:.25rem;padding-top:.3rem;margin-top:.3rem;border-top:1px solid var(--border)';
          REACTIONS.forEach(({ key, svg }) => {
            state[key].forEach(uid => {
              const username = usernameMap[uid] || uid;
              const avatarUrl = avatarMap[uid];
              const initial = (username?.[0] || '?').toUpperCase();
              const row = document.createElement('div');
              row.style.cssText = 'display:flex;align-items:center;gap:.35rem;font-size:.7rem;color:var(--text)';
              const av = document.createElement('a');
              av.href = `../profile/?u=${esc(username)}`;
              av.className = 'friend-avatar';
              av.style.cssText = 'width:16px;height:16px;font-size:.45rem;flex-shrink:0;text-decoration:none;color:inherit';
              av.innerHTML = avatarUrl ? `<img src="${esc(avatarUrl)}" alt="" loading="lazy">` : esc(initial);
              const name = document.createElement('a');
              name.href = `../profile/?u=${esc(username)}`;
              name.style.cssText = 'color:inherit;text-decoration:none;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
              name.textContent = username;
              const icon = document.createElement('span');
              icon.innerHTML = svg;
              icon.style.cssText = 'color:var(--accent);display:flex;align-items:center;flex-shrink:0';
              row.append(av, name, icon);
              listEl.appendChild(row);
            });
          });
          picker.appendChild(listEl);
        }
      }

      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (openPickerClose && openPickerClose !== closePicker) openPickerClose();
        pickerOpen = !pickerOpen;
        if (pickerOpen) {
          const rect = addBtn.getBoundingClientRect();
          picker.style.top = `${rect.bottom + 6}px`;
          picker.style.right = `${window.innerWidth - rect.right}px`;
          picker.style.display = 'flex';
          document.body.appendChild(picker);
          openPickerClose = closePicker;
        } else {
          closePicker();
          openPickerClose = null;
        }
      });
      picker.addEventListener('click', e => e.stopPropagation());
      wrap.append(totalBadge, addBtn);
      bar.appendChild(wrap);

      renderPicker();
      renderInline();
      updateTotal();
      return bar;
    }

    function showReviewModal(reviewText, bookTitle, username, rating) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', () => overlay.remove());
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.15rem;padding-right:1.5rem';
      title.textContent = bookTitle;
      const byline = document.createElement('div');
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem';
      byline.textContent = `${username}'s review`;
      const starsRow = document.createElement('div');
      starsRow.style.cssText = 'margin-bottom:.75rem';
      starsRow.innerHTML = rating ? renderStars(rating) : '';
      const body = document.createElement('div');
      body.style.cssText = 'font-size:.9rem;line-height:1.6;white-space:pre-wrap';
      body.textContent = reviewText;
      modal.append(closeBtn, title, byline, starsRow, body);
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function aggregateFollows(events) {
      const out = [];
      const byDay = {};
      for (const e of events) {
        if (e.type !== 'followed') { out.push(e); continue; }
        const day = dayLabel(e.timestamp) || '';
        if (byDay[day]) {
          byDay[day].targets.push(e.targetUsername);
        } else {
          const agg = { ...e, targets: [e.targetUsername] };
          byDay[day] = agg;
          out.push(agg);
        }
      }
      return out;
    }

    function renderEvent(event, targetAvatarUrl, borderColor) {
      const isFollowed = event.type === 'followed';
      const initial    = (event.username?.[0] || '?').toUpperCase();
      const avatarContent = targetAvatarUrl
        ? `<img src="${esc(targetAvatarUrl)}" alt="" loading="lazy">`
        : esc(initial);
      const borderStyle = borderColor ? `border-color:${borderColor};` : '';

      if (isFollowed) {
        const followTargets = (event.targets || [event.targetUsername]).map(
          u => `<a href="../profile/?u=${esc(u)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(u)}</a>`
        );
        const followPhrase = followTargets.length === 1 ? followTargets[0]
          : followTargets.length === 2 ? `${followTargets[0]} and ${followTargets[1]}`
          : `${followTargets.slice(0, -1).join(', ')}, and ${followTargets[followTargets.length - 1]}`;
        const row = document.createElement('div');
        row.style.cssText = 'padding:.4rem 1rem;';
        row.innerHTML = `<div style="display:flex;align-items:center;gap:.55rem;font-size:.8rem;color:var(--text-muted);line-height:1.5"><div style="width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center"><a class="friend-avatar" href="../profile/?u=${esc(event.username)}" style="width:26px;height:26px;font-size:.65rem;text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a></div><span><a href="../profile/?u=${esc(event.username)}" style="color:inherit;text-decoration:none;font-weight:500">${esc(event.username)}</a> followed ${followPhrase} <span style="opacity:.6">· ${timeAgo(event.timestamp)}</span></span></div>`;
        return row;
      }

      const card = document.createElement('div');
      card.className = 'card';

      const bookLink = event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const action = event.type === 'started' ? `started reading ${bookLink}` : `finished ${bookLink}`;
      const author = event.bookAuthor
        ? `<span style="color:var(--text-muted)"> by <a href="../author/?slug=${toAuthorSlug(event.bookAuthor)}" style="color:inherit;text-decoration:none">${esc(event.bookAuthor)}</a></span>`
        : '';
      const reviewBtn = event.hasReview && event.gbid
        ? `<button class="review-btn" style="font-size:.75rem;color:var(--accent);background:none;border:none;padding:0;cursor:pointer;font-family:inherit">Read review</button>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${reviewBtn}</div>`
        : '';
      const coverThumb = event.coverUrl && event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:block"><img src="${esc(event.coverUrl)}" alt="" style="width:22px;border-radius:2px;display:block;box-shadow:0 1px 4px rgba(0,0,0,.4)"></a>`
        : '';
      const pct = event._totalPages ? Math.round((event._currentPage / event._totalPages) * 100) : 0;
      const progressRow = (event.type === 'started' && event._totalPages)
        ? `<div style="margin-top:.3rem;display:flex;align-items:center;gap:.5rem"><div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">Page ${event._currentPage} of ${event._totalPages} · ${pct}%</div><div style="height:3px;background:var(--bg-alt);border-radius:2px;overflow:hidden;width:60px;flex-shrink:0"><div style="height:100%;background:#F2BA00;width:${pct}%"></div></div></div>`
        : '';

      card.innerHTML = `<div class="friend-item">
        <div style="position:relative;flex-shrink:0;width:36px;height:36px">
          <a class="friend-avatar" href="../profile/?u=${esc(event.username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
          ${coverThumb}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4"><a href="../profile/?u=${esc(event.username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(event.username)}</a> ${action}${author}</div>
          ${progressRow}${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;

      const btn = card.querySelector('.review-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.textContent = 'Loading…';
          btn.disabled = true;
          try {
            const book = await getBookByGbid(event.uid, event.gbid);
            if (book?.review) showReviewModal(book.review, event.bookTitle, event.username, event.rating);
          } finally {
            btn.textContent = 'Read review';
            btn.disabled = false;
          }
        });
      }

      if (event.type === 'finished') {
        card.classList.add('card--finished');
        if (event.rating === 5) card.classList.add('card--five-star');
      }

      if (event.uid !== user.uid) {
        card.style.position = 'relative';
        card.appendChild(buildReactionsBar(event));
      }

      return card;
    }

    try {
      if (!targetU) {
        main.innerHTML = '<p style="color:var(--text-muted)">No user specified.</p>';
        document.body.classList.remove('auth-loading');
        return;
      }

      const target = await getProfileByUsername(targetU);
      if (!target) {
        main.innerHTML = '<p style="color:var(--text-muted)">User not found.</p>';
        document.body.classList.remove('auth-loading');
        return;
      }

      document.title = `${target.username} · activity - paperbackd`;
      document.getElementById('page-title').innerHTML = `<a href="../profile/?u=${encodeURIComponent(target.username)}" style="color:var(--accent);text-decoration:none">${esc(target.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>activity<span class="title-dot">.</span>`;

      usernameMap[target.uid] = target.username;
      avatarMap[target.uid]   = target.avatarUrl || null;
      usernameMap[user.uid]   = myProfile?.username || null;
      avatarMap[user.uid]     = myProfile?.avatarUrl || null;

      document.body.classList.remove('auth-loading');

      let lastDoc  = null;
      let lastDay  = null;
      let loading  = false;
      const seenIds = new Set();

      const sentinel = document.createElement('div');
      sentinel.style.cssText = 'height:1px';

      async function loadPage() {
        if (loading) return;
        loading = true;
        const { events: raw, lastDoc: newCursor } = await getFeed(target.uid, [], lastDoc);
        const events = raw.filter(e => {
          if (seenIds.has(e.id)) return false;
          seenIds.add(e.id);
          return e.uid === target.uid;
        });

        // Backfill coverUrl and progress data
        const needsFetch = events.filter(e => e.gbid);
        if (needsFetch.length) {
          await Promise.all(needsFetch.map(async e => {
            const book = await getBookByGbid(e.uid, e.gbid);
            if (!book) return;
            if (book.coverUrl) e.coverUrl = book.coverUrl;
            if (e.type === 'started' && book.status === 'reading' && book.totalPages) {
              e._currentPage = book.currentPage || 0;
              e._totalPages  = book.totalPages;
            }
          }));
        }

        // Fetch profiles for any reactor uids not already known
        const reactorUids = new Set();
        events.forEach(e => { if (e.reactions) Object.values(e.reactions).forEach(arr => arr.forEach(uid => reactorUids.add(uid))); });
        const unknownUids = [...reactorUids].filter(uid => !(uid in usernameMap));
        if (unknownUids.length) {
          await Promise.all(unknownUids.map(async uid => {
            const p = await getProfile(uid);
            usernameMap[uid] = p?.username || null;
            avatarMap[uid]   = p?.avatarUrl || null;
          }));
        }

        if (main.contains(sentinel)) main.removeChild(sentinel);

        if (events.length === 0 && !newCursor && !lastDoc) {
          const p = document.createElement('p');
          p.style.cssText = 'color:var(--text-muted);font-size:.9rem';
          p.textContent = 'No activity yet.';
          main.appendChild(p);
        } else {
          aggregateFollows(events).forEach(e => {
            const label = dayLabel(e.timestamp);
            if (label !== lastDay) {
              lastDay = label;
              const div = document.createElement('div');
              div.className = 'feed-day-divider';
              div.textContent = label || '';
              main.appendChild(div);
            }
            main.appendChild(renderEvent(e, target.avatarUrl, target.avatarBorderColor));
          });
          lastDoc = newCursor;
          if (newCursor) main.appendChild(sentinel);
        }
        loading = false;
        if (newCursor) requestAnimationFrame(() => {
          if (main.contains(sentinel) && sentinel.getBoundingClientRect().top < window.innerHeight + 200) loadPage();
        });
      }

      main.appendChild(sentinel);
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadPage();
      }, { rootMargin: '200px' });
      observer.observe(sentinel);
    } finally {
      // auth-loading already removed above after target resolves
    }
    })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
