<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>network - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="ink-edge" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="brush-line" x="-1%" y="-600%" width="102%" height="1300%">
        <feMorphology operator="dilate" radius="0 1" result="thick"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.45" numOctaves="4" seed="8" result="noise"/>
        <feDisplacementMap in="thick" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <style>
    .card {
      position: relative;
      isolation: isolate;
      background: transparent;
      border: none;
      box-shadow: none;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: var(--bg-card);
      box-shadow: var(--shadow);
      filter: url(#ink-edge);
      z-index: -1;
    }
  </style>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>feed</a>
        <a href="../search/"   data-nav="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>search</a>
        <a href="../network/"  data-nav="network"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.7" y1="10.7" x2="15.3" y2="7.3"/><line x1="8.7" y1="13.3" x2="15.3" y2="16.7"/></svg>network</a>
        <a href="../library/"  data-nav="library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>library</a>
        <a href="../lists/"    data-nav="lists"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg>lists</a>
        <a href="../stats/"    data-nav="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="13" width="4" height="7" rx="0.5"/><rect x="10" y="3" width="4" height="17" rx="0.5"/><rect x="17" y="9" width="4" height="11" rx="0.5"/></svg>stats</a>
        <a href="../profile/"  data-nav="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>profile</a>
        <a href="../settings/" data-nav="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>settings</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title" id="page-title">network<span class="title-dot">.</span></h1>
    <div class="add-friend card" id="follow-form">
      <div class="add-friend-label">Follow someone</div>
      <div class="join-club-row">
        <input class="join-club-input" id="follow-input" type="text"
          placeholder="Their username" autocomplete="off" autocapitalize="none" spellcheck="false">
        <button class="join-club-btn" id="follow-btn">Follow</button>
      </div>
      <p class="auth-error" id="follow-error" hidden style="margin-top:.6rem;margin-bottom:0"></p>
      <p class="auth-hint"  id="follow-ok"    hidden style="margin-top:.4rem;color:var(--accent)"></p>
    </div>

    <div class="add-friend card" id="invite-form" style="margin-top:.75rem">
      <div class="join-club-row" style="align-items:center">
        <div>
          <div class="add-friend-label" style="margin-bottom:.1rem">Invite friends</div>
          <p style="font-size:.78rem;color:var(--text-muted);margin:0">Get more people you know on paperbackd.</p>
        </div>
        <button class="join-club-btn" id="invite-btn" style="margin-left:auto;flex-shrink:0">Invite</button>
      </div>
      <p class="auth-hint" id="invite-ok" hidden style="margin-top:.5rem;color:var(--accent)"></p>
    </div>

    <div id="tab-bar" style="display:flex;border-bottom:2px solid var(--border);margin-top:1.25rem;margin-bottom:.75rem">
      <button id="tab-following" style="flex:1;padding:.5rem .25rem;background:none;border:none;border-bottom:2px solid var(--accent);margin-bottom:-2px;font-weight:600;font-size:.9rem;cursor:pointer;color:var(--fg);font-family:inherit">Following</button>
      <button id="tab-followers" style="flex:1;padding:.5rem .25rem;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:400;font-size:.9rem;cursor:pointer;color:var(--text-muted);font-family:inherit">Followers</button>
      <button id="tab-suggested" style="flex:1;padding:.5rem .25rem;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:400;font-size:.9rem;cursor:pointer;color:var(--text-muted);font-family:inherit">Suggested</button>
    </div>

    <div id="following-panel">
      <div id="following-list"></div>
    </div>
    <div id="followers-panel" style="display:none">
      <div id="followers-list"></div>
    </div>
    <div id="suggested-panel" style="display:none">
      <div id="suggested-list"></div>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getFollowers, getSuggestedFollows, followUser, unfollowUser, removeFollower, getProfileByUsername } from '../js/firebase.js';

    const { user, profile } = await requireAuth();
    const followingList  = document.getElementById('following-list');
    const followersList  = document.getElementById('followers-list');
    const suggestedList  = document.getElementById('suggested-list');
    const tabFollowing   = document.getElementById('tab-following');
    const tabFollowers   = document.getElementById('tab-followers');
    const tabSuggested   = document.getElementById('tab-suggested');
    const followingPanel = document.getElementById('following-panel');
    const followersPanel = document.getElementById('followers-panel');
    const suggestedPanel = document.getElementById('suggested-panel');

    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    let viewUid = user.uid;
    const isOwn = !targetParam;

    if (!targetParam) {
      document.getElementById('page-title').innerHTML = `<a href="../profile/" style="color:var(--accent);text-decoration:none">${esc(profile.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>network<span class="title-dot">.</span>`;
    }
    if (targetParam) {
      const targetProfile = await getProfileByUsername(targetParam);
      if (targetProfile) {
        viewUid = targetProfile.uid;
        document.getElementById('page-title').innerHTML = `<a href="../profile/?u=${encodeURIComponent(targetProfile.username)}" style="color:var(--accent);text-decoration:none">${esc(targetProfile.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>network<span class="title-dot">.</span>`;
      }
      document.getElementById('follow-form').style.display = 'none';
      document.getElementById('invite-form').style.display = 'none';
      tabSuggested.style.display = 'none';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Same icon used for "network" in the site nav — links here take you to
    // that person's own network page, so you can browse friends-of-friends.
    const NETWORK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.7" y1="10.7" x2="15.3" y2="7.3"/><line x1="8.7" y1="13.3" x2="15.3" y2="16.7"/></svg>';

    function networkLinkHtml(username) {
      const label = `Browse ${esc(username)}'s network`;
      return `<a class="network-row-link" href="../network/?u=${esc(username)}" title="${label}" aria-label="${label}">${NETWORK_ICON}</a>`;
    }

    // Username stays primary; only add the display name (muted, to the
    // right) when it actually differs — no point showing "iain iain".
    // Case-insensitive: older display names predate lowercase enforcement
    // and may still differ from the username only by casing.
    function nameHtml(profile) {
      if (profile.displayName && profile.displayName.toLowerCase() !== profile.username.toLowerCase()) {
        return `${esc(profile.username)} <span class="network-row-handle">${esc(profile.displayName)}</span>`;
      }
      return esc(profile.username);
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.className = 'network-empty';
      p.textContent = msg;
      container.appendChild(p);
    }

    function avatarHtml(profile) {
      return profile.avatarUrl
        ? `<img src="${esc(profile.avatarUrl)}" alt="">`
        : esc((profile.username[0] || '?').toUpperCase());
    }

    // Updates the tab label to include count
    function setTabCount(tab, label, n) {
      tab.textContent = `${label} · ${n}`;
    }

    const TABS = {
      following: { tab: tabFollowing, panel: followingPanel },
      followers: { tab: tabFollowers, panel: followersPanel },
      suggested: { tab: tabSuggested, panel: suggestedPanel },
    };

    function switchTab(which) {
      for (const [key, { tab, panel }] of Object.entries(TABS)) {
        const active = key === which;
        panel.style.display        = active ? '' : 'none';
        tab.style.fontWeight        = active ? '600' : '400';
        tab.style.color             = active ? 'var(--fg)' : 'var(--text-muted)';
        tab.style.borderBottomColor = active ? 'var(--accent)' : 'transparent';
      }
    }

    tabFollowing.addEventListener('click', () => switchTab('following'));
    tabFollowers.addEventListener('click', () => switchTab('followers'));
    tabSuggested.addEventListener('click', () => switchTab('suggested'));

    // Render a person with optional follow button
    function renderPerson(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'network-row';
      card.dataset.uid = profile.uid;
      const isMe        = profile.uid === user.uid;
      const alreadyFollow = myFollowingUids.includes(profile.uid);
      card.innerHTML = `
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <div class="network-row-main">
          <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${nameHtml(profile)}</a>
          ${networkLinkHtml(profile.username)}
        </div>
        ${!isMe && !alreadyFollow ? `<button class="join-club-btn follow-back-btn" style="font-size:.75rem;padding:.3rem .75rem">Follow</button>` : ''}
      `;
      if (!isMe && !alreadyFollow) {
        const btn = card.querySelector('.follow-back-btn');
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Following…';
          try {
            await followUser(user.uid, profile.username);
            myFollowingUids.push(profile.uid);
            btn.textContent = 'Following';
            btn.className = 'btn-update follow-back-btn';
            // Also add to following list if own view
            if (isOwn) {
              document.getElementById('following-empty')?.remove();
              followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
            }
          } catch (e) {
            btn.disabled = false;
            btn.textContent = 'Follow';
          }
        });
      }
      return card;
    }

    // Render own following entry (with Unfollow button)
    function renderOwnFollowing(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'network-row';
      card.dataset.uid = profile.uid;
      card.innerHTML = `
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <div class="network-row-main">
          <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${nameHtml(profile)}</a>
          ${networkLinkHtml(profile.username)}
        </div>
        <button class="btn-danger btn-unfollow" style="font-size:.75rem;padding:.3rem .75rem">Unfollow</button>
      `;
      card.querySelector('.btn-unfollow').addEventListener('click', async () => {
        await unfollowUser(user.uid, profile.uid);
        const idx = myFollowingUids.indexOf(profile.uid);
        if (idx !== -1) myFollowingUids.splice(idx, 1);
        card.remove();
        if (!followingList.querySelector('.network-row')) {
          showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        }
        // Update follow button in followers list if visible
        const followerCard = followersList.querySelector(`[data-uid="${profile.uid}"]`);
        if (followerCard && !followerCard.querySelector('.follow-back-btn')) {
          const btn = document.createElement('button');
          btn.className = 'join-club-btn follow-back-btn';
          btn.style.cssText = 'font-size:.75rem;padding:.3rem .75rem';
          btn.textContent = 'Follow';
          followerCard.querySelector('.network-row-actions').prepend(btn);
          btn.addEventListener('click', async () => {
            btn.disabled = true; btn.textContent = 'Following…';
            try {
              await followUser(user.uid, profile.username);
              myFollowingUids.push(profile.uid);
              btn.textContent = 'Following';
              btn.className = 'btn-update follow-back-btn';
              document.getElementById('following-empty')?.remove();
              followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
            } catch(e) { btn.disabled = false; btn.textContent = 'Follow'; }
          });
        }
      });
      return card;
    }

    // Render own follower entry (with Follow back + Remove buttons)
    function renderOwnFollower(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'network-row';
      card.dataset.uid = profile.uid;
      const alreadyFollowing = myFollowingUids.includes(profile.uid);
      card.innerHTML = `
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <div class="network-row-main">
          <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${nameHtml(profile)}</a>
          ${networkLinkHtml(profile.username)}
        </div>
        <div class="network-row-actions">
          ${!alreadyFollowing ? `<button class="join-club-btn follow-back-btn" style="font-size:.75rem;padding:.3rem .75rem">Follow back</button>` : ''}
          <button class="btn-danger btn-remove-follower" style="font-size:.75rem;padding:.3rem .75rem">Remove</button>
        </div>
      `;
      if (!alreadyFollowing) {
        const followBtn = card.querySelector('.follow-back-btn');
        followBtn.addEventListener('click', async () => {
          followBtn.disabled = true; followBtn.textContent = 'Following…';
          try {
            await followUser(user.uid, profile.username);
            myFollowingUids.push(profile.uid);
            followBtn.textContent = 'Following';
            followBtn.className = 'btn-update follow-back-btn';
            followBtn.disabled = false;
            document.getElementById('following-empty')?.remove();
            followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
          } catch (e) { followBtn.disabled = false; followBtn.textContent = 'Follow back'; }
        });
      }
      card.querySelector('.btn-remove-follower').addEventListener('click', async () => {
        await removeFollower(user.uid, profile.uid);
        card.remove();
        const count = followersList.querySelectorAll('.network-row').length;
        setTabCount(tabFollowers, 'Followers', count);
        if (count === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
      });
      return card;
    }

    try {
      let following, followers, myFollowingUids;

      if (isOwn) {
        let suggested;
        [following, followers, suggested] = await Promise.all([
          getFollowing(viewUid),
          getFollowers(viewUid),
          getSuggestedFollows(viewUid),
        ]);
        myFollowingUids = following.map(f => f.uid);

        setTabCount(tabFollowing, 'Following', following.length);
        setTabCount(tabFollowers, 'Followers', followers.length);
        setTabCount(tabSuggested, 'Suggested', suggested.length);

        if (following.length === 0) showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        else following.forEach(f => followingList.appendChild(renderOwnFollowing(f, myFollowingUids)));

        if (followers.length === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
        else followers.forEach(f => followersList.appendChild(renderOwnFollower(f, myFollowingUids)));

        if (suggested.length === 0) showEmpty(suggestedList, 'suggested-empty', 'No suggestions yet - follow more people to see suggestions here.');
        else suggested.forEach(f => suggestedList.appendChild(renderPerson(f, myFollowingUids)));
      } else {
        [following, followers, myFollowingUids] = await Promise.all([
          getFollowing(viewUid),
          getFollowers(viewUid),
          getFollowing(user.uid).then(f => f.map(x => x.uid))
        ]);

        setTabCount(tabFollowing, 'Following', following.length);
        setTabCount(tabFollowers, 'Followers', followers.length);

        if (following.length === 0) showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        else following.forEach(f => followingList.appendChild(renderPerson(f, myFollowingUids)));

        if (followers.length === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
        else followers.forEach(f => followersList.appendChild(renderPerson(f, myFollowingUids)));
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }

    // ── Follow form ────────────────────────────────────────────────────────────
    const input   = document.getElementById('follow-input');
    const btn     = document.getElementById('follow-btn');
    const errorEl = document.getElementById('follow-error');
    const okEl    = document.getElementById('follow-ok');

    if (input) {
      btn.addEventListener('click', async () => {
        const username = input.value.trim().toLowerCase();
        if (!username) return;
        errorEl.hidden  = true;
        okEl.hidden     = true;
        btn.disabled    = true;
        btn.textContent = 'Following…';
        try {
          const followed = await followUser(user.uid, username);
          document.getElementById('following-empty')?.remove();
          const myFollowingUids = Array.from(followingList.querySelectorAll('.network-row')).map(c => c.dataset.uid);
          myFollowingUids.push(followed.uid);
          followingList.appendChild(renderOwnFollowing(followed, myFollowingUids));
          okEl.textContent = `Now following ${followed.username}!`;
          okEl.hidden      = false;
          input.value      = '';
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.hidden      = false;
        } finally {
          btn.disabled    = false;
          btn.textContent = 'Follow';
        }
      });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
    }

    // ── Invite friends ─────────────────────────────────────────────────────────
    const inviteBtn = document.getElementById('invite-btn');
    const inviteOk  = document.getElementById('invite-ok');

    if (inviteBtn) {
      inviteBtn.addEventListener('click', async () => {
        const url  = 'https://paperbackd.ink/';
        const text = `${profile.username} is using paperbackd to keep track of what they're reading — come join!`;

        if (navigator.share) {
          try {
            await navigator.share({ title: 'paperbackd', text, url });
          } catch (e) { /* user cancelled the share sheet — nothing to do */ }
          return;
        }

        try {
          await navigator.clipboard.writeText(`${text} ${url}`);
          inviteOk.textContent = 'Invite link copied!';
        } catch (e) {
          inviteOk.textContent = url;
        }
        inviteOk.hidden = false;
        setTimeout(() => { inviteOk.hidden = true; }, 3000);
      });
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
