<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Network - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title" id="page-title">network<span class="title-dot">.</span></h1>
    <div class="add-friend card" id="follow-form">
      <div class="add-friend-label">Follow someone</div>
      <div class="join-club-row">
        <input class="join-club-input" id="follow-input" type="text"
          placeholder="Their username" autocomplete="off" autocapitalize="none" spellcheck="false">
        <button class="join-club-btn" id="follow-btn">Follow</button>
      </div>
      <p class="auth-error" id="follow-error" hidden style="margin-top:.6rem;margin-bottom:0"></p>
      <p class="auth-hint"  id="follow-ok"    hidden style="margin-top:.4rem;color:var(--accent)"></p>
    </div>

    <div id="tab-bar" style="display:flex;border-bottom:2px solid var(--border);margin-bottom:.75rem">
      <button id="tab-following" style="flex:1;padding:.5rem .25rem;background:none;border:none;border-bottom:2px solid var(--accent);margin-bottom:-2px;font-weight:600;font-size:.9rem;cursor:pointer;color:var(--fg);font-family:inherit">Following</button>
      <button id="tab-followers" style="flex:1;padding:.5rem .25rem;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-weight:400;font-size:.9rem;cursor:pointer;color:var(--text-muted);font-family:inherit">Followers</button>
    </div>

    <div id="following-panel">
      <div id="following-list"></div>
    </div>
    <div id="followers-panel" style="display:none">
      <div id="followers-list"></div>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getFollowers, followUser, unfollowUser, removeFollower, getProfileByUsername } from '../js/firebase.js';

    const { user, profile } = await requireAuth();
    const followingList  = document.getElementById('following-list');
    const followersList  = document.getElementById('followers-list');
    const tabFollowing   = document.getElementById('tab-following');
    const tabFollowers   = document.getElementById('tab-followers');
    const followingPanel = document.getElementById('following-panel');
    const followersPanel = document.getElementById('followers-panel');

    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    let viewUid = user.uid;
    const isOwn = !targetParam;

    if (!targetParam) {
      document.getElementById('page-title').innerHTML = `<a href="../profile/" style="color:var(--accent);text-decoration:none">${esc(profile.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>network<span class="title-dot">.</span>`;
    }
    if (targetParam) {
      const targetProfile = await getProfileByUsername(targetParam);
      if (targetProfile) {
        viewUid = targetProfile.uid;
        document.getElementById('page-title').innerHTML = `<a href="../profile/?u=${encodeURIComponent(targetProfile.username)}" style="color:var(--accent);text-decoration:none">${esc(targetProfile.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>network<span class="title-dot">.</span>`;
      }
      document.getElementById('follow-form').style.display = 'none';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      p.textContent = msg;
      container.appendChild(p);
    }

    function avatarHtml(profile) {
      return profile.avatarUrl
        ? `<img src="${esc(profile.avatarUrl)}" alt="">`
        : esc((profile.username[0] || '?').toUpperCase());
    }

    // Updates the tab label to include count
    function setTabCount(tab, label, n) {
      tab.textContent = `${label} · ${n}`;
    }

    function switchTab(which) {
      const onFollowing = which === 'following';
      followingPanel.style.display = onFollowing ? '' : 'none';
      followersPanel.style.display = onFollowing ? 'none' : '';
      tabFollowing.style.fontWeight       = onFollowing ? '600' : '400';
      tabFollowing.style.color            = onFollowing ? 'var(--fg)' : 'var(--text-muted)';
      tabFollowing.style.borderBottomColor = onFollowing ? 'var(--accent)' : 'transparent';
      tabFollowers.style.fontWeight       = onFollowing ? '400' : '600';
      tabFollowers.style.color            = onFollowing ? 'var(--text-muted)' : 'var(--fg)';
      tabFollowers.style.borderBottomColor = onFollowing ? 'transparent' : 'var(--accent)';
    }

    tabFollowing.addEventListener('click', () => switchTab('following'));
    tabFollowers.addEventListener('click', () => switchTab('followers'));

    // Render a person with optional follow button
    function renderPerson(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.uid = profile.uid;
      const isMe        = profile.uid === user.uid;
      const alreadyFollow = myFollowingUids.includes(profile.uid);
      card.innerHTML = `<div class="friend-item">
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${esc(profile.username)}</a>
        ${!isMe && !alreadyFollow ? `<button class="join-club-btn follow-back-btn" style="margin-left:auto;font-size:.75rem;padding:.3rem .75rem">Follow</button>` : ''}
      </div>`;
      if (!isMe && !alreadyFollow) {
        const btn = card.querySelector('.follow-back-btn');
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Following…';
          try {
            await followUser(user.uid, profile.username);
            myFollowingUids.push(profile.uid);
            btn.textContent = 'Following';
            btn.className = 'btn-update follow-back-btn';
            // Also add to following list if own view
            if (isOwn) {
              document.getElementById('following-empty')?.remove();
              followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
            }
          } catch (e) {
            btn.disabled = false;
            btn.textContent = 'Follow';
          }
        });
      }
      return card;
    }

    // Render own following entry (with Unfollow button)
    function renderOwnFollowing(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.uid = profile.uid;
      card.innerHTML = `<div class="friend-item">
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${esc(profile.username)}</a>
        <button class="btn-danger btn-unfollow" style="margin-left:auto;font-size:.75rem;padding:.3rem .75rem">Unfollow</button>
      </div>`;
      card.querySelector('.btn-unfollow').addEventListener('click', async () => {
        await unfollowUser(user.uid, profile.uid);
        const idx = myFollowingUids.indexOf(profile.uid);
        if (idx !== -1) myFollowingUids.splice(idx, 1);
        card.remove();
        if (!followingList.querySelector('.card')) {
          showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        }
        // Update follow button in followers list if visible
        const followerCard = followersList.querySelector(`[data-uid="${profile.uid}"]`);
        if (followerCard && !followerCard.querySelector('.follow-back-btn')) {
          const btn = document.createElement('button');
          btn.className = 'join-club-btn follow-back-btn';
          btn.style.cssText = 'margin-left:auto;font-size:.75rem;padding:.3rem .75rem';
          btn.textContent = 'Follow';
          followerCard.querySelector('.friend-item').appendChild(btn);
          btn.addEventListener('click', async () => {
            btn.disabled = true; btn.textContent = 'Following…';
            try {
              await followUser(user.uid, profile.username);
              myFollowingUids.push(profile.uid);
              btn.textContent = 'Following';
              btn.className = 'btn-update follow-back-btn';
              document.getElementById('following-empty')?.remove();
              followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
            } catch(e) { btn.disabled = false; btn.textContent = 'Follow'; }
          });
        }
      });
      return card;
    }

    // Render own follower entry (with Follow back + Remove buttons)
    function renderOwnFollower(profile, myFollowingUids) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.uid = profile.uid;
      const alreadyFollowing = myFollowingUids.includes(profile.uid);
      card.innerHTML = `<div class="friend-item">
        <a class="friend-avatar" href="../profile/?u=${esc(profile.username)}" style="text-decoration:none;color:inherit;${profile.avatarBorderColor ? `border-color:${profile.avatarBorderColor}` : ''}">${avatarHtml(profile)}</a>
        <a class="friend-name" href="../profile/?u=${esc(profile.username)}">${esc(profile.username)}</a>
        <div style="display:flex;gap:.4rem;margin-left:auto">
          ${!alreadyFollowing ? `<button class="join-club-btn follow-back-btn" style="font-size:.75rem;padding:.3rem .75rem">Follow back</button>` : ''}
          <button class="btn-danger btn-remove-follower" style="font-size:.75rem;padding:.3rem .75rem">Remove</button>
        </div>
      </div>`;
      if (!alreadyFollowing) {
        const followBtn = card.querySelector('.follow-back-btn');
        followBtn.addEventListener('click', async () => {
          followBtn.disabled = true; followBtn.textContent = 'Following…';
          try {
            await followUser(user.uid, profile.username);
            myFollowingUids.push(profile.uid);
            followBtn.textContent = 'Following';
            followBtn.className = 'btn-update follow-back-btn';
            followBtn.disabled = false;
            document.getElementById('following-empty')?.remove();
            followingList.appendChild(renderOwnFollowing(profile, myFollowingUids));
          } catch (e) { followBtn.disabled = false; followBtn.textContent = 'Follow back'; }
        });
      }
      card.querySelector('.btn-remove-follower').addEventListener('click', async () => {
        await removeFollower(user.uid, profile.uid);
        card.remove();
        const count = followersList.querySelectorAll('.card').length;
        setTabCount(tabFollowers, 'Followers', count);
        if (count === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
      });
      return card;
    }

    try {
      let following, followers, myFollowingUids;

      if (isOwn) {
        [following, followers] = await Promise.all([getFollowing(viewUid), getFollowers(viewUid)]);
        myFollowingUids = following.map(f => f.uid);

        setTabCount(tabFollowing, 'Following', following.length);
        setTabCount(tabFollowers, 'Followers', followers.length);

        if (following.length === 0) showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        else following.forEach(f => followingList.appendChild(renderOwnFollowing(f, myFollowingUids)));

        if (followers.length === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
        else followers.forEach(f => followersList.appendChild(renderOwnFollower(f, myFollowingUids)));
      } else {
        [following, followers, myFollowingUids] = await Promise.all([
          getFollowing(viewUid),
          getFollowers(viewUid),
          getFollowing(user.uid).then(f => f.map(x => x.uid))
        ]);

        setTabCount(tabFollowing, 'Following', following.length);
        setTabCount(tabFollowers, 'Followers', followers.length);

        if (following.length === 0) showEmpty(followingList, 'following-empty', 'Not following anyone yet.');
        else following.forEach(f => followingList.appendChild(renderPerson(f, myFollowingUids)));

        if (followers.length === 0) showEmpty(followersList, 'followers-empty', 'No followers yet.');
        else followers.forEach(f => followersList.appendChild(renderPerson(f, myFollowingUids)));
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }

    // ── Follow form ────────────────────────────────────────────────────────────
    const input   = document.getElementById('follow-input');
    const btn     = document.getElementById('follow-btn');
    const errorEl = document.getElementById('follow-error');
    const okEl    = document.getElementById('follow-ok');

    if (input) {
      btn.addEventListener('click', async () => {
        const username = input.value.trim().toLowerCase();
        if (!username) return;
        errorEl.hidden  = true;
        okEl.hidden     = true;
        btn.disabled    = true;
        btn.textContent = 'Following…';
        try {
          const followed = await followUser(user.uid, username);
          document.getElementById('following-empty')?.remove();
          const myFollowingUids = Array.from(followingList.querySelectorAll('.card')).map(c => c.dataset.uid);
          myFollowingUids.push(followed.uid);
          followingList.appendChild(renderOwnFollowing(followed, myFollowingUids));
          okEl.textContent = `Now following ${followed.username}!`;
          okEl.hidden      = false;
          input.value      = '';
        } catch (err) {
          errorEl.textContent = err.message;
          errorEl.hidden      = false;
        } finally {
          btn.disabled    = false;
          btn.textContent = 'Follow';
        }
      });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
