<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book — Reading Log</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../search/"   data-nav="search">Search</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <a class="back-link" id="back-link" href="../library/">← Back</a>
    <div id="book-detail"></div>
    <p class="section-title" id="friends-title" style="display:none">Friends</p>
    <div id="friends-list"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getBookByGbid, getFriendBookStatus, addBook, addFinishedBook, getLists, ensureDefaultList, addBookToList, removeBookFromList } from '../js/firebase.js';

    const params = new URLSearchParams(location.search);
    const gbid   = params.get('gbid');
    if (!gbid) location.replace('../library/');

    const { user, profile } = await requireAuth();

    document.getElementById('back-link').addEventListener('click', e => {
      if (history.length > 1) { e.preventDefault(); history.back(); }
    });

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return d.textContent || '';
    }
    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';

    function createStarPicker(initial) {
      const wrap = document.createElement('div');
      wrap.className = 'star-picker';
      let value = initial || 0;
      const btns = [];
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'star-pick-btn'; btn.textContent = '★';
        btn.dataset.i = i;
        btns.push(btn);
        wrap.appendChild(btn);
      }
      function update(v) {
        value = v;
        btns.forEach((b, idx) => {
          const n = idx + 1;
          b.classList.remove('full', 'half');
          if (value >= n)        b.classList.add('full');
          else if (value >= n-0.5) b.classList.add('half');
        });
      }
      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.star-pick-btn');
        if (!btn) return;
        const i = parseInt(btn.dataset.i);
        const half = e.offsetX < btn.offsetWidth / 2;
        const v = half ? i - 0.5 : i;
        update(v === value ? 0 : v);
      });
      wrap.getValue = () => value || null;
      update(value);
      return wrap;
    }

    function createPartialDatePicker() {
      const wrap = document.createElement('div');
      wrap.className = 'date-picker-partial';
      function makeSpinner(input, defaultVal, min, max) {
        const up = document.createElement('button');
        up.type = 'button'; up.className = 'date-num-btn'; up.textContent = '▲';
        up.addEventListener('click', () => { const v = parseInt(input.value); input.value = v ? Math.min(v+1,max) : defaultVal; });
        const down = document.createElement('button');
        down.type = 'button'; down.className = 'date-num-btn'; down.textContent = '▼';
        down.addEventListener('click', () => { const v = parseInt(input.value); input.value = v ? Math.max(v-1,min) : defaultVal; });
        const btns = document.createElement('div'); btns.className = 'date-num-btns'; btns.append(up, down);
        const w = document.createElement('div'); w.className = 'date-num-wrap'; w.append(input, btns);
        return w;
      }
      const dayIn = document.createElement('input');
      dayIn.type = 'text'; dayIn.inputMode = 'numeric'; dayIn.maxLength = 2;
      dayIn.className = 'date-day-input'; dayIn.placeholder = 'Day';
      const monthSel = document.createElement('select');
      monthSel.className = 'date-month-select';
      monthSel.innerHTML = '<option value="">Month</option>' +
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
          .map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
      const yearIn = document.createElement('input');
      yearIn.type = 'text'; yearIn.inputMode = 'numeric'; yearIn.maxLength = 4;
      yearIn.className = 'date-year-input'; yearIn.placeholder = 'Year';
      wrap.append(makeSpinner(dayIn, 1, 1, 31), monthSel, makeSpinner(yearIn, new Date().getFullYear(), 1000, 2200));
      wrap.getDate = () => {
        const year = parseInt(yearIn.value);
        if (!year || year < 1000 || year > 2200) return { date: null, precision: null };
        const month = parseInt(monthSel.value) || 0;
        const day   = parseInt(dayIn.value)    || 0;
        if (!month) return { date: new Date(year, 0, 1, 12, 0, 0), precision: 'year' };
        if (!day)   return { date: new Date(year, month-1, 1, 12, 0, 0), precision: 'month' };
        return { date: new Date(year, month-1, Math.min(day,31), 12, 0, 0), precision: 'day' };
      };
      return wrap;
    }

    try {
      const [hcRes, following, myBook] = await Promise.all([
        fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query GetBook($slug: String!) {
              books(where: { slug: { _eq: $slug } }, limit: 1) {
                title
                pages
                release_year
                description
                cached_image
                contributions { author { name } }
                editions { isbn_10 isbn_13 }
              }
            }`,
            variables: { slug: gbid }
          })
        }),
        getFollowing(user.uid),
        getBookByGbid(user.uid, gbid)
      ]);

      const hcData = hcRes.ok ? await hcRes.json() : {};
      const hcBook = hcData.data?.books?.[0] || {};

      const title       = hcBook.title  || myBook?.title  || 'Unknown title';
      const author      = hcBook.contributions?.find(c => c.author)?.author?.name || myBook?.author || '';
      const pages       = hcBook.pages  || myBook?.totalPages || 0;
      const cover       = hcBook.cached_image?.url || myBook?.coverUrl || '';
      const desc        = hcBook.description || '';
      const releaseYear = hcBook.release_year || null;
      const isbn        = hcBook.editions?.find(e => e.isbn_13)?.isbn_13
                       || hcBook.editions?.find(e => e.isbn_10)?.isbn_10
                       || null;

      document.title = `${title} — Reading Log`;

      const detail = document.getElementById('book-detail');
      const card   = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `<div style="display:flex;gap:1rem;align-items:flex-start">
        ${cover?.startsWith('https://') ? `<img src="${cover}" alt="" style="width:80px;border-radius:var(--radius-sm);flex-shrink:0;display:block">` : ''}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;gap:.5rem">
            <div style="font-size:1.1rem;font-weight:700;line-height:1.3;flex:1">${esc(title)}${releaseYear ? `<span style="font-size:.8rem;font-weight:400;color:var(--text-muted);margin-left:.4rem">${releaseYear}</span>` : ''}</div>
            <div style="display:flex;gap:.3rem;align-items:center;padding-top:.2rem;flex-shrink:0">
              ${isbn ? `<a href="https://www.goodreads.com/book/isbn/${isbn}" target="_blank" rel="noopener" title="View on Goodreads"><img src="https://www.google.com/s2/favicons?domain=goodreads.com&sz=32" width="16" height="16" alt="Goodreads" style="border-radius:2px;opacity:.75;display:block"></a>` : ''}
              ${gbid && !/^\d+$/.test(gbid) ? `<a href="https://hardcover.app/books/${gbid}" target="_blank" rel="noopener" title="View on Hardcover"><img src="https://www.google.com/s2/favicons?domain=hardcover.app&sz=32" width="16" height="16" alt="Hardcover" style="border-radius:2px;opacity:.75;display:block"></a>` : ''}
            </div>
          </div>
          ${author ? `<div style="color:var(--text-muted);font-size:.875rem;margin-top:.2rem">${esc(author)}</div>` : ''}
          ${pages  ? `<div style="color:var(--text-muted);font-size:.78rem;margin-top:.15rem">${pages} pages</div>` : ''}
          ${desc   ? `<div class="book-desc" style="font-size:.825rem;color:var(--text-muted);margin-top:.75rem;line-height:1.55">${esc(desc.slice(0, 300))}${desc.length > 300 ? '<span class="book-desc-more" style="cursor:pointer">…</span>' : ''}</div>` : ''}
          ${myBook ? `<div style="margin-top:.625rem;font-size:.8rem;color:var(--accent);font-weight:500">${myBook.status === 'reading' ? (myBook.totalPages ? `You're reading this · page ${myBook.currentPage} of ${myBook.totalPages}` : `You're currently reading this`) : `You've finished this`}</div>${myBook.status === 'finished' ? renderStars(myBook.rating) : ''}${myBook.status === 'finished' && myBook.review ? `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;margin-top:.2rem;line-height:1.4">${esc(myBook.review.slice(0, 200))}${myBook.review.length > 200 ? '…' : ''}</div>` : ''}` : ''}
        </div>
      </div>`;
      detail.appendChild(card);

      card.querySelector('.book-desc-more')?.addEventListener('click', () => {
        const el = card.querySelector('.book-desc');
        el.textContent = desc;
      });

      // ── Library actions ──────────────────────────────────────────────────────
      if (!myBook) {
        const actionsCard = document.createElement('div');
        actionsCard.className = 'card';

        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap';

        const startBtn    = document.createElement('button');
        startBtn.className = 'join-club-btn';
        startBtn.textContent = 'Start reading';

        const alreadyBtn  = document.createElement('button');
        alreadyBtn.className = 'btn-update';
        alreadyBtn.textContent = 'Mark as finished';

        const listBtn = document.createElement('button');
        listBtn.className = 'btn-update';
        listBtn.textContent = 'Reading list';
        listBtn.disabled = true;

        btnRow.append(startBtn, alreadyBtn, listBtn);
        actionsCard.appendChild(btnRow);
        detail.appendChild(actionsCard);

        (async () => {
          try {
            let lists = await getLists(user.uid);
            if (!lists.find(l => l.isDefault)) {
              await ensureDefaultList(user.uid);
              lists = await getLists(user.uid);
            }
            const defaultList = lists.find(l => l.isDefault);
            if (!defaultList) return;
            let inList = (defaultList.books || []).some(b => b.gbid === gbid);
            function updateListBtn() {
              listBtn.textContent = inList ? '✓ Reading list' : 'Reading list';
              listBtn.style.color = inList ? 'var(--accent)' : '';
              listBtn.disabled = false;
            }
            updateListBtn();
            listBtn.addEventListener('click', async () => {
              listBtn.disabled = true;
              if (inList) {
                await removeBookFromList(user.uid, defaultList.id, gbid);
                inList = false;
              } else {
                await addBookToList(user.uid, defaultList.id, { gbid, title, author, coverUrl: cover });
                inList = true;
              }
              updateListBtn();
            });
          } catch (e) { console.error('lists:', e); }
        })();

        function showDone(msg) {
          actionsCard.innerHTML = `<div style="font-size:.85rem;color:var(--accent);font-weight:500">${msg}</div>`;
        }

        startBtn.addEventListener('click', async () => {
          startBtn.disabled = alreadyBtn.disabled = true;
          startBtn.textContent = 'Adding…';
          try {
            await addBook(user.uid, { title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear }, profile.username);
            showDone('Added to your currently reading!');
          } catch (e) {
            startBtn.textContent = 'Start reading';
            startBtn.disabled = alreadyBtn.disabled = false;
          }
        });

        alreadyBtn.addEventListener('click', () => {
          btnRow.remove();
          actionsCard.innerHTML = '';

          const starPicker    = createStarPicker(0);
          const ta            = document.createElement('textarea');
          ta.className = 'review-input'; ta.placeholder = 'Write a review… (optional)'; ta.rows = 3;
          ta.style.marginTop = '.5rem';

          const startedLabel  = document.createElement('div');
          startedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.6rem 0 .25rem';
          startedLabel.textContent = 'Date started (optional)';
          const startedPicker = createPartialDatePicker();

          const finishedLabel = document.createElement('div');
          finishedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.6rem 0 .25rem';
          finishedLabel.textContent = 'Date finished (optional)';
          const finishedPicker = createPartialDatePicker();

          const confirmBtn = document.createElement('button');
          confirmBtn.className = 'join-club-btn'; confirmBtn.textContent = 'Add to finished';
          confirmBtn.style.marginTop = '.75rem';

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'btn-update'; cancelBtn.textContent = 'Cancel';
          cancelBtn.style.marginTop = '.75rem';

          const formBtns = document.createElement('div');
          formBtns.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap';
          formBtns.append(confirmBtn, cancelBtn);

          actionsCard.append(starPicker, ta, startedLabel, startedPicker, finishedLabel, finishedPicker, formBtns);

          cancelBtn.addEventListener('click', () => {
            actionsCard.innerHTML = '';
            actionsCard.appendChild(btnRow);
          });

          confirmBtn.addEventListener('click', async () => {
            confirmBtn.disabled = cancelBtn.disabled = true;
            confirmBtn.textContent = 'Adding…';
            try {
              const rating    = starPicker.getValue();
              const review    = ta.value.trim() || null;
              const { date: addedAt,    precision: startedPrec  } = startedPicker.getDate();
              const { date: finishedAt, precision: finishedPrec } = finishedPicker.getDate();
              await addFinishedBook(user.uid, {
                title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear,
                rating, review,
                finishedAt, finishedAtPrecision: finishedAt ? finishedPrec : undefined,
                addedAt,    addedAtPrecision:    addedAt    ? startedPrec  : undefined,
              }, profile.username);
              showDone('Added to your finished books!');
            } catch (e) {
              confirmBtn.textContent = 'Add to finished';
              confirmBtn.disabled = cancelBtn.disabled = false;
            }
          });
        });
      }


      const followingUids  = following.map(f => f.uid);
      const friendStatuses = await getFriendBookStatus(followingUids, gbid);

      if (friendStatuses.length) {
        document.getElementById('friends-title').style.display = '';
        const list = document.getElementById('friends-list');

        for (const { username, avatarUrl, avatarBorderColor, book } of friendStatuses) {
          const status = book.status === 'reading'
            ? book.totalPages
              ? `Currently reading · page ${book.currentPage} of ${book.totalPages}`
              : 'Currently reading'
            : 'Finished';
          const friendStars  = (book.status === 'finished' && book.rating) ? renderStars(book.rating) : '';
          const friendReview = (book.status === 'finished' && book.review)
            ? `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;margin-top:.2rem;line-height:1.4">${esc(book.review.slice(0, 150))}${book.review.length > 150 ? '…' : ''}</div>`
            : '';
          const avatarContent = avatarUrl
            ? `<img src="${esc(avatarUrl)}" alt="">`
            : esc(username[0].toUpperCase());
          const borderStyle = avatarBorderColor ? `border-color:${avatarBorderColor}` : '';
          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML = `<div class="friend-item">
            <a class="friend-avatar" href="../profile/?u=${esc(username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
            <div style="flex:1;min-width:0">
              <a href="../profile/?u=${esc(username)}" style="font-weight:600;font-size:.9rem;color:inherit;text-decoration:none">${esc(username)}</a>
              <div style="font-size:.78rem;color:var(--text-muted);margin-top:.1rem">${status}</div>
              ${friendStars}
              ${friendReview}
            </div>
          </div>`;
          list.appendChild(el);
        }
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
</body>
</html>
