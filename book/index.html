<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>book - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div id="book-detail"></div>
    <p class="section-title" id="friends-title" style="display:none">Friends</p>
    <div id="friends-list"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getBookByGbid, getFriendBookStatus, getFriendListStatus, addBook, addFinishedBook, getLists, ensureDefaultList, addBookToList, removeBookFromList } from '../js/firebase.js';

    const params = new URLSearchParams(location.search);
    const gbid   = params.get('gbid');
    if (!gbid) location.replace('../library/');

    const { user, profile } = await requireAuth();


    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stripHtml(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return d.textContent || '';
    }
    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';

    function createStarPicker(initial) {
      const wrap = document.createElement('div');
      wrap.className = 'star-picker';
      let value = initial || 0;
      const btns = [];
      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'star-pick-btn'; btn.textContent = '★';
        btn.dataset.i = i;
        btns.push(btn);
        wrap.appendChild(btn);
      }
      function update(v) {
        value = v;
        btns.forEach((b, idx) => {
          const n = idx + 1;
          b.classList.remove('full', 'half');
          if (value >= n)        b.classList.add('full');
          else if (value >= n-0.5) b.classList.add('half');
        });
      }
      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.star-pick-btn');
        if (!btn) return;
        const i = parseInt(btn.dataset.i);
        const half = e.offsetX < btn.offsetWidth / 2;
        const v = half ? i - 0.5 : i;
        update(v === value ? 0 : v);
      });
      wrap.getValue = () => value || null;
      update(value);
      return wrap;
    }

    function createPartialDatePicker() {
      const wrap = document.createElement('div');
      wrap.className = 'date-picker-partial';
      const daySel = document.createElement('select');
      daySel.className = 'date-day-select';
      daySel.innerHTML = '<option value="">Day</option>' +
        Array.from({length: 31}, (_, i) => i + 1)
          .map(n => `<option value="${n}">${n}</option>`).join('');
      const monthSel = document.createElement('select');
      monthSel.className = 'date-month-select';
      monthSel.innerHTML = '<option value="">Month</option>' +
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
          .map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
      const currentYear = new Date().getFullYear();
      const yearSel = document.createElement('select');
      yearSel.className = 'date-year-select';
      let yearOpts = '<option value="">Year</option>';
      for (let y = currentYear + 1; y >= 1900; y--) yearOpts += `<option value="${y}">${y}</option>`;
      yearSel.innerHTML = yearOpts;
      wrap.append(daySel, monthSel, yearSel);
      wrap.getDate = () => {
        const year = parseInt(yearSel.value);
        if (!year) return { date: null, precision: null };
        const month = parseInt(monthSel.value) || 0;
        const day   = parseInt(daySel.value)   || 0;
        if (!month) return { date: new Date(year, 0, 1, 12, 0, 0), precision: 'year' };
        if (!day)   return { date: new Date(year, month-1, 1, 12, 0, 0), precision: 'month' };
        return { date: new Date(year, month-1, Math.min(day,31), 12, 0, 0), precision: 'day' };
      };
      return wrap;
    }

    function looksLatin(text) {
      const letters = (text.match(/\p{L}/gu) || []);
      if (!letters.length) return true;
      const nonLatin = letters.filter(c => c > 'ɏ').length;
      return nonLatin / letters.length < 0.15;
    }

    try {
      const [hcRes, following, myBook] = await Promise.all([
        fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query GetBook($slug: String!) {
              books(where: { slug: { _eq: $slug } }, limit: 1) {
                title
                pages
                release_year
                description
                cached_image
                contributions { author { name slug } }
                editions { isbn_10 isbn_13 }
              }
            }`,
            variables: { slug: gbid }
          })
        }),
        getFollowing(user.uid),
        getBookByGbid(user.uid, gbid)
      ]);

      let hcData = {};
      try { if (hcRes.ok) hcData = await hcRes.json(); } catch {}
      const hcBook = hcData.data?.books?.[0] || {};

      const title       = hcBook.title  || myBook?.title  || 'Unknown title';
      const authorData  = hcBook.contributions?.find(c => c.author)?.author;
      const author      = authorData?.name || myBook?.author || '';
      const authorSlug  = authorData?.slug || author.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const pages       = hcBook.pages  || myBook?.totalPages || 0;
      const cover       = hcBook.cached_image?.url || myBook?.coverUrl || '';
      const releaseYear = hcBook.release_year || null;
      const editions    = hcBook.editions || [];
      const isbn        = editions.find(e => e.isbn_13)?.isbn_13
                       || editions.find(e => e.isbn_10)?.isbn_10
                       || null;
      const rawDesc     = hcBook.description || '';
      const desc        = looksLatin(rawDesc) ? rawDesc : '';

      document.title = `${title} - paperbackd`;

      const detail = document.getElementById('book-detail');
      const card   = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `<div style="display:flex;gap:1rem;align-items:flex-start">
        ${cover?.startsWith('https://') ? `<img src="${cover}" alt="" style="width:80px;border-radius:var(--radius-sm);flex-shrink:0;display:block;box-shadow:0 1px 4px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.07)">` : ''}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;gap:.5rem">
            <div style="font-size:1.1rem;font-weight:700;line-height:1.3;flex:1">${esc(title)}${releaseYear ? `<span style="font-size:.8rem;font-weight:400;color:var(--text-muted);margin-left:.4rem">${releaseYear}</span>` : ''}</div>
            <div style="display:flex;gap:.3rem;align-items:center;padding-top:.2rem;flex-shrink:0">
              ${isbn ? `<a href="https://www.goodreads.com/book/isbn/${isbn}" target="_blank" rel="noopener" title="View on Goodreads"><img src="https://www.google.com/s2/favicons?domain=goodreads.com&sz=32" width="16" height="16" alt="Goodreads" style="border-radius:2px;opacity:.75;display:block"></a>` : ''}
              ${gbid && !/^\d+$/.test(gbid) ? `<a href="https://hardcover.app/books/${gbid}" target="_blank" rel="noopener" title="View on Hardcover"><img src="https://www.google.com/s2/favicons?domain=hardcover.app&sz=32" width="16" height="16" alt="Hardcover" style="border-radius:2px;opacity:.75;display:block"></a>` : ''}
            </div>
          </div>
          ${author ? `<div style="color:var(--text-muted);font-size:.875rem;margin-top:.2rem"><a href="../author/?slug=${encodeURIComponent(authorSlug)}" style="color:inherit;text-decoration:none">${esc(author)}</a></div>` : ''}
          ${pages  ? `<div style="color:var(--text-muted);font-size:.78rem;margin-top:.15rem">${pages} pages</div>` : ''}
          ${desc   ? `<div class="book-desc" style="font-size:.825rem;color:var(--text-muted);margin-top:.75rem;line-height:1.55">${esc(desc.slice(0, 300))}${desc.length > 300 ? '<span class="book-desc-more" style="cursor:pointer;color:var(--accent);white-space:nowrap">… more</span>' : ''}</div>` : ''}
          ${myBook ? `<div style="margin-top:.625rem;font-size:.8rem;color:var(--accent);font-weight:500">${myBook.status === 'reading' ? (myBook.totalPages ? `You're reading this · page ${myBook.currentPage} of ${myBook.totalPages}` : `You're currently reading this`) : `You've finished this`}</div>${myBook.status === 'finished' ? renderStars(myBook.rating) : ''}${myBook.status === 'finished' && myBook.review ? `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;margin-top:.2rem;line-height:1.4">${esc(myBook.review.slice(0, 200))}${myBook.review.length > 200 ? '…' : ''}</div>` : ''}` : ''}
        </div>
      </div>`;
      detail.appendChild(card);

      card.querySelector('.book-desc-more')?.addEventListener('click', () => {
        const el = card.querySelector('.book-desc');
        el.textContent = desc;
      });

      // ── library actions ──────────────────────────────────────────────────────
      function setupListsButton() {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'position:relative;display:flex';
        const btn = document.createElement('button');
        btn.className = 'btn-update';
        btn.textContent = 'Lists ▾';
        btn.disabled = true;
        const drop = document.createElement('div');
        drop.style.cssText = 'display:none;position:absolute;left:0;top:calc(100% + 4px);background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:100;min-width:160px;padding:.25rem 0';
        wrap.append(btn, drop);
        btn.addEventListener('click', e => {
          e.stopPropagation();
          drop.style.display = drop.style.display === 'none' ? '' : 'none';
        });
        document.addEventListener('click', () => { drop.style.display = 'none'; });
        drop.addEventListener('click', e => e.stopPropagation());
        (async () => {
          try {
            let lists = await getLists(user.uid);
            if (!lists.find(l => l.isDefault)) {
              await ensureDefaultList(user.uid);
              lists = await getLists(user.uid);
            }
            const sortedLists = [
              ...lists.filter(l => l.isDefault),
              ...lists.filter(l => !l.isDefault),
            ];
            const membership = {};
            sortedLists.forEach(l => { membership[l.id] = (l.books || []).some(b => b.gbid === gbid); });
            function buildDrop() {
              drop.innerHTML = '';
              sortedLists.forEach(l => {
                const item = document.createElement('div');
                item.style.cssText = 'display:flex;align-items:center;gap:.5rem;padding:.4rem .75rem;cursor:pointer;font-size:.85rem';
                item.addEventListener('mouseenter', () => item.style.background = 'var(--bg-alt)');
                item.addEventListener('mouseleave', () => item.style.background = '');
                const check = document.createElement('span');
                check.style.cssText = 'color:var(--accent);width:1em;flex-shrink:0';
                check.textContent = membership[l.id] ? '✓' : '';
                const name = document.createElement('span');
                name.textContent = l.isDefault ? 'Reading list' : l.name;
                item.append(check, name);
                item.addEventListener('click', async e => {
                  e.stopPropagation();
                  item.style.opacity = '.5';
                  if (membership[l.id]) {
                    await removeBookFromList(user.uid, l.id, gbid);
                    membership[l.id] = false;
                  } else {
                    await addBookToList(user.uid, l.id, { gbid, title, author, coverUrl: cover });
                    membership[l.id] = true;
                  }
                  item.style.opacity = '';
                  buildDrop();
                });
                drop.appendChild(item);
              });
            }
            buildDrop();
            btn.disabled = false;
          } catch (e) { console.error('lists:', e); }
        })();
        return wrap;
      }

      if (!myBook) {
        const actionsCard = document.createElement('div');
        actionsCard.className = 'card';

        const btnRow = document.createElement('div');
        btnRow.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap';

        const startBtn    = document.createElement('button');
        startBtn.className = 'join-club-btn';
        startBtn.textContent = 'Start reading';

        const alreadyBtn  = document.createElement('button');
        alreadyBtn.className = 'btn-update';
        alreadyBtn.textContent = 'Mark as finished';

        btnRow.append(startBtn, alreadyBtn, setupListsButton());
        actionsCard.appendChild(btnRow);
        detail.appendChild(actionsCard);

        function showDone(msg) {
          actionsCard.innerHTML = `<div style="font-size:.85rem;color:var(--accent);font-weight:500">${msg}</div>`;
        }

        startBtn.addEventListener('click', async () => {
          startBtn.disabled = alreadyBtn.disabled = true;
          startBtn.textContent = 'Adding…';
          try {
            await addBook(user.uid, { title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear }, profile.username);
            showDone('Added to your currently reading!');
          } catch (e) {
            startBtn.textContent = 'Start reading';
            startBtn.disabled = alreadyBtn.disabled = false;
          }
        });

        alreadyBtn.addEventListener('click', () => {
          btnRow.remove();
          actionsCard.innerHTML = '';

          const starPicker    = createStarPicker(0);
          const ta            = document.createElement('textarea');
          ta.className = 'review-input'; ta.placeholder = 'Write a review… (optional)'; ta.rows = 3;
          ta.style.marginTop = '.5rem';

          const startedLabel  = document.createElement('div');
          startedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.6rem 0 .25rem';
          startedLabel.textContent = 'Date started (optional)';
          const startedPicker = createPartialDatePicker();

          const finishedLabel = document.createElement('div');
          finishedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.6rem 0 .25rem';
          finishedLabel.textContent = 'Date finished (optional)';
          const finishedPicker = createPartialDatePicker();

          const confirmBtn = document.createElement('button');
          confirmBtn.className = 'join-club-btn'; confirmBtn.textContent = 'Add to finished';
          confirmBtn.style.marginTop = '.75rem';

          const cancelBtn = document.createElement('button');
          cancelBtn.className = 'btn-update'; cancelBtn.textContent = 'Cancel';
          cancelBtn.style.marginTop = '.75rem';

          const formBtns = document.createElement('div');
          formBtns.style.cssText = 'display:flex;gap:.5rem;flex-wrap:wrap';
          formBtns.append(confirmBtn, cancelBtn);

          actionsCard.append(starPicker, ta, startedLabel, startedPicker, finishedLabel, finishedPicker, formBtns);

          cancelBtn.addEventListener('click', () => {
            actionsCard.innerHTML = '';
            actionsCard.appendChild(btnRow);
          });

          confirmBtn.addEventListener('click', async () => {
            confirmBtn.disabled = cancelBtn.disabled = true;
            confirmBtn.textContent = 'Adding…';
            try {
              const rating    = starPicker.getValue();
              const review    = ta.value.trim() || null;
              const { date: addedAt,    precision: startedPrec  } = startedPicker.getDate();
              const { date: finishedAt, precision: finishedPrec } = finishedPicker.getDate();
              await addFinishedBook(user.uid, {
                title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear,
                rating, review,
                finishedAt, finishedAtPrecision: finishedAt ? finishedPrec : undefined,
                addedAt,    addedAtPrecision:    addedAt    ? startedPrec  : undefined,
              }, profile.username);
              showDone('Added to your finished books!');
            } catch (e) {
              confirmBtn.textContent = 'Add to finished';
              confirmBtn.disabled = cancelBtn.disabled = false;
            }
          });
        });
      } else {
        const listsCard = document.createElement('div');
        listsCard.className = 'card';
        listsCard.appendChild(setupListsButton());
        detail.appendChild(listsCard);
      }


      const followingUids = following.map(f => f.uid);
      const [friendStatuses, listStatuses] = await Promise.all([
        getFriendBookStatus(followingUids, gbid),
        getFriendListStatus(following, gbid)
      ]);

      const listUids = new Set(listStatuses.map(f => f.uid));
      const readingListOnly = listStatuses.filter(f => !friendStatuses.some(s => s.uid === f.uid));

      if (friendStatuses.length || readingListOnly.length) {
        document.getElementById('friends-title').style.display = '';
        const list = document.getElementById('friends-list');

        function friendCard({ username, avatarUrl, avatarBorderColor }, statusHtml) {
          const avatarContent = avatarUrl
            ? `<img src="${esc(avatarUrl)}" alt="">`
            : esc(username[0].toUpperCase());
          const borderStyle = avatarBorderColor ? `border-color:${avatarBorderColor}` : '';
          const el = document.createElement('div');
          el.className = 'card';
          el.innerHTML = `<div class="friend-item">
            <a class="friend-avatar" href="../profile/?u=${esc(username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
            <div style="flex:1;min-width:0">
              <a href="../profile/?u=${esc(username)}" style="font-weight:600;font-size:.9rem;color:inherit;text-decoration:none">${esc(username)}</a>
              ${statusHtml}
            </div>
          </div>`;
          return el;
        }

        const tsVal  = ts => ts?.seconds ?? (ts?.toDate ? ts.toDate().getTime() / 1000 : 0);
        const fmtDate = (ts, prec) => {
          if (!ts?.toDate) return null;
          const d = ts.toDate();
          if (!prec || prec === 'month') return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
          if (prec === 'year') return String(d.getFullYear());
          return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        for (const { username, avatarUrl, avatarBorderColor, book } of friendStatuses) {
          if (book.status === 'reading') {
            const status = book.totalPages
              ? `Currently reading · page ${book.currentPage} of ${book.totalPages}`
              : 'Currently reading';
            list.appendChild(friendCard(
              { username, avatarUrl, avatarBorderColor },
              `<div style="font-size:.78rem;color:var(--text-muted);margin-top:.1rem">${status}</div>`
            ));
            continue;
          }

          const reads = (book.reads?.length > 0) ? [...book.reads] : [{
            finishedAt: book.finishedAt || null, finishedAtPrecision: book.finishedAtPrecision || null,
            rating: book.rating || null, review: book.review || null,
          }];
          reads.sort((a, b) => tsVal(b.finishedAt) - tsVal(a.finishedAt));

          const card = friendCard({ username, avatarUrl, avatarBorderColor }, '');
          const contentEl = card.querySelector('.friend-item > div');

          let selectedIdx = 0;
          const metaEl = document.createElement('div');

          function renderRead(idx) {
            const r = reads[idx];
            const dateStr = fmtDate(r.finishedAt, r.finishedAtPrecision);
            let html = `<div style="font-size:.78rem;color:var(--text-muted);margin-top:.1rem">Finished${dateStr ? ` · ${dateStr}` : ''}</div>`;
            if (r.rating) html += renderStars(r.rating);
            if (r.review) html += `<div style="font-size:.78rem;color:var(--text-muted);font-style:italic;margin-top:.2rem;line-height:1.4">${esc(r.review.slice(0, 150))}${r.review.length > 150 ? '…' : ''}</div>`;
            metaEl.innerHTML = html;
          }
          renderRead(0);
          contentEl.appendChild(metaEl);

          if (reads.length > 1) {
            const switcherEl = document.createElement('div');
            switcherEl.style.cssText = 'display:flex;gap:.3rem;margin-top:.35rem;flex-wrap:wrap';
            reads.forEach((rd, i) => {
              const label = fmtDate(rd.finishedAt, rd.finishedAtPrecision) || '—';
              const pill = document.createElement('button');
              pill.type = 'button';
              pill.textContent = label;
              pill.style.cssText = `font-size:.7rem;padding:.15rem .45rem;border-radius:20px;border:1px solid ${i === 0 ? 'var(--accent)' : 'var(--border)'};background:none;cursor:pointer;color:${i === 0 ? 'var(--accent)' : 'var(--text-muted)'};font-family:inherit`;
              pill.addEventListener('click', () => {
                selectedIdx = i;
                renderRead(i);
                switcherEl.querySelectorAll('button').forEach((b, j) => {
                  const sel = j === i;
                  b.style.borderColor = sel ? 'var(--accent)' : 'var(--border)';
                  b.style.color       = sel ? 'var(--accent)' : 'var(--text-muted)';
                });
              });
              switcherEl.appendChild(pill);
            });
            contentEl.appendChild(switcherEl);
          }

          list.appendChild(card);
        }

        for (const { username, avatarUrl, avatarBorderColor, listNames } of readingListOnly) {
          const label = listNames.length === 1 ? esc(listNames[0]) : listNames.map(esc).join(', ');
          list.appendChild(friendCard(
            { username, avatarUrl, avatarBorderColor },
            `<div style="font-size:.78rem;color:var(--text-muted);margin-top:.1rem">On list: ${label}</div>`
          ));
        }
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
