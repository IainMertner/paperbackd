<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Book Clubs - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd</a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">Feed</a>
        <a href="../clubs/"    data-nav="clubs">Clubs</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../stats/"    data-nav="stats">Stats</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">


    <div class="join-club card">
      <div class="join-club-label">Join a club</div>
      <div class="join-club-row">
        <input class="join-club-input" type="text" placeholder="Enter invite code" maxlength="12" autocomplete="off" spellcheck="false">
        <button class="join-club-btn">Join</button>
      </div>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      Stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    try { await requireAuth(); } finally { document.body.classList.remove('auth-loading'); }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
