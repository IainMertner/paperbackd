  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="ink-edge" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
      <filter id="brush-line" x="-1%" y="-600%" width="102%" height="1300%">
        <feMorphology operator="dilate" radius="0 1" result="thick"/>
        <feTurbulence type="fractalNoise" baseFrequency="0.018 0.45" numOctaves="4" seed="8" result="noise"/>
        <feDisplacementMap in="thick" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">

    <div class="profile-meta-row">
      <div class="avatar-ink-ring">
        <svg class="avatar-ring-svg" viewBox="0 0 88 88" aria-hidden="true"><circle cx="44" cy="44" r="44" filter="url(#ink-edge)" style="fill:var(--ring-color,var(--accent))"/></svg>
        <div class="profile-avatar-sm" id="profile-avatar"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0;flex:1;min-width:0">
        <div class="profile-display-name" id="profile-display-name"></div>
        <div style="display:flex;align-items:center;gap:.2rem;flex-wrap:wrap">
          <div class="profile-username" id="profile-username"></div>
          <div id="own-actions" style="display:none;position:relative">
            <button id="profile-menu-btn" class="profile-action-btn profile-action-secondary profile-action-icon" aria-label="Settings" title="Settings">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
            <div id="profile-menu" style="display:none;position:absolute;top:calc(100% + .35rem);left:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:50;min-width:140px;overflow:hidden">
              <a href="../edit-profile/" style="display:block;padding:.5rem .85rem;font-size:.875rem;color:var(--text);text-decoration:none">Edit profile</a>
              <a href="../settings/"     style="display:block;padding:.5rem .85rem;font-size:.875rem;color:var(--text);text-decoration:none">Settings</a>
              <button id="dropdown-signout-btn" style="display:block;width:100%;padding:.5rem .85rem;font-size:.875rem;color:var(--error,#e05252);text-decoration:none;background:none;border:none;text-align:left;cursor:pointer;font-family:inherit;border-top:1px solid var(--border)">Sign out</button>
            </div>
          </div>
          <div id="profile-actions" hidden>
            <button id="follow-btn" class="profile-action-btn profile-action-secondary profile-action-icon" aria-label="Follow" title="Follow">
              <svg id="follow-icon" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <hr class="profile-rule">

    <div class="profile-books-section" id="books-section" style="display:none">
      <div id="shelf-card" class="profile-book-card" style="display:none;flex:1;min-width:0;border-radius:var(--radius);padding:.625rem">
        <div class="profile-books-label" id="shelf-label">shelf</div>
        <div class="shelf-covers" id="shelf-covers"></div>
      </div>
      <div id="activity-card" class="profile-book-card" style="display:none;flex:1;min-width:0;border-radius:var(--radius);padding:.625rem">
        <div class="profile-books-label" id="activity-label">activity</div>
        <div class="shelf-covers" id="activity-covers"></div>
      </div>
    </div>

    <div class="profile-zine-links">
      <a class="profile-zine-link" id="network-link" href="../network/">
        network
        <span style="display:flex;align-items:center;gap:.5rem">
          <span style="font-size:.8rem;color:var(--text-muted)"><span id="stat-followers">—</span> followers · <span id="stat-following">—</span> following</span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <a class="profile-zine-link" id="library-link" href="../library/">
        library
        <span style="display:flex;align-items:center;gap:.5rem">
          <span id="stat-books" style="font-size:.8rem;color:var(--text-muted)"></span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <a class="profile-zine-link" id="lists-link" href="../lists/">
        <span>lists</span>
        <span style="display:flex;align-items:center;gap:.5rem">
          <span id="lists-count" style="font-size:.8rem;color:var(--text-muted)"></span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </span>
      </a>
      <a class="profile-zine-link" id="stats-link" href="../stats/">
        stats
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">

        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>

      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>

        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getFollowers, getProfile, getBookCount, getListCount, getReadingBooks, getRecentlyFinishedBooks, followUser, unfollowUser, logOut, ROOT, updateShelf, getBooks, updateAvatarUrl, updateAvatarBorderColor } from '../js/firebase.js';

    const { user, profile: myProfile } = await requireAuth();
    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    const isOwn       = !targetParam || targetParam === myProfile.username;

    const COVER_ROTATIONS = [-1.8, 1.4, -2.1, 0.9, 1.7, -1.2, 2.3, -0.8];

    function renderCovers(items, containerId, cardId, max = 4) {
      const coversEl = document.getElementById(containerId);
      const filled = items.filter(i => i.coverUrl).slice(0, max);
      filled.forEach((item, idx) => {
        const a = document.createElement('a');
        a.href = `../book/?gbid=${encodeURIComponent(item.gbid)}`;
        a.style.cssText = 'text-decoration:none;display:block';
        a.style.transform = `rotate(${COVER_ROTATIONS[idx % COVER_ROTATIONS.length]}deg)`;
        const img = document.createElement('img');
        img.src = item.coverUrl; img.alt = item.title || ''; img.className = 'shelf-cover';
        a.appendChild(img);
        coversEl.appendChild(a);
      });
      for (let i = filled.length; i < max; i++) {
        const slot = document.createElement('div');
        slot.className = 'shelf-cover-empty';
        slot.style.transform = `rotate(${COVER_ROTATIONS[i % COVER_ROTATIONS.length]}deg)`;
        coversEl.appendChild(slot);
      }
      document.getElementById(cardId).style.display = '';
    }

    function renderShelf(shelf, onEmptyClick) {
      document.getElementById('shelf-covers').innerHTML = '';
      renderCovers(shelf || [], 'shelf-covers', 'shelf-card');
      if (onEmptyClick) {
        document.getElementById('shelf-covers').querySelectorAll('.shelf-cover-empty').forEach(el => {
          el.style.cursor = 'pointer';
          el.addEventListener('click', onEmptyClick);
        });
      }
    }

    const THEMES = [
      { label: 'Grey',       color: '#6C6460' },
      { label: 'Olive',      color: '#6B7B3A' },
      { label: 'Yellow',     color: '#D4AA55' },
      { label: 'Terracotta', color: '#B85C3A' },
      { label: 'Teal',       color: '#3A9E8C' },
      { label: 'Burgundy',   color: '#7A2E40' },
      { label: 'Slate',      color: '#2E62A0' },
      { label: 'Rose',       color: '#C95C80' },
    ];

    function openProfileEdit() {
      let pendingAvatarUrl = null;
      let selectedTheme = myProfile.avatarBorderColor || THEMES[0].color;

      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem;max-width:300px;width:100%;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';

      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', close);

      const heading = document.createElement('div');
      heading.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:1rem';
      heading.textContent = 'Profile';

      // Avatar
      const avatarWrap = document.createElement('div');
      avatarWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:.4rem;margin-bottom:1rem;cursor:pointer';
      const avatarPreview = document.createElement('div');
      avatarPreview.className = 'profile-avatar-lg';
      avatarPreview.style.cssText = 'transition:filter .18s';
      avatarWrap.addEventListener('mouseenter', () => { avatarPreview.style.filter = 'brightness(0.72)'; });
      avatarWrap.addEventListener('mouseleave', () => { avatarPreview.style.filter = ''; });

      function showPreview(url) {
        if (url) avatarPreview.innerHTML = `<img src="${url}" alt="">`;
        else avatarPreview.textContent = myProfile.username[0].toUpperCase();
      }
      showPreview(myProfile.avatarUrl);

      const fileInput = document.createElement('input');
      fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
      avatarWrap.addEventListener('click', () => fileInput.click());

      const changeLabel = document.createElement('div');
      changeLabel.style.cssText = 'font-size:.75rem;color:var(--text-muted)';
      changeLabel.textContent = 'Change photo';

      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        try {
          pendingAvatarUrl = await new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
              URL.revokeObjectURL(url);
              const SIZE = 256, scale = Math.min(SIZE / img.width, SIZE / img.height, 1);
              const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(canvas.toDataURL('image/jpeg', 0.82));
            };
            img.onerror = reject;
            img.src = url;
          });
          showPreview(pendingAvatarUrl);
        } catch { alert('Could not load that image.'); }
        finally { fileInput.value = ''; }
      });

      avatarWrap.append(avatarPreview, changeLabel, fileInput);

      // Theme
      const themeLabel = document.createElement('div');
      themeLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.5rem';
      themeLabel.textContent = 'Theme colour';

      const swatches = document.createElement('div');
      swatches.style.cssText = 'display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem';

      function renderSwatches() {
        swatches.innerHTML = '';
        THEMES.forEach(({ color }) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = `width:1.75rem;height:1.75rem;border-radius:50%;background:${color};cursor:pointer;border:3px solid ${color === selectedTheme ? 'var(--text)' : 'transparent'};transition:border-color .15s;flex-shrink:0`;
          btn.addEventListener('click', () => {
            selectedTheme = color;
            document.documentElement.style.setProperty('--ring-color', color);
            renderSwatches();
          });
          swatches.appendChild(btn);
        });
      }
      renderSwatches();

      // Save
      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save'; saveBtn.className = 'btn-update';
      saveBtn.style.cssText = 'width:100%';
      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          const saves = [];
          if (pendingAvatarUrl) {
            saves.push(updateAvatarUrl(user.uid, pendingAvatarUrl));
            myProfile.avatarUrl = pendingAvatarUrl;
            const el = document.getElementById('profile-avatar');
            el.innerHTML = `<img src="${pendingAvatarUrl}" alt="">`;
          }
          if (selectedTheme !== myProfile.avatarBorderColor) {
            saves.push(updateAvatarBorderColor(user.uid, selectedTheme));
            myProfile.avatarBorderColor = selectedTheme;
          }
          await Promise.all(saves);
          const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
          if (pendingAvatarUrl) cached.avatarUrl = pendingAvatarUrl;
          cached.avatarBorderColor = selectedTheme;
          localStorage.setItem('rl_profile', JSON.stringify(cached));
          close();
        } catch { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
      });

      modal.append(closeBtn, heading, avatarWrap, themeLabel, swatches, saveBtn);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }

    let _allBooks = null;

    function openShelfEdit() {
      let items = (myProfile.shelf || []).map(i => ({ ...i }));

      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem;max-width:360px;width:100%;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';

      const close = () => overlay.remove();
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', close);

      const heading = document.createElement('div');
      heading.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.75rem';
      heading.textContent = 'Edit shelf';

      const list = document.createElement('div');
      list.className = 'shelf-edit-list';

      const searchWrap = document.createElement('div');
      searchWrap.style.cssText = 'position:relative;margin-bottom:.75rem';

      const searchInput = document.createElement('input');
      searchInput.type = 'text';
      searchInput.placeholder = 'Add a book from your library…';
      searchInput.className = 'join-club-input';
      searchInput.style.cssText = 'width:100%;box-sizing:border-box';

      const suggestions = document.createElement('div');
      suggestions.className = 'book-suggestions';
      suggestions.style.display = 'none';
      searchWrap.append(searchInput, suggestions);

      let dragIdx = null;

      function renderList() {
        list.innerHTML = '';
        items.forEach((item, i) => {
          const div = document.createElement('div');
          div.className = 'shelf-edit-item';
          div.draggable = true;
          div.style.cursor = 'grab';
          const img = document.createElement('img');
          img.className = 'shelf-edit-cover'; img.src = item.coverUrl || ''; img.alt = '';
          const btn = document.createElement('button');
          btn.type = 'button'; btn.className = 'shelf-edit-remove'; btn.textContent = '×';
          btn.addEventListener('click', () => { items.splice(i, 1); renderList(); syncSearch(); });
          const title = document.createElement('div');
          title.className = 'shelf-edit-title'; title.textContent = item.title || '';
          div.append(img, btn, title);

          div.addEventListener('dragstart', e => {
            dragIdx = i; e.dataTransfer.effectAllowed = 'move';
            requestAnimationFrame(() => { div.style.opacity = '0.35'; });
          });
          div.addEventListener('dragend', () => {
            div.style.opacity = '';
            list.querySelectorAll('.shelf-edit-item').forEach(el => el.style.outline = '');
            dragIdx = null;
          });
          div.addEventListener('dragover', e => {
            e.preventDefault();
            list.querySelectorAll('.shelf-edit-item').forEach(el => el.style.outline = '');
            if (dragIdx !== null && i !== dragIdx) div.style.outline = '2px solid var(--accent)';
          });
          div.addEventListener('drop', e => {
            e.preventDefault();
            if (dragIdx === null || dragIdx === i) return;
            const moved = items.splice(dragIdx, 1)[0];
            items.splice(i, 0, moved);
            renderList();
          });

          list.appendChild(div);
        });
        syncSearch();
      }

      function syncSearch() {
        searchWrap.style.display = items.length >= 4 ? 'none' : '';
      }

      searchInput.addEventListener('input', async () => {
        const q = searchInput.value.trim().toLowerCase();
        if (!q) { suggestions.style.display = 'none'; return; }
        if (!_allBooks) _allBooks = await getBooks(user.uid);
        const alreadyIn = new Set(items.map(i => i.gbid).filter(Boolean));
        const matches = _allBooks.filter(b => b.coverUrl && b.gbid && !alreadyIn.has(b.gbid) &&
          (b.title?.toLowerCase().includes(q) || b.author?.toLowerCase().includes(q))
        ).slice(0, 6);
        suggestions.innerHTML = '';
        if (!matches.length) { suggestions.style.display = 'none'; return; }
        matches.forEach(book => {
          const row = document.createElement('div');
          row.className = 'book-suggestion-item';
          row.style.cssText = 'display:flex;align-items:center;gap:.5rem';
          if (book.coverUrl) {
            const img = document.createElement('img');
            img.src = book.coverUrl; img.alt = ''; img.style.cssText = 'width:24px;height:36px;object-fit:cover;border-radius:2px;flex-shrink:0';
            row.appendChild(img);
          }
          const label = document.createElement('span');
          label.textContent = book.title || '';
          row.appendChild(label);
          row.addEventListener('click', () => {
            items.push({ gbid: book.gbid, title: book.title, coverUrl: book.coverUrl });
            searchInput.value = ''; suggestions.style.display = 'none';
            renderList();
          });
          suggestions.appendChild(row);
        });
        suggestions.style.display = '';
      });

      document.addEventListener('click', e => {
        if (!suggestions.contains(e.target) && e.target !== searchInput) suggestions.style.display = 'none';
      });

      const saveBtn = document.createElement('button');
      saveBtn.textContent = 'Save'; saveBtn.className = 'btn-update';
      saveBtn.style.cssText = 'margin-top:.25rem;width:100%';
      saveBtn.addEventListener('click', async () => {
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…';
        try {
          await updateShelf(user.uid, items);
          myProfile.shelf = items;
          const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
          cached.shelf = items;
          localStorage.setItem('rl_profile', JSON.stringify(cached));
          renderShelf(items, openShelfEdit);
          close();
        } catch {
          saveBtn.disabled = false; saveBtn.textContent = 'Save';
        }
      });

      modal.append(closeBtn, heading, list, searchWrap, saveBtn);
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      renderList();
    }

    function renderActivity(readingBooks, finishedBooks) {
      const items = [
        ...readingBooks.filter(i => i.coverUrl).map(b => ({ ...b, isReading: true })),
        ...finishedBooks.filter(i => i.coverUrl)
      ].slice(0, 4);
      const nReading  = items.filter(i => i.isReading).length;
      const nFinished = items.filter(i => !i.isReading).length;
      const parts = [];
      if (nReading)  parts.push(`${nReading} currently reading`);
      if (nFinished) parts.push(`${nFinished} recently finished`);
      const summaryEl = document.getElementById('activity-summary');
      if (summaryEl) summaryEl.innerHTML = parts.map((p, i) => i === 0 ? p : `<span style="border-left:2px solid var(--border);margin-left:.5rem;padding-left:.5rem">${p}</span>`).join('');
      const coversEl = document.getElementById('activity-covers');
      items.forEach((item, idx) => {
        const a = document.createElement('a');
        a.href = `../book/?gbid=${encodeURIComponent(item.gbid)}`;
        a.style.cssText = 'text-decoration:none';
        a.style.transform = `rotate(${COVER_ROTATIONS[idx % COVER_ROTATIONS.length]}deg)`;
        const img = document.createElement('img');
        img.src = item.coverUrl; img.alt = item.title || ''; img.className = 'shelf-cover';
        a.appendChild(img);
        if (!item.isReading) {
          const sym = document.createElement('div');
          sym.style.cssText = 'position:absolute;top:5px;right:5px;font-size:.7rem;font-weight:700;color:#fff;text-shadow:0 0 4px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.7);pointer-events:none;line-height:1';
          sym.textContent = '✓';
          a.appendChild(sym);
        }
        if (item.isReading && item.totalPages > 0) {
          const pct = Math.min(100, Math.round((item.currentPage / item.totalPages) * 100));
          const track = document.createElement('div');
          track.className = 'cover-progress-track';
          const bar = document.createElement('div');
          bar.className = 'cover-progress';
          bar.style.width = pct + '%';
          track.appendChild(bar);
          a.appendChild(track);
        } else if (!item.isReading && item.rating != null) {
          const badge = document.createElement('div');
          badge.style.cssText = 'position:absolute;bottom:5px;right:4px;font-size:.65rem;font-weight:700;color:#fff;text-shadow:0 0 4px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.7);pointer-events:none;line-height:1.5';
          badge.textContent = '★ ' + item.rating;
          a.appendChild(badge);
        }
        coversEl.appendChild(a);
      });
      for (let i = items.length; i < 4; i++) {
        const slot = document.createElement('div');
        slot.className = 'shelf-cover-empty';
        slot.style.transform = `rotate(${COVER_ROTATIONS[i % COVER_ROTATIONS.length]}deg)`;
        coversEl.appendChild(slot);
      }
      document.getElementById('activity-card').style.display = '';
      document.getElementById('books-section').style.display = '';
    }

    function fitDisplayName(el) {
      el.style.fontSize = '';
      let size = parseFloat(getComputedStyle(el).fontSize);
      while (el.scrollWidth > el.offsetWidth && size > 14) {
        size -= 2;
        el.style.fontSize = size + 'px';
      }
    }

    try {
      if (isOwn) {
        if (myProfile.avatarBorderColor) document.documentElement.style.setProperty('--ring-color', myProfile.avatarBorderColor);
        document.getElementById('profile-display-name').innerHTML = (myProfile.displayName || myProfile.username) + '<span class="title-dot">.</span>';
        fitDisplayName(document.getElementById('profile-display-name'));
        document.getElementById('profile-username').textContent = '@' + myProfile.username;
        const avatarEl = document.getElementById('profile-avatar');
        if (myProfile.avatarUrl) { avatarEl.innerHTML  = `<img src="${myProfile.avatarUrl}" alt="">`; }
        else                     { avatarEl.textContent = myProfile.username[0].toUpperCase(); }
        const inkRing = document.querySelector('.avatar-ink-ring');
        inkRing.style.cursor = 'pointer';
        inkRing.addEventListener('click', openProfileEdit);
        renderShelf(myProfile.shelf, openShelfEdit);
        document.getElementById('shelf-label').innerHTML = `shelf<span id="shelf-edit-btn" style="font-size:.65rem;color:color-mix(in srgb,var(--text-muted) 65%,var(--bg));margin-left:.5rem;padding-left:.5rem;border-left:2px solid var(--border);cursor:pointer">edit</span>`;
        document.getElementById('shelf-edit-btn').addEventListener('click', openShelfEdit);
        document.getElementById('activity-label').innerHTML = `<a href="../activity/?u=${encodeURIComponent(myProfile?.username || '')}" style="color:inherit;text-decoration:none">activity</a><span id="activity-summary" style="font-size:.65rem;color:color-mix(in srgb,var(--text-muted) 65%,var(--bg));margin-left:.5rem;padding-left:.5rem;border-left:2px solid var(--border)"></span>`;
        Promise.all([getReadingBooks(user.uid), getRecentlyFinishedBooks(user.uid)])
          .then(([reading, finished]) => renderActivity(reading, finished))
          .catch(() => { document.getElementById('books-section').style.display = ''; });
        document.getElementById('own-actions').style.display = '';
        const profileMenuBtn = document.getElementById('profile-menu-btn');
        const profileMenu    = document.getElementById('profile-menu');
        profileMenuBtn.addEventListener('click', e => {
          e.stopPropagation();
          profileMenu.style.display = profileMenu.style.display === 'none' ? 'block' : 'none';
        });
        document.addEventListener('click', () => { profileMenu.style.display = 'none'; });
        document.getElementById('dropdown-signout-btn').addEventListener('click', async () => {
          await logOut();
          location.replace(ROOT + 'login/');
        });
        document.getElementById('stat-following').textContent = (myProfile.following || myProfile.friends || []).length;
        document.getElementById('stats-link').href = `../stats/?u=${encodeURIComponent(myProfile.username)}`;
        getFollowers(user.uid).then(f => {
          document.getElementById('stat-followers').textContent = f.length;
        });
        getBookCount(user.uid).then(n => {
          document.getElementById('stat-books').textContent = `${n} book${n === 1 ? '' : 's'}`;
        });
        getListCount(user.uid).then(n => {
          document.getElementById('lists-count').textContent = n;
        });
      } else {

        const [target, myFreshProfile] = await Promise.all([
          getProfileByUsername(targetParam),
          getProfile(user.uid)
        ]);

        if (!target) {
          document.getElementById('profile-display-name').textContent = 'User not found.';
        } else {
          if (target.avatarBorderColor) document.documentElement.style.setProperty('--ring-color', target.avatarBorderColor);
          const avatarEl = document.getElementById('profile-avatar');
          if (target.avatarUrl) { avatarEl.innerHTML = `<img src="${target.avatarUrl}" alt="">`; }
          else                  { avatarEl.textContent = target.username[0].toUpperCase(); }
          document.getElementById('profile-display-name').innerHTML = (target.displayName || target.username) + '<span class="title-dot">.</span>';
          fitDisplayName(document.getElementById('profile-display-name'));
          document.getElementById('profile-username').textContent = '@' + target.username;
          renderShelf(target.shelf);
          document.getElementById('activity-label').innerHTML = `<a href="../activity/?u=${encodeURIComponent(target.username)}" style="color:inherit;text-decoration:none">activity</a><span id="activity-summary" style="font-size:.65rem;color:color-mix(in srgb,var(--text-muted) 65%,var(--bg));margin-left:.5rem;padding-left:.5rem;border-left:2px solid var(--border)"></span>`;
          Promise.all([getReadingBooks(target.uid), getRecentlyFinishedBooks(target.uid)])
            .then(([reading, finished]) => renderActivity(reading, finished))
            .catch(() => { document.getElementById('books-section').style.display = ''; });
          document.getElementById('stat-following').textContent = (target.following || []).length;
          document.getElementById('stats-link').href   = `../stats/?u=${encodeURIComponent(target.username)}`;
          document.getElementById('library-link').href = `../library/?u=${encodeURIComponent(target.username)}`;
          document.getElementById('lists-link').href   = `../lists/?u=${encodeURIComponent(target.username)}`;
          document.getElementById('network-link').href = `../network/?u=${encodeURIComponent(target.username)}`;
          getFollowers(target.uid).then(f => {
            document.getElementById('stat-followers').textContent = f.length;
          });
          getBookCount(target.uid).then(n => {
            document.getElementById('stat-books').textContent = `${n} book${n === 1 ? '' : 's'}`;
          });
          getListCount(target.uid).then(n => {
            document.getElementById('lists-count').textContent = n;
          });

          const myFollowing = myFreshProfile?.following || myProfile.following || myProfile.friends || [];
          let isFollowing   = myFollowing.includes(target.uid);

          const profileActions = document.getElementById('profile-actions');
          const followBtn      = document.getElementById('follow-btn');
          profileActions.hidden = false;

          const ICON_FOLLOW    = `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>`;
          const ICON_FOLLOWING = `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></svg>`;
          function updateFollowBtn() {
            followBtn.innerHTML = isFollowing ? ICON_FOLLOWING : ICON_FOLLOW;
            followBtn.setAttribute('aria-label', isFollowing ? 'Following' : 'Follow');
            followBtn.setAttribute('title', isFollowing ? 'Following' : 'Follow');
          }
          updateFollowBtn();

          followBtn.addEventListener('click', async () => {
            followBtn.disabled = true;
            try {
              if (isFollowing) {
                await unfollowUser(user.uid, target.uid);
                isFollowing = false;
              } else {
                await followUser(user.uid, target.username);
                isFollowing = true;
              }
              updateFollowBtn();
            } finally {
              followBtn.disabled = false;
            }
          });
        }
      }

    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
