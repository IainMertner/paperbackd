<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title">search<span class="title-dot">.</span></h1>
    <div style="display:flex;gap:.5rem;margin-bottom:.65rem">
      <button id="tab-books"   class="search-tab-btn active">Books</button>
      <button id="tab-authors" class="search-tab-btn">Authors</button>
      <button id="tab-users"   class="search-tab-btn">Users</button>
    </div>
    <div class="book-search-wrap" id="search-wrap" style="margin-bottom:.9rem">
      <input type="search" id="search-input" class="join-club-input"
        placeholder="Search for a book…" autocomplete="off" spellcheck="false"
        style="width:100%;box-sizing:border-box;font-size:1rem;padding:.6rem .75rem">
    </div>
    <div id="search-results"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { searchUsers } from '../js/firebase.js';

    const { user } = await requireAuth();
    document.body.classList.remove('auth-loading');

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';
    const input      = document.getElementById('search-input');
    const results    = document.getElementById('search-results');
    const tabBooks   = document.getElementById('tab-books');
    const tabAuthors = document.getElementById('tab-authors');
    const tabUsers   = document.getElementById('tab-users');
    let timer;
    let activeTab = 'books';

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const RECENTS_KEY = 'rl_recents';
    const RECENTS_MAX = 8;

    function getRecents() {
      try { return JSON.parse(localStorage.getItem(RECENTS_KEY) || '[]'); } catch { return []; }
    }
    function saveRecent(item) {
      const list = getRecents().filter(r => r.href !== item.href);
      list.unshift(item);
      localStorage.setItem(RECENTS_KEY, JSON.stringify(list.slice(0, RECENTS_MAX)));
    }
    function renderRecents() {
      results.innerHTML = '';
      const list = getRecents();
      if (!list.length) return;
      const hdr = document.createElement('div');
      hdr.style.cssText = 'font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:.35rem';
      hdr.textContent = 'Recently viewed';
      results.appendChild(hdr);
      list.forEach(item => {
        const a = document.createElement('a');
        a.href = item.href;
        a.className = 'search-result-row';
        a.style.textDecoration = 'none';
        let coverHtml;
        if (item.type === 'user') {
          const bs = item.borderColor ? `border-color:${esc(item.borderColor)}` : '';
          const inner = item.coverUrl
            ? `<img src="${esc(item.coverUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
            : esc(item.initial);
          coverHtml = `<div class="friend-avatar" style="flex-shrink:0;${bs}">${inner}</div>`;
        } else if (item.isRound) {
          coverHtml = item.coverUrl
            ? `<img class="search-result-cover" src="${esc(item.coverUrl)}" alt="" style="border-radius:50%;object-fit:cover">`
            : `<div class="search-result-cover search-result-cover-placeholder" style="border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem">${esc(item.initial)}</div>`;
        } else {
          coverHtml = item.coverUrl
            ? `<img class="search-result-cover" src="${esc(item.coverUrl)}" alt="">`
            : `<div class="search-result-cover search-result-cover-placeholder"></div>`;
        }
        a.innerHTML = `${coverHtml}<div class="search-result-info">
          <div class="search-result-title" style="font-size:.9rem">${esc(item.label)}</div>
          ${item.sublabel ? `<div class="search-result-meta">${esc(item.sublabel)}</div>` : ''}
        </div>`;
        results.appendChild(a);
      });
    }

    const tabDefs = [
      { id: 'books',   btn: tabBooks,   placeholder: 'Search for a book…' },
      { id: 'authors', btn: tabAuthors, placeholder: 'Search for an author…' },
      { id: 'users',   btn: tabUsers,   placeholder: 'Search for a user…' },
    ];

    function setTab(tab) {
      activeTab = tab;
      tabDefs.forEach(t => {
        const active = t.id === tab;
        t.btn.classList.toggle('active', active);
        if (active) input.placeholder = t.placeholder;
      });
      const q = input.value.trim();
      if (q) runSearch(q); else renderRecents();
    }

    tabBooks.addEventListener('click',   () => setTab('books'));
    tabAuthors.addEventListener('click', () => setTab('authors'));
    tabUsers.addEventListener('click',   () => setTab('users'));

    input.addEventListener('input', () => {
      clearTimeout(timer);
      const q = input.value.trim();
      if (!q) { renderRecents(); return; }
      timer = setTimeout(() => runSearch(q), 280);
    });

    function runSearch(q) {
      if (activeTab === 'books')        fetchBooks(q);
      else if (activeTab === 'authors') fetchAuthors(q);
      else                              fetchUsers(q);
    }

    function showToast(msg) {
      let t = document.getElementById('global-toast');
      if (!t) { t = document.createElement('div'); t.id = 'global-toast'; t.className = 'global-toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('visible'), 5000);
    }

    async function fetchBooks(q) {
      results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Searching…</p>';
      try {
        const res  = await fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query($q:String!){search(query:$q,query_type:"Book",per_page:20){results}}`,
            variables: { q }
          })
        });
        if (res.status === 429) { results.innerHTML = ''; showToast('Our servers are busy — give it a moment and try again.'); return; }
        const data = await res.json();
        const hits = data?.data?.search?.results?.hits || [];
        renderBooks(hits.map(h => h.document));
      } catch (e) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Search failed. Please try again.</p>';
      }
    }

    async function fetchAuthors(q) {
      results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Searching…</p>';
      try {
        const res = await fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query($q:String!){search(query:$q,query_type:"Author",per_page:20){results}}`,
            variables: { q }
          })
        });
        if (res.status === 429) { results.innerHTML = ''; showToast('Our servers are busy — give it a moment and try again.'); return; }
        const data = await res.json();
        const hits = data?.data?.search?.results?.hits || [];
        renderAuthors(hits.map(h => h.document));
      } catch (e) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Search failed. Please try again.</p>';
      }
    }

    function renderAuthors(docs) {
      if (!docs.length) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">No results found.</p>';
        return;
      }
      results.innerHTML = '';
      docs.forEach(doc => {
        const slug  = doc.slug || String(doc.id);
        const name  = doc.name || '';
        const image = doc.image?.url || '';
        const a = document.createElement('a');
        a.href = `../author/?slug=${encodeURIComponent(slug)}`;
        a.className = 'search-result-row';
        a.innerHTML = image
          ? `<img class="search-result-cover" src="${esc(image)}" alt="" style="border-radius:50%;object-fit:cover">`
          : `<div class="search-result-cover search-result-cover-placeholder" style="border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem">${esc((name[0] || '?').toUpperCase())}</div>`;
        a.innerHTML += `<div class="search-result-info"><div class="search-result-title">${esc(name)}</div></div>`;
        a.addEventListener('click', () => saveRecent({
          type: 'author', label: name, sublabel: '', coverUrl: image,
          href: a.href, initial: (name[0] || '?').toUpperCase(), isRound: true, borderColor: '',
        }));
        results.appendChild(a);
      });
    }

    async function fetchUsers(q) {
      results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Searching…</p>';
      try {
        const users = await searchUsers(q, user.uid);
        renderUsers(users);
      } catch (e) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">Search failed. Please try again.</p>';
      }
    }

    function renderBooks(docs) {
      if (!docs.length) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">No results found.</p>';
        return;
      }
      results.innerHTML = '';
      docs.forEach(doc => {
        const slug   = doc.slug || String(doc.id);
        const title  = doc.title || '';
        const author = Array.isArray(doc.author_names) ? doc.author_names[0] : (doc.author_names || '');
        const cover  = doc.image?.url || '';
        const year   = doc.release_year || '';

        const a = document.createElement('a');
        a.href = `../book/?gbid=${encodeURIComponent(slug)}`;
        a.className = 'search-result-row';
        a.innerHTML = cover
          ? `<img class="search-result-cover" src="${esc(cover)}" alt="">`
          : `<div class="search-result-cover search-result-cover-placeholder"></div>`;
        a.innerHTML += `<div class="search-result-info">
          <div class="search-result-title">${esc(title)}</div>
          <div class="search-result-meta">${author ? esc(author) : ''}${author && year ? ' · ' : ''}${year ? esc(String(year)) : ''}</div>
        </div>`;
        a.addEventListener('click', () => saveRecent({
          type: 'book', label: title,
          sublabel: [author, year ? String(year) : ''].filter(Boolean).join(' · '),
          coverUrl: cover, href: a.href, initial: (title[0] || '?').toUpperCase(),
          isRound: false, borderColor: '',
        }));
        results.appendChild(a);
      });
    }

    function renderUsers(users) {
      if (!users.length) {
        results.innerHTML = '<p style="color:var(--text-muted);font-size:.85rem">No users found.</p>';
        return;
      }
      results.innerHTML = '';
      users.forEach(u => {
        const a = document.createElement('a');
        a.href = `../profile/?u=${encodeURIComponent(u.username)}`;
        a.className = 'search-result-row';
        a.style.textDecoration = 'none';
        const initial = (u.username?.[0] || '?').toUpperCase();
        const borderStyle = u.avatarBorderColor ? `border-color:${esc(u.avatarBorderColor)}` : '';
        const avatarInner = u.avatarUrl
          ? `<img src="${esc(u.avatarUrl)}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
          : esc(initial);
        a.innerHTML = `<div class="friend-avatar" style="flex-shrink:0;${borderStyle}">${avatarInner}</div>
          <div class="search-result-info">
            <div class="search-result-title" style="font-size:.9rem">${esc(u.username)}</div>
          </div>`;
        a.addEventListener('click', () => saveRecent({
          type: 'user', label: u.username, sublabel: '', coverUrl: u.avatarUrl || '',
          href: a.href, initial, isRound: true, borderColor: u.avatarBorderColor || '',
        }));
        results.appendChild(a);
      });
    }

    renderRecents();
    input.focus();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
