<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>feed - paperbackd</title>

</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="./"           data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>

      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title">feed<span class="title-dot">.</span></h1>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="./" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getFeed, getProfile, getBookByGbid, removeActivityEvent, toggleReaction, db } from '../js/firebase.js';
    import { doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const { user } = await requireAuth();
    const main = document.querySelector('main.page-content');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function toAuthorSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function ordinal(n) {
      const s = ['th','st','nd','rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    function dayLabel(ts) {
      if (!ts?.seconds) return null;
      const d   = new Date(ts.seconds * 1000);
      const now = new Date();
      const today    = new Date(now.getFullYear(),  now.getMonth(),  now.getDate());
      const eventDay = new Date(d.getFullYear(),    d.getMonth(),    d.getDate());
      const diffDays = Math.round((today - eventDay) / 86400000);
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth()) {
        return `${ordinal(d.getDate())} ${d.toLocaleDateString('en-GB', { month: 'long' })}`;
      }
      return d.getFullYear() === now.getFullYear()
        ? d.toLocaleDateString('en-GB', { month: 'long' })
        : d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    }

    let avatarMap = {};
    let borderColorMap = {};
    let usernameMap = {};

    const REACTIONS = [
      { key: 'heart',        svg: `<svg viewBox="0 0 36 36" width="13" height="13"><path fill="currentColor" d="M35.885 11.833c0-5.45-4.418-9.868-9.867-9.868-3.308 0-6.227 1.633-8.018 4.129-1.791-2.496-4.71-4.129-8.017-4.129-5.45 0-9.868 4.417-9.868 9.868 0 .772.098 1.52.266 2.241C1.751 22.587 11.216 31.568 18 34.034c6.783-2.466 16.249-11.447 17.617-19.959.17-.721.268-1.469.268-2.242z"/></svg>` },
      { key: 'broken_heart', svg: `<svg viewBox="0 0 36 36" width="13" height="13"><path fill="currentColor" d="M13.589 26.521c-.297-.495-.284-1.117.035-1.599l4.395-6.646-5.995-5.139c-.556-.476-.686-1.283-.31-1.911l4.304-7.172c-1.669-1.301-3.755-2.09-6.035-2.09-5.45 0-9.868 4.417-9.868 9.868 0 .772.098 1.52.266 2.241C1.751 22.587 11.216 31.568 18 34.034c.025-.009.052-.022.077-.032l-4.488-7.481z"/><path fill="currentColor" d="M26.018 1.966c-2.765 0-5.248 1.151-7.037 2.983l-4.042 6.737 6.039 5.176c.574.492.691 1.335.274 1.966l-4.604 6.962 4.161 6.935c6.338-3.529 13.621-11.263 14.809-18.649.17-.721.268-1.469.268-2.241-.001-5.452-4.419-9.869-9.868-9.869z"/></svg>` },
      { key: 'shocked',      svg: `<svg viewBox="0 0 36 36" width="13" height="13"><path fill="currentColor" fill-rule="evenodd" d="M36 18c0 9.941-8.059 18-18 18S0 27.941 0 18 8.059 0 18 0s18 8.059 18 18M14.5 13.5A2.5 3.5 0 1 0 9.5 13.5 2.5 3.5 0 1 0 14.5 13.5M26.5 13.5A2.5 3.5 0 1 0 21.5 13.5 2.5 3.5 0 1 0 26.5 13.5M22 25A4 5 0 1 0 14 25 4 5 0 1 0 22 25"/></svg>` },
    ];
    let openPickerClose = null;
    document.addEventListener('click', () => {
      if (openPickerClose) { openPickerClose(); openPickerClose = null; }
    });

    function buildReactionsBar(event) {
      const state = {};
      REACTIONS.forEach(({ key }) => { state[key] = [...((event.reactions || {})[key] || [])]; });

      const bar = document.createElement('div');
      bar.style.cssText = 'position:absolute;bottom:.35rem;right:.5rem;display:flex;align-items:center;gap:.3rem';

      const wrap = document.createElement('span');
      wrap.style.cssText = 'position:relative;display:inline-flex';
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.innerHTML = '<svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.5"/><circle cx="5.5" cy="6.5" r="1" fill="currentColor" stroke="none"/><circle cx="10.5" cy="6.5" r="1" fill="currentColor" stroke="none"/><path d="M5.5 10.5q2.5 2 5 0"/></svg>';
      addBtn.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:1.3rem;height:1.3rem;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text-muted);opacity:.55;padding:0;flex-shrink:0';

      const picker = document.createElement('div');
      picker.style.cssText = 'display:none;position:absolute;bottom:calc(100% + .35rem);right:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.3rem .35rem;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50;white-space:nowrap';

      let pickerOpen = false;
      const closePicker = () => { pickerOpen = false; picker.style.display = 'none'; };

      REACTIONS.forEach(({ key, svg }) => {
        const eb = document.createElement('button');
        eb.type = 'button';
        eb.innerHTML = svg;
        eb.style.cssText = 'background:none;border:none;cursor:pointer;padding:.2rem .25rem;border-radius:6px;line-height:1;display:inline-flex;align-items:center;justify-content:center;color:var(--accent)';
        eb.addEventListener('click', async e => {
          e.stopPropagation();
          closePicker();
          openPickerClose = null;
          const add = !state[key].includes(user.uid);
          if (add) state[key] = [...state[key], user.uid];
          else state[key] = state[key].filter(u => u !== user.uid);
          renderPills();
          await toggleReaction(event.id, key, user.uid, add).catch(console.error);
        });
        picker.appendChild(eb);
      });

      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (openPickerClose && openPickerClose !== closePicker) openPickerClose();
        pickerOpen = !pickerOpen;
        picker.style.display = pickerOpen ? 'flex' : 'none';
        openPickerClose = pickerOpen ? closePicker : null;
      });
      picker.addEventListener('click', e => e.stopPropagation());
      wrap.append(addBtn, picker);

      function renderPills() {
        [...bar.children].forEach(ch => { if (ch !== wrap) ch.remove(); });
        REACTIONS.forEach(({ key, svg }) => {
          const users = state[key];
          if (!users.length) return;
          const mine = users.includes(user.uid);
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = `display:inline-flex;align-items:center;gap:.2rem;padding:.05rem .3rem;border-radius:20px;border:1px solid ${mine ? 'var(--accent)' : 'var(--border)'};background:${mine ? 'var(--bg-alt)' : 'transparent'};cursor:pointer;color:var(--accent);line-height:1.4`;
          btn.innerHTML = `${svg}<span style="font-size:.65rem;font-variant-numeric:tabular-nums">${users.length}</span>`;
          btn.addEventListener('click', async () => {
            const add = !state[key].includes(user.uid);
            if (add) state[key] = [...state[key], user.uid];
            else state[key] = state[key].filter(u => u !== user.uid);
            renderPills();
            await toggleReaction(event.id, key, user.uid, add).catch(console.error);
          });
          bar.insertBefore(btn, wrap);
        });
      }

      bar.appendChild(wrap);
      renderPills();
      return bar;
    }

    function showReviewModal(reviewText, bookTitle, username, rating) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem 1.25rem 1.25rem 1.25rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', () => overlay.remove());
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.15rem;padding-right:1.5rem';
      title.textContent = bookTitle;
      const byline = document.createElement('div');
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem';
      byline.textContent = `${username}'s review`;
      const starsRow = document.createElement('div');
      starsRow.style.cssText = 'margin-bottom:.75rem';
      starsRow.innerHTML = rating ? renderStars(rating) : '';
      const body = document.createElement('div');
      body.style.cssText = 'font-size:.9rem;line-height:1.6;white-space:pre-wrap';
      body.textContent = reviewText;
      modal.append(closeBtn, title, byline, starsRow, body);
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function aggregateFollows(events) {
      const out = [];
      const byKey = {};
      for (const e of events) {
        if (e.type !== 'followed') { out.push(e); continue; }
        const day = dayLabel(e.timestamp) || '';
        const key = `${e.uid}_${day}`;
        if (byKey[key]) {
          byKey[key].targets.push({ username: e.targetUsername, isMe: e.targetUid === user.uid });
        } else {
          const agg = { ...e, targets: [{ username: e.targetUsername, isMe: e.targetUid === user.uid }] };
          byKey[key] = agg;
          out.push(agg);
        }
      }
      return out;
    }

    function renderEvent(event) {
      const card   = document.createElement('div');
      card.className = 'card';
      const username   = usernameMap[event.uid] || event.username;
      const isMe       = event.uid === user.uid;
      const initial    = (username?.[0] || '?').toUpperCase();
      const avatarUrl  = avatarMap[event.uid];
      const avatarContent = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="" loading="lazy">`
        : esc(initial);
      const borderColor = borderColorMap[event.uid];
      const borderStyle = borderColor ? `border-color:${borderColor};` : '';
      const isFollowed = event.type === 'followed';
      const followedMe = isFollowed && event.targetUid === user.uid;
      const bookLink = event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const followLinks = (event.targets || [{ username: event.targetUsername, isMe: followedMe }]).map(
        t => t.isMe ? 'you' : `<a href="../profile/?u=${esc(t.username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(t.username)}</a>`
      );
      const followPhrase = followLinks.length === 1 ? followLinks[0]
        : followLinks.length === 2 ? `${followLinks[0]} and ${followLinks[1]}`
        : `${followLinks.slice(0, -1).join(', ')}, and ${followLinks[followLinks.length - 1]}`;
      const action = isFollowed
        ? `started following ${followPhrase}`
        : event.type === 'started'
          ? `started reading ${bookLink}`
          : `finished ${bookLink}`;
      const author  = (!isFollowed && event.bookAuthor)
        ? `<span style="color:var(--text-muted)"> by <a href="../author/?slug=${toAuthorSlug(event.bookAuthor)}" style="color:inherit;text-decoration:none">${esc(event.bookAuthor)}</a></span>`
        : '';
      const reviewBtn = event.hasReview && event.gbid
        ? `<button class="review-btn" style="font-size:.75rem;color:var(--accent);background:none;border:none;padding:0;cursor:pointer;font-family:inherit">Read review</button>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${reviewBtn}</div>`
        : '';
      const pct = event.totalPages ? Math.round((event.currentPage / event.totalPages) * 100) : 0;
      const progressRow = (event.type === 'started' && event.totalPages && event.currentPage > 0)
        ? `<div style="margin-top:.3rem;display:flex;align-items:center;gap:.5rem"><div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">Page ${event.currentPage} of ${event.totalPages} · ${pct}%</div><div style="height:3px;background:var(--bg-alt);border-radius:2px;overflow:hidden;width:60px;flex-shrink:0"><div style="height:100%;background:#F2BA00;width:${pct}%"></div></div></div>`
        : '';
      const coverThumb = isFollowed
        ? (() => {
            if (event.targets && event.targets.length > 1) return '';
            const tAvatar = event.targetAvatarUrl;
            const tInitial = (event.targetUsername?.[0] || '?').toUpperCase();
            const tBorder = `border:2.5px solid ${event.targetBorderColor || 'var(--accent)'};`;
            const inner = tAvatar
              ? `<img src="${esc(tAvatar)}" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
              : `<span style="font-size:.6rem;font-weight:700">${esc(tInitial)}</span>`;
            return `<a href="../profile/?u=${esc(event.targetUsername)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--bg-alt);color:var(--text-muted);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.35);text-decoration:none;${tBorder}">${inner}</a>`;
          })()
        : (event.coverUrl && event.gbid)
          ? `<a href="../book/?gbid=${esc(event.gbid)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:block"><img src="${esc(event.coverUrl)}" alt="" loading="lazy" style="width:22px;border-radius:2px;display:block;box-shadow:0 1px 4px rgba(0,0,0,.4)"></a>`
          : '';
      card.innerHTML = `<div class="friend-item">
        <div style="position:relative;flex-shrink:0;width:36px;height:36px">
          <a class="friend-avatar" href="../profile/?u=${esc(username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
          ${coverThumb}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4">${isMe ? `<span>You</span>` : `<a href="../profile/?u=${esc(username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(username)}</a>`} ${action}${author}</div>
          ${progressRow}${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;
      const btn = card.querySelector('.review-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.textContent = 'Loading…';
          btn.disabled = true;
          try {
            const book = await getBookByGbid(event.uid, event.gbid);
            if (book?.review) showReviewModal(book.review, event.bookTitle, username, event.rating);
          } finally {
            btn.textContent = 'Read review';
            btn.disabled = false;
          }
        });
      }

      if (event.uid === user.uid && event.type !== 'followed') {
        const dateField = event.type === 'started' ? 'addedAt' : 'finishedAt';
        const dateLabel = event.type === 'started' ? 'start date' : 'finished date';
        const dateStr   = event.timestamp?.seconds
          ? new Date(event.timestamp.seconds * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
          : 'unknown date';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.textContent = '×';
        removeBtn.style.cssText = 'position:absolute;top:.35rem;right:.5rem;background:none;border:none;font-size:1.1rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:.1rem .3rem;opacity:.55';
        removeBtn.title = 'Remove from feed';
        removeBtn.addEventListener('click', async () => {
          if (!confirm(`Remove this event from your feed?\n\nThis will also clear the ${dateLabel} (${dateStr}) from "${event.bookTitle}" in your library.`)) return;
          removeBtn.disabled = true;
          try {
            await removeActivityEvent(user.uid, event.id, event.gbid, dateField, event.bookTitle);
            card.remove();
          } catch (e) {
            console.error(e);
            removeBtn.disabled = false;
          }
        });
        card.style.position = 'relative';
        card.appendChild(removeBtn);
      }

      return card;
    }

    try {
      const [following, myProfile] = await Promise.all([getFollowing(user.uid), getProfile(user.uid)]);
      const followingUids = following.map(f => f.uid);
      avatarMap[user.uid]      = myProfile?.avatarUrl || null;
      borderColorMap[user.uid] = myProfile?.avatarBorderColor || null;
      usernameMap[user.uid]    = myProfile?.username || null;
      following.forEach(f => {
        avatarMap[f.uid]      = f.avatarUrl || null;
        borderColorMap[f.uid] = f.avatarBorderColor || null;
        usernameMap[f.uid]    = f.username || null;
      });

      // Filter
      const allPeople = [
        { uid: user.uid, username: myProfile?.username || 'You' },
        ...following.map(f => ({ uid: f.uid, username: f.username || f.uid }))
      ];
      const savedHidden = new Set(myProfile?.feedFilter || []);
      const activeUids  = new Set(allPeople.map(p => p.uid).filter(uid => !savedHidden.has(uid)));

      function saveFilter() {
        const hidden = allPeople.map(p => p.uid).filter(uid => !activeUids.has(uid));
        updateDoc(doc(db, 'users', user.uid), { feedFilter: hidden }).catch(() => {});
      }

      const allTypes   = ['started', 'finished', 'followed'];
      const typeLabels = { started: 'Started reading', finished: 'Finished', followed: 'Following' };
      const savedHiddenTypes = new Set(myProfile?.feedTypeFilter || []);
      const activeTypes      = new Set(allTypes.filter(t => !savedHiddenTypes.has(t)));

      function saveTypeFilter() {
        const hidden = allTypes.filter(t => !activeTypes.has(t));
        updateDoc(doc(db, 'users', user.uid), { feedTypeFilter: hidden }).catch(() => {});
      }

      const filterWrap = document.createElement('div');
      filterWrap.style.cssText = 'position:relative;margin-bottom:.75rem';

      const filterBtn = document.createElement('button');
      filterBtn.style.cssText = 'display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;padding:.3rem .65rem;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;font-family:inherit';
      filterBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>Filter`;
      const filterDot = document.createElement('span');
      filterDot.style.cssText = 'width:6px;height:6px;border-radius:50%;background:var(--accent);display:none;flex-shrink:0';
      filterBtn.appendChild(filterDot);

      const filterPanel = document.createElement('div');
      filterPanel.style.cssText = 'display:none;position:absolute;top:calc(100% + .4rem);left:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.65rem .8rem;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50';

      let panelOpen = false;
      filterBtn.addEventListener('click', e => {
        e.stopPropagation();
        panelOpen = !panelOpen;
        filterPanel.style.display = panelOpen ? 'flex' : 'none';
      });
      document.addEventListener('click', () => {
        if (panelOpen) { panelOpen = false; filterPanel.style.display = 'none'; }
      });
      filterPanel.addEventListener('click', e => e.stopPropagation());

      function updateFilterDot() {
        const filtered = activeUids.size < allPeople.length || activeTypes.size < allTypes.length;
        filterDot.style.display = filtered ? 'block' : 'none';
      }

      function makeDot(active) {
        const d = document.createElement('span');
        d.style.cssText = `width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .15s,border-color .15s;${active ? 'background:var(--accent);border:none' : 'background:none;border:1.5px solid var(--border)'}`;
        return d;
      }

      function makeSection(title) {
        const col = document.createElement('div');
        col.style.cssText = 'display:flex;flex-direction:column';
        const hdr = document.createElement('div');
        hdr.style.cssText = 'font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.3rem;white-space:nowrap';
        hdr.textContent = title;
        col.appendChild(hdr);
        return col;
      }

      // — Activity column —
      const activityCol = makeSection('Activity');
      filterPanel.appendChild(activityCol);

      allTypes.forEach(type => {
        const active = activeTypes.has(type);
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:center;gap:.55rem;padding:.25rem 0;cursor:pointer;user-select:none';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = active;
        cb.style.cssText = 'display:none';
        const dot = makeDot(active);
        const text = document.createElement('span');
        text.style.cssText = `font-size:.85rem;color:${active ? 'var(--text)' : 'var(--text-muted)'};white-space:nowrap`;
        text.textContent = typeLabels[type];
        row.append(cb, dot, text);
        cb.addEventListener('change', () => {
          if (cb.checked) {
            activeTypes.add(type);
            dot.style.background = 'var(--accent)';
            dot.style.border = 'none';
            text.style.color = 'var(--text)';
          } else {
            activeTypes.delete(type);
            dot.style.background = 'none';
            dot.style.border = '1.5px solid var(--border)';
            text.style.color = 'var(--text-muted)';
          }
          updateFilterDot();
          saveTypeFilter();
          resetFeed();
        });
        activityCol.appendChild(row);
      });

      // — Divider —
      const colDivider = document.createElement('div');
      colDivider.style.cssText = 'width:1px;background:var(--border);margin:0 .75rem;align-self:stretch';
      filterPanel.appendChild(colDivider);

      // — People column —
      const peopleCol = makeSection('People');
      filterPanel.appendChild(peopleCol);

      const allToggle = document.createElement('button');
      allToggle.style.cssText = 'font-size:.72rem;color:var(--text-muted);background:none;border:none;padding:0;cursor:pointer;font-family:inherit;margin-left:auto;display:block;margin-top:.3rem';
      allToggle.textContent = 'Deselect all';

      const allRows = [];

      function syncAllToggle() {
        allToggle.textContent = activeUids.size >= allPeople.length ? 'Deselect all' : 'Select all';
      }

      allToggle.addEventListener('click', () => {
        const allOn = activeUids.size >= allPeople.length;
        allRows.forEach(({ cb, dot, uid }) => {
          cb.checked = !allOn;
          if (allOn) {
            activeUids.delete(uid);
            dot.style.background = 'none';
            dot.style.border = '1.5px solid var(--border)';
          } else {
            activeUids.add(uid);
            dot.style.background = 'var(--accent)';
            dot.style.border = 'none';
          }
        });
        syncAllToggle();
        updateFilterDot();
        saveFilter();
        resetFeed();
      });

      allPeople.forEach(person => {
        const active = activeUids.has(person.uid);
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:center;gap:.55rem;padding:.25rem 0;cursor:pointer;user-select:none';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = active;
        cb.style.cssText = 'display:none';
        const dot = makeDot(active);
        const text = document.createElement('span');
        text.style.cssText = `font-size:.85rem;color:${active ? 'var(--text)' : 'var(--text-muted)'};white-space:nowrap`;
        text.textContent = person.username;
        row.append(cb, dot, text);
        allRows.push({ cb, dot, uid: person.uid });
        cb.addEventListener('change', () => {
          if (cb.checked) {
            activeUids.add(person.uid);
            dot.style.background = 'var(--accent)';
            dot.style.border = 'none';
            text.style.color = 'var(--text)';
          } else {
            activeUids.delete(person.uid);
            dot.style.background = 'none';
            dot.style.border = '1.5px solid var(--border)';
            text.style.color = 'var(--text-muted)';
          }
          syncAllToggle();
          updateFilterDot();
          saveFilter();
          resetFeed();
        });
        peopleCol.appendChild(row);
      });
      peopleCol.appendChild(allToggle);

      updateFilterDot();
      syncAllToggle();
      filterWrap.append(filterBtn, filterPanel);
      main.appendChild(filterWrap);

      const feedContent = document.createElement('div');
      main.appendChild(feedContent);

      let lastDoc = null;
      let lastDay = null;
      let loading = false;
      let seenIds = new Set();

      const sentinel = document.createElement('div');
      sentinel.style.cssText = 'height:1px';

      async function loadPage() {
        if (loading) return;
        loading = true;
        const { events, lastDoc: newCursor } = await getFeed(user.uid, followingUids, lastDoc);
        const visible = events.filter(e => {
          if (seenIds.has(e.id)) return false;
          seenIds.add(e.id);
          if (!activeTypes.has(e.type)) return false;
          // Always show "someone followed you" events (bypass person filter)
          if (e.type === 'followed' && e.targetUid === user.uid) return true;
          if (!activeUids.has(e.uid)) return false;
          if (e.type === 'followed' && e.uid === user.uid && !followingUids.includes(e.targetUid)) return false;
          return true;
        });

        // Backfill coverUrl only for old entries that predate storing it on the activity doc
        const needsCover = visible.filter(e => e.gbid && !e.coverUrl);
        if (needsCover.length) {
          await Promise.all(needsCover.map(async e => {
            const book = await getBookByGbid(e.uid, e.gbid);
            if (book?.coverUrl) {
              e.coverUrl = book.coverUrl;
              // Write back so this event never needs backfilling again
              updateDoc(doc(db, 'activity', e.id), { coverUrl: book.coverUrl }).catch(() => {});
            }
          }));
        }

        if (feedContent.contains(sentinel)) feedContent.removeChild(sentinel);

        if (visible.length === 0 && !newCursor && !lastDoc) {
          const p = document.createElement('p');
          p.style.cssText = 'color:var(--text-muted);font-size:.9rem;margin-top:.25rem';
          p.textContent = activeUids.size === 0
            ? 'Select at least one person to see activity.'
            : (followingUids.length === 0 ? 'Follow some readers to see their activity here.' : 'No activity yet.');
          feedContent.appendChild(p);
        } else {
          aggregateFollows(visible).forEach(e => {
            const label = dayLabel(e.timestamp);
            if (label !== lastDay) {
              lastDay = label;
              const div = document.createElement('div');
              div.className = 'feed-day-divider';
              div.textContent = label || '';
              feedContent.appendChild(div);
            }
            feedContent.appendChild(renderEvent(e));
          });
          lastDoc = newCursor;
          if (newCursor) feedContent.appendChild(sentinel);
        }
        loading = false;
        // If the sentinel is still on-screen after a sparse/filtered page, keep loading
        if (newCursor) requestAnimationFrame(() => {
          if (feedContent.contains(sentinel) && sentinel.getBoundingClientRect().top < window.innerHeight + 200) loadPage();
        });
      }

      function resetFeed() {
        while (feedContent.firstChild) feedContent.removeChild(feedContent.firstChild);
        lastDoc = null;
        lastDay = null;
        seenIds = new Set();
        feedContent.appendChild(sentinel);
        loadPage();
      }

      feedContent.appendChild(sentinel);
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadPage();
      }, { rootMargin: '200px' });
      observer.observe(sentinel);

    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
