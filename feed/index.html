<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/library/">paperbackd</a>
      <nav class="desktop-nav">
        <a href="./"           data-nav="feed">Feed</a>
        <a href="../search/"   data-nav="search">Search</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title">Feed</h1>

  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="./" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getFollowing, getFeed, getProfile, getBookByGbid, removeActivityEvent } from '../js/firebase.js';

    const { user } = await requireAuth();
    const main = document.querySelector('main.page-content');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function toAuthorSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function dayLabel(ts) {
      if (!ts?.seconds) return null;
      const d   = new Date(ts.seconds * 1000);
      const now = new Date();
      const today    = new Date(now.getFullYear(),  now.getMonth(),  now.getDate());
      const eventDay = new Date(d.getFullYear(),    d.getMonth(),    d.getDate());
      const diffDays = Math.round((today - eventDay) / 86400000);
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      const opts = d.getFullYear() === now.getFullYear()
        ? { day: 'numeric', month: 'long' }
        : { day: 'numeric', month: 'long', year: 'numeric' };
      return d.toLocaleDateString('en-GB', opts);
    }

    let avatarMap = {};
    let borderColorMap = {};
    let usernameMap = {};

    function showReviewModal(reviewText, bookTitle, username, rating) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem 1.25rem 1.25rem 1.25rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', () => overlay.remove());
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.15rem;padding-right:1.5rem';
      title.textContent = bookTitle;
      const byline = document.createElement('div');
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem';
      byline.textContent = `${username}'s review`;
      const starsRow = document.createElement('div');
      starsRow.style.cssText = 'margin-bottom:.75rem';
      starsRow.innerHTML = rating ? renderStars(rating) : '';
      const body = document.createElement('div');
      body.style.cssText = 'font-size:.9rem;line-height:1.6;white-space:pre-wrap';
      body.textContent = reviewText;
      modal.append(closeBtn, title, byline, starsRow, body);
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function renderEvent(event) {
      const card   = document.createElement('div');
      card.className = 'card';
      const username   = usernameMap[event.uid] || event.username;
      const initial    = (username?.[0] || '?').toUpperCase();
      const avatarUrl  = avatarMap[event.uid];
      const avatarContent = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="" loading="lazy">`
        : esc(initial);
      const borderColor = borderColorMap[event.uid];
      const borderStyle = borderColor ? `border-color:${borderColor};` : '';
      const bookLink = event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const action  = event.type === 'started'
        ? `started reading ${bookLink}`
        : `finished ${bookLink}`;
      const author  = event.bookAuthor
        ? `<span style="color:var(--text-muted)"> by <a href="../author/?slug=${toAuthorSlug(event.bookAuthor)}" style="color:inherit;text-decoration:none">${esc(event.bookAuthor)}</a></span>`
        : '';
      const reviewBtn = event.hasReview && event.gbid
        ? `<button class="review-btn" style="font-size:.75rem;color:var(--accent);background:none;border:none;padding:0;cursor:pointer;font-family:inherit">Read review</button>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${reviewBtn}</div>`
        : '';
      const pct = event._totalPages ? Math.round((event._currentPage / event._totalPages) * 100) : 0;
      const progressRow = (event.type === 'started' && event._totalPages)
        ? `<div style="margin-top:.3rem;display:flex;align-items:center;gap:.5rem"><div style="font-size:.7rem;color:var(--text-muted);white-space:nowrap">Page ${event._currentPage} of ${event._totalPages} · ${pct}%</div><div style="height:3px;background:var(--bg-alt);border-radius:2px;overflow:hidden;width:60px;flex-shrink:0"><div style="height:100%;background:var(--accent);width:${pct}%"></div></div></div>`
        : '';
      const coverThumb = event.coverUrl && event.gbid
        ? `<a href="../book/?gbid=${esc(event.gbid)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:block"><img src="${esc(event.coverUrl)}" alt="" loading="lazy" style="width:22px;border-radius:2px;display:block;box-shadow:0 1px 4px rgba(0,0,0,.4)"></a>`
        : '';
      card.innerHTML = `<div class="friend-item">
        <div style="position:relative;flex-shrink:0;width:36px;height:36px">
          <a class="friend-avatar" href="../profile/?u=${esc(username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
          ${coverThumb}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4"><a href="../profile/?u=${esc(username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(username)}</a> ${action}${author}</div>
          ${progressRow}${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;
      const btn = card.querySelector('.review-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.textContent = 'Loading…';
          btn.disabled = true;
          try {
            const book = await getBookByGbid(event.uid, event.gbid);
            if (book?.review) showReviewModal(book.review, event.bookTitle, username, event.rating);
          } finally {
            btn.textContent = 'Read review';
            btn.disabled = false;
          }
        });
      }

      if (event.uid === user.uid) {
        const dateField = event.type === 'started' ? 'addedAt' : 'finishedAt';
        const dateLabel = event.type === 'started' ? 'start date' : 'finished date';
        const dateStr   = event.timestamp?.seconds
          ? new Date(event.timestamp.seconds * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
          : 'unknown date';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.textContent = '×';
        removeBtn.style.cssText = 'position:absolute;top:.35rem;right:.5rem;background:none;border:none;font-size:1.1rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:.1rem .3rem;opacity:.55';
        removeBtn.title = 'Remove from feed';
        removeBtn.addEventListener('click', async () => {
          if (!confirm(`Remove this event from your feed?\n\nThis will also clear the ${dateLabel} (${dateStr}) from "${event.bookTitle}" in your library.`)) return;
          removeBtn.disabled = true;
          try {
            await removeActivityEvent(user.uid, event.id, event.gbid, dateField);
            card.remove();
          } catch (e) {
            console.error(e);
            removeBtn.disabled = false;
          }
        });
        card.style.position = 'relative';
        card.appendChild(removeBtn);
      }

      return card;
    }

    try {
      const [following, myProfile] = await Promise.all([getFollowing(user.uid), getProfile(user.uid)]);
      const followingUids = following.map(f => f.uid);
      const mutedUids     = myProfile?.muted || [];
      avatarMap[user.uid]      = myProfile?.avatarUrl || null;
      borderColorMap[user.uid] = myProfile?.avatarBorderColor || null;
      usernameMap[user.uid]    = myProfile?.username || null;
      following.forEach(f => {
        avatarMap[f.uid]      = f.avatarUrl || null;
        borderColorMap[f.uid] = f.avatarBorderColor || null;
        usernameMap[f.uid]    = f.username || null;
      });

      // Filter
      const allPeople = [
        { uid: user.uid, username: myProfile?.username || 'You' },
        ...following.map(f => ({ uid: f.uid, username: f.username || f.uid }))
      ];
      const activeUids = new Set(allPeople.map(p => p.uid));

      const filterWrap = document.createElement('div');
      filterWrap.style.cssText = 'position:relative;margin-bottom:.75rem';

      const filterBtn = document.createElement('button');
      filterBtn.style.cssText = 'display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;padding:.3rem .65rem;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;font-family:inherit';
      filterBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>Filter`;
      const filterDot = document.createElement('span');
      filterDot.style.cssText = 'width:6px;height:6px;border-radius:50%;background:var(--accent);display:none;flex-shrink:0';
      filterBtn.appendChild(filterDot);

      const filterPanel = document.createElement('div');
      filterPanel.style.cssText = 'display:none;position:absolute;top:calc(100% + .4rem);left:0;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:.6rem .7rem;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50;display:none;flex-wrap:wrap;gap:.35rem;min-width:180px';

      let panelOpen = false;
      filterBtn.addEventListener('click', e => {
        e.stopPropagation();
        panelOpen = !panelOpen;
        filterPanel.style.display = panelOpen ? 'flex' : 'none';
      });
      document.addEventListener('click', () => {
        if (panelOpen) { panelOpen = false; filterPanel.style.display = 'none'; }
      });
      filterPanel.addEventListener('click', e => e.stopPropagation());

      function updateFilterDot() {
        filterDot.style.display = activeUids.size < allPeople.length ? 'block' : 'none';
      }

      allPeople.forEach(person => {
        const label = document.createElement('label');
        label.style.cssText = 'display:inline-flex;align-items:center;padding:.22rem .6rem;border-radius:20px;border:1px solid var(--accent);cursor:pointer;font-size:.8rem;user-select:none;background:var(--accent);color:#fff;transition:background .15s,color .15s,border-color .15s';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = true;
        cb.style.cssText = 'display:none';
        const span = document.createElement('span');
        span.textContent = person.username;
        label.append(cb, span);
        cb.addEventListener('change', () => {
          if (cb.checked) {
            activeUids.add(person.uid);
            label.style.background = 'var(--accent)';
            label.style.color = '#fff';
            label.style.borderColor = 'var(--accent)';
          } else {
            activeUids.delete(person.uid);
            label.style.background = '';
            label.style.color = 'var(--text-muted)';
            label.style.borderColor = 'var(--border)';
          }
          updateFilterDot();
          resetFeed();
        });
        filterPanel.appendChild(label);
      });

      filterWrap.append(filterBtn, filterPanel);
      main.appendChild(filterWrap);

      const feedContent = document.createElement('div');
      main.appendChild(feedContent);

      let lastDoc = null;
      let lastDay = null;
      let loading = false;

      const sentinel = document.createElement('div');
      sentinel.style.cssText = 'height:1px';

      async function loadPage() {
        if (loading) return;
        loading = true;
        const { events, lastDoc: newCursor } = await getFeed(user.uid, followingUids, lastDoc);
        const visible = events.filter(e =>
          (e.uid === user.uid || !mutedUids.includes(e.uid)) &&
          activeUids.has(e.uid)
        );

        // Backfill coverUrl for old entries; also attach progress for in-progress started events
        const needsFetch = visible.filter(e => e.gbid);
        if (needsFetch.length) {
          await Promise.all(needsFetch.map(async e => {
            const book = await getBookByGbid(e.uid, e.gbid);
            if (!book) return;
            if (book.coverUrl) e.coverUrl = book.coverUrl;
            if (e.type === 'started' && book.status === 'reading' && book.totalPages) {
              e._currentPage = book.currentPage || 0;
              e._totalPages  = book.totalPages;
            }
          }));
        }

        if (visible.length === 0 && !lastDoc) {
          feedContent.removeChild(sentinel);
          const p = document.createElement('p');
          p.style.cssText = 'color:var(--text-muted);font-size:.9rem;margin-top:.25rem';
          p.textContent = activeUids.size === 0
            ? 'Select at least one person to see activity.'
            : (followingUids.length === 0 ? 'Follow some readers to see their activity here.' : 'No activity yet.');
          feedContent.appendChild(p);
        } else {
          feedContent.removeChild(sentinel);
          visible.forEach(e => {
            const label = dayLabel(e.timestamp);
            if (label !== lastDay) {
              lastDay = label;
              const div = document.createElement('div');
              div.className = 'feed-day-divider';
              div.textContent = label || '';
              feedContent.appendChild(div);
            }
            feedContent.appendChild(renderEvent(e));
          });
          lastDoc = newCursor;
          if (newCursor) feedContent.appendChild(sentinel);
        }
        loading = false;
      }

      function resetFeed() {
        while (feedContent.firstChild) feedContent.removeChild(feedContent.firstChild);
        lastDoc = null;
        lastDay = null;
        feedContent.appendChild(sentinel);
        loadPage();
      }

      feedContent.appendChild(sentinel);
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) loadPage();
      }, { rootMargin: '200px' });
      observer.observe(sentinel);

    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
