  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>

  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="../">Reading Log</a>
      <nav class="desktop-nav">
        <a href="../"          data-nav="home">Feed</a>
        <a href="../clubs/"    data-nav="clubs">Clubs</a>
        <a href="../library/"  data-nav="library">Library</a>
        <a href="../profile/"  data-nav="profile">Profile</a>
        <a href="../settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title">Edit Profile</h1>

    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Profile photo</div>
      <div class="edit-photo-row">
        <div class="avatar-upload-wrap" id="avatar-wrap">
          <div class="profile-avatar-lg" id="avatar-preview"></div>
        </div>
        <div>
          <button class="profile-avatar-change" id="change-photo-btn" type="button">Change photo</button>
        </div>
      </div>
      <input type="file" id="avatar-file" accept="image/*" style="display:none">
    </div>

    <div style="display:flex;gap:.5rem;margin-top:.25rem">
      <button id="save-btn" class="join-club-btn" style="flex:1">Save</button>
      <button id="cancel-btn" class="btn-update" style="flex:1">Cancel</button>
    </div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Feed
    </a>
    <a class="mobile-nav-item" href="../clubs/" data-nav="clubs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      Clubs
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="../settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { updateAvatarUrl } from '../js/firebase.js';

    const { user, profile } = await requireAuth();

    const avatarPreview  = document.getElementById('avatar-preview');
    const avatarWrap     = document.getElementById('avatar-wrap');
    const changePhotoBtn = document.getElementById('change-photo-btn');
    const fileInput      = document.getElementById('avatar-file');
    const saveBtn        = document.getElementById('save-btn');
    const cancelBtn      = document.getElementById('cancel-btn');

    let pendingDataUrl = null;

    function showAvatar(url) {
      if (url) { avatarPreview.innerHTML  = `<img src="${url}" alt="">`; }
      else     { avatarPreview.textContent = profile.username[0].toUpperCase(); }
    }
    showAvatar(profile.avatarUrl);

    avatarWrap.addEventListener('click',     () => fileInput.click());
    changePhotoBtn.addEventListener('click', () => fileInput.click());

    function resizeToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          const SIZE  = 128;
          const scale = Math.min(SIZE / img.width, SIZE / img.height, 1);
          const w = Math.round(img.width  * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = reject;
        img.src = objectUrl;
      });
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      try {
        pendingDataUrl = await resizeToDataUrl(file);
        showAvatar(pendingDataUrl);
      } catch (e) {
        console.error(e);
        alert('Could not load that image.');
      } finally {
        fileInput.value = '';
      }
    });

    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true;
      try {
        if (pendingDataUrl) {
          await updateAvatarUrl(user.uid, pendingDataUrl);
          const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
          cached.avatarUrl = pendingDataUrl;
          localStorage.setItem('rl_profile', JSON.stringify(cached));
        }
        location.replace('../profile/');
      } catch (e) {
        console.error(e);
        alert('Failed to save.');
        saveBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', () => { location.replace('../profile/'); });

    document.body.classList.remove('auth-loading');
  </script>
</body>
</html>
