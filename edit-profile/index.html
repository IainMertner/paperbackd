<html lang="en">
<head>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>

<body>

  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="ink-edge" x="-25%" y="-25%" width="150%" height="150%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>feed</a>
        <a href="../search/"   data-nav="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>search</a>
        <a href="../network/"  data-nav="network"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.7" y1="10.7" x2="15.3" y2="7.3"/><line x1="8.7" y1="13.3" x2="15.3" y2="16.7"/></svg>network</a>
        <a href="../library/"  data-nav="library"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>library</a>
        <a href="../lists/"    data-nav="lists"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="9" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg>lists</a>
        <a href="../stats/"    data-nav="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="13" width="4" height="7" rx="0.5"/><rect x="10" y="3" width="4" height="17" rx="0.5"/><rect x="17" y="9" width="4" height="11" rx="0.5"/></svg>stats</a>

        <a href="../settings/" data-nav="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>settings</a>
      </nav>
    </div>
  </header>

  <main class="page-content">


    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Profile picture</div>
      <div class="edit-photo-row">
        <div class="avatar-upload-wrap" id="avatar-wrap">
          <div class="avatar-ink-ring">
            <svg class="avatar-ring-svg" viewBox="0 0 88 88" aria-hidden="true"><circle cx="44" cy="44" r="44" filter="url(#ink-edge)" style="fill:var(--ring-color,var(--accent))"/></svg>
            <div class="profile-avatar-lg" id="avatar-preview"></div>
          </div>
        </div>
        <div>
          <button class="profile-avatar-change" id="change-photo-btn" type="button">Change photo</button>
        </div>
      </div>
<input type="file" id="avatar-file" accept="image/*" style="display:none">
    </div>

    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.35rem">Display name</div>
      <input type="text" id="display-name-input" class="join-club-input" placeholder="Your name" maxlength="16" autocomplete="off" required style="width:100%;box-sizing:border-box">
    </div>

    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Profile colour</div>
      <div id="theme-swatches" style="display:flex;flex-wrap:wrap;gap:.5rem"></div>
    </div>

    <div class="card" style="margin-bottom:.625rem">
      <div class="edit-field-label" style="margin-bottom:.6rem">Shelf <span style="font-weight:400;color:var(--text-muted);font-size:.78rem">- choose up to 4 books from your library to display on your profile</span></div>
      <div id="shelf-edit-list" class="shelf-edit-list"></div>
      <div id="shelf-add-section">
        <div class="book-search-wrap">
          <input type="text" id="shelf-search" class="join-club-input"
            placeholder="Search for a book to add…" autocomplete="off" spellcheck="false"
            style="width:100%;box-sizing:border-box">
          <div id="shelf-suggestions" class="book-suggestions" style="display:none"></div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:.5rem">
      <button id="save-btn" class="join-club-btn" style="flex:1">Save</button>
      <button id="cancel-btn" class="btn-update" style="flex:1">Cancel</button>
    </div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getBooks, updateAvatarUrl, updateShelf, updateDisplayName, updateAvatarBorderColor } from '../js/firebase.js';

    const { user, profile } = await requireAuth();
    const libraryBooks = (await getBooks(user.uid)).filter(b => b.coverUrl);

    const displayNameInput = document.getElementById('display-name-input');
    displayNameInput.value = profile.displayName || '';

    // ── Theme colour ──────────────────────────────────────────────────────────
    const THEMES = [
      { label: 'Grey',       color: '#6C6460' },
      { label: 'Olive',      color: '#6B7B3A' },
      { label: 'Yellow',     color: '#D4AA55' },
      { label: 'Terracotta', color: '#B85C3A' },
      { label: 'Teal',       color: '#3A9E8C' },
      { label: 'Burgundy',   color: '#7A2E40' },
      { label: 'Slate',      color: '#2E62A0' },
      { label: 'Rose',       color: '#C95C80' },
    ];
    let selectedTheme = profile.avatarBorderColor || THEMES[0].color;
    const swatchContainer = document.getElementById('theme-swatches');

    document.documentElement.style.setProperty('--ring-color', selectedTheme);

    function renderSwatches() {
      swatchContainer.innerHTML = '';
      THEMES.forEach(({ label, color }) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.title = label;
        btn.style.cssText = `width:2rem;height:2rem;border-radius:50%;background:${color};cursor:pointer;border:3px solid transparent;transition:border-color .15s;flex-shrink:0`;
        if (color === selectedTheme) btn.style.borderColor = 'var(--text)';
        btn.addEventListener('click', () => {
          selectedTheme = color;
          document.documentElement.style.setProperty('--ring-color', color);
          renderSwatches();
        });
        swatchContainer.appendChild(btn);
      });
    }
    renderSwatches();

    // ── Avatar ────────────────────────────────────────────────────────────────
    const avatarPreview  = document.getElementById('avatar-preview');
    const avatarWrap     = document.getElementById('avatar-wrap');
    const changePhotoBtn = document.getElementById('change-photo-btn');
    const fileInput      = document.getElementById('avatar-file');
    let pendingAvatarUrl = null;

    function showAvatar(url) {
      if (url) { avatarPreview.innerHTML  = `<img src="${url}" alt="">`; }
      else     { avatarPreview.textContent = profile.username[0].toUpperCase(); }
    }
    showAvatar(profile.avatarUrl);

    avatarWrap.addEventListener('click',     () => fileInput.click());
    changePhotoBtn.addEventListener('click', () => fileInput.click());

    function resizeToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const objectUrl = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(objectUrl);
          const SIZE  = 256;
          const scale = Math.min(SIZE / img.width, SIZE / img.height, 1);
          const w = Math.round(img.width  * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = reject;
        img.src = objectUrl;
      });
    }

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      try {
        pendingAvatarUrl = await resizeToDataUrl(file);
        showAvatar(pendingAvatarUrl);
      } catch (e) {
        console.error(e);
        alert('Could not load that image.');
      } finally {
        fileInput.value = '';
      }
    });

    // ── Shelf ─────────────────────────────────────────────────────────────────
    let shelfItems = (profile.shelf || []).map(i => ({ ...i }));

    const shelfList       = document.getElementById('shelf-edit-list');
    const shelfAddSection = document.getElementById('shelf-add-section');
    const shelfSearch     = document.getElementById('shelf-search');
    const shelfSuggestions = document.getElementById('shelf-suggestions');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let shelfDragIdx = null;

    function renderShelfEdit() {
      shelfList.innerHTML = '';
      shelfItems.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'shelf-edit-item';
        div.draggable = true;
        div.style.cursor = 'grab';
        const img = document.createElement('img');
        img.src = item.coverUrl || ''; img.alt = item.title || '';
        img.className = 'shelf-edit-cover';
        const btn = document.createElement('button');
        btn.type = 'button'; btn.className = 'shelf-edit-remove';
        btn.textContent = '×'; btn.title = 'Remove';
        btn.addEventListener('click', () => { shelfItems.splice(i, 1); renderShelfEdit(); });
        const title = document.createElement('div');
        title.className = 'shelf-edit-title'; title.textContent = item.title || '';
        div.append(img, btn, title);

        div.addEventListener('dragstart', e => {
          shelfDragIdx = i; e.dataTransfer.effectAllowed = 'move';
          requestAnimationFrame(() => { div.style.opacity = '0.35'; });
        });
        div.addEventListener('dragend', () => {
          div.style.opacity = '';
          shelfList.querySelectorAll('.shelf-edit-item').forEach(el => el.style.outline = '');
          shelfDragIdx = null;
        });
        div.addEventListener('dragover', e => {
          e.preventDefault();
          shelfList.querySelectorAll('.shelf-edit-item').forEach(el => el.style.outline = '');
          if (shelfDragIdx !== null && i !== shelfDragIdx) div.style.outline = '2px solid var(--accent)';
        });
        div.addEventListener('drop', e => {
          e.preventDefault();
          if (shelfDragIdx === null || shelfDragIdx === i) return;
          const moved = shelfItems.splice(shelfDragIdx, 1)[0];
          shelfItems.splice(i, 0, moved);
          renderShelfEdit();
        });

        shelfList.appendChild(div);
      });
      shelfAddSection.style.display = shelfItems.length >= 4 ? 'none' : '';
      if (shelfItems.length >= 4) {
        shelfSearch.value = '';
        shelfSuggestions.style.display = 'none';
      }
    }
    renderShelfEdit();

    // search - filter from own library (books already have covers)
    shelfSearch.addEventListener('input', () => {
      const q = shelfSearch.value.trim().toLowerCase();
      if (!q) { shelfSuggestions.style.display = 'none'; return; }
      const alreadyIn = new Set(shelfItems.map(i => i.gbid));
      const matches = libraryBooks
        .filter(b => !alreadyIn.has(b.gbid) &&
          (b.title.toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q)))
        .slice(0, 8);
      renderSuggestions(matches);
    });

    function renderSuggestions(books) {
      shelfSuggestions.innerHTML = '';
      if (!books.length) { shelfSuggestions.style.display = 'none'; return; }
      books.forEach(book => {
        const item = document.createElement('div');
        item.className = 'book-suggestion-item';
        item.innerHTML = `<div class="suggestion-inner">
          <img class="suggestion-cover" src="${esc(book.coverUrl)}" alt="">
          <div><div class="suggestion-title">${esc(book.title)}</div>
          <div class="suggestion-meta">${esc(book.author || '')}</div></div>
        </div>`;
        item.addEventListener('click', () => {
          shelfItems.push({ gbid: book.gbid, title: book.title, coverUrl: book.coverUrl });
          shelfSearch.value = '';
          shelfSuggestions.style.display = 'none';
          renderShelfEdit();
        });
        shelfSuggestions.appendChild(item);
      });
      shelfSuggestions.style.display = '';
    }

    document.addEventListener('click', e => {
      if (!shelfSuggestions.contains(e.target) && e.target !== shelfSearch) {
        shelfSuggestions.style.display = 'none';
      }
    });

    // ── Save / Cancel ─────────────────────────────────────────────────────────
    const saveBtn   = document.getElementById('save-btn');
    const cancelBtn = document.getElementById('cancel-btn');

    saveBtn.addEventListener('click', async () => {
      const newDisplayName = displayNameInput.value.trim();
      if (!newDisplayName) { alert('Please enter a display name.'); return; }
      saveBtn.disabled = true;
      try {
        const saves = [];
        if (pendingAvatarUrl) saves.push(updateAvatarUrl(user.uid, pendingAvatarUrl));
        saves.push(updateShelf(user.uid, shelfItems));
        saves.push(updateDisplayName(user.uid, newDisplayName));
        saves.push(updateAvatarBorderColor(user.uid, selectedTheme));
        await Promise.all(saves);

        const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
        if (pendingAvatarUrl) cached.avatarUrl = pendingAvatarUrl;
        cached.shelf = shelfItems;
        cached.displayName = newDisplayName || null;
        cached.avatarBorderColor = selectedTheme;
        localStorage.setItem('rl_profile', JSON.stringify(cached));

        location.replace('../profile/');
      } catch (e) {
        console.error(e);
        alert('Failed to save.');
        saveBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', () => { location.replace('../profile/'); });

    document.body.classList.remove('auth-loading');
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
