  <style>
    .stats-tab-bar {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: .75rem;
    }
    .stats-tab-btn {
      flex: 1;
      padding: .5rem .25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: .9rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      font-weight: 400;
      transition: color .15s;
    }
    .stats-tab-btn.active {
      border-bottom-color: var(--accent);
      color: var(--text);
      font-weight: 600;
    }
    .target-card {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      margin-top: 0 !important;
      position: relative;
    }
    .target-label {
      font-size: .8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 500;
    }
    .target-ring-wrap {
      width: 110px;
      height: 110px;
      position: relative;
    }
    .target-ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .target-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }
    .target-ring-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .target-ring-denom {
      font-size: .75rem;
      color: var(--text-muted);
    }
    .target-input-row {
      display: flex;
      align-items: center;
      gap: .4rem;
      width: 100%;
      justify-content: center;
    }
    .target-input-row input {
      width: 64px;
      padding: .3rem .4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: .85rem;
      font-family: inherit;
      text-align: center;
    }
    .target-save-btn {
      padding: .3rem .65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    .target-save-btn:hover { opacity: .85; }
    .chart-card {
      padding: 1rem;
      margin-bottom: .75rem;
    }
    .chart-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .75rem;
    }
    .chart-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .chart-title-row .chart-title { margin-bottom: 0; }

      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      font-size: .72rem;
    }
    .view-toggle-btn {
      padding: .25rem .4rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      font-size: inherit;
    }
    .view-toggle-btn.active {
      background: var(--accent);
      color: #fff;
    }

      position: relative;
      width: 100%;
    }
    .chart-empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: .85rem;

      font-size: .82rem;
      color: var(--text-muted);
      padding: .5rem 0 .1rem;
    }

      width: 100%;
    }

  <script type="module">

    const NOW  = new Date();
    const CY   = NOW.getFullYear();
    const CM   = NOW.getMonth();

    const TARGET_TYPES  = { books: 'Books read', countries: 'Countries' };
    const PERIODS       = ['monthly', 'yearly', 'overall'];
    const PERIOD_LABELS = { monthly: 'Monthly', yearly: 'Yearly', overall: 'Overall' };
    const PERIOD_COLORS = { monthly: '#3b82f6', yearly: '#f59e0b', overall: '#8b5cf6' };

    let editMode = false;

    // ── Helpers ────────────────────────────────────────────────────────────────

    function showToast(msg) {
      let t = document.getElementById('global-toast');
      if (!t) { t = document.createElement('div'); t.id = 'global-toast'; t.className = 'global-toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('visible'), 5000);
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    const PIE_COLOR_OTHER = '#6b7280';

    const PIE_COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1','#14b8a6','#f43f5e','#eab308','#a855f7'];

    const COUNTRY_ISO = {

      'united kingdom': 'gb', 'uk': 'gb', 'england': 'gb', 'great britain': 'gb', 'britain': 'gb', 'scotland': 'gb', 'wales': 'gb', 'northern ireland': 'gb',

      'india': 'in', 'pakistan': 'pk', 'bangladesh': 'bd', 'sri lanka': 'lk',
      'vietnam': 'vn', 'thailand': 'th', 'indonesia': 'id', 'philippines': 'ph',
      'malaysia': 'my', 'singapore': 'sg', 'myanmar': 'mm', 'cambodia': 'kh',
      'iran': 'ir', 'turkey': 'tr', 'israel': 'il', 'jordan': 'jo', 'iraq': 'iq',
      'saudi arabia': 'sa', 'united arab emirates': 'ae', 'uae': 'ae',
      'canada': 'ca', 'mexico': 'mx', 'cuba': 'cu', 'guatemala': 'gt', 'costa rica': 'cr',
      'trinidad and tobago': 'tt', 'trinidad': 'tt', 'tobago': 'tt', 'jamaica': 'jm', 'haiti': 'ht', 'dominican republic': 'do',
      'brazil': 'br', 'argentina': 'ar', 'colombia': 'co', 'chile': 'cl',
      'peru': 'pe', 'venezuela': 've', 'ecuador': 'ec', 'bolivia': 'bo', 'uruguay': 'uy', 'paraguay': 'py',
      'australia': 'au', 'new zealand': 'nz',
      'nigeria': 'ng', 'south africa': 'za', 'egypt': 'eg', 'kenya': 'ke',
      'ghana': 'gh', 'ethiopia': 'et', 'morocco': 'ma', 'tanzania': 'tz',
      'uganda': 'ug', 'zimbabwe': 'zw', 'rwanda': 'rw', 'angola': 'ao',
      'hong kong': 'hk',
    };

    const flagImageCache = new Map();

    function loadFlagImage(code) {
      if (flagImageCache.has(code)) return Promise.resolve(flagImageCache.get(code));
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => { flagImageCache.set(code, img); resolve(img); };
        img.onerror = () => resolve(null);
        img.src = `https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@latest/flags/${code}.svg`;
      });
    }

    async function loadFlagImages(names) {
      const result = new Map();
      await Promise.all(names.map(async name => {
        const code = COUNTRY_ISO[name.toLowerCase()];
        if (!code) return;
        const img = await loadFlagImage(code);
        if (img) result.set(name, img);
      }));
      return result;
    }

    // Lanczos lgamma, regularised incomplete beta, and two-tailed t p-value
    function lgamma(z) {
      const c = [0.99999999999980993,676.5203681218851,-1259.1392167224028,
                 771.32342877765313,-176.61502916214059,12.507343278686905,
                 -0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
      if (z < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * z)) - lgamma(1 - z);
      z--; let x = c[0];
      for (let i = 1; i <= 8; i++) x += c[i] / (z + i);
      const t = z + 7.5;
      return 0.5 * Math.log(2 * Math.PI) + (z + 0.5) * Math.log(t) - t + Math.log(x);
    }
    function betacf(a, b, x) {
      const MAXIT = 100, EPS = 3e-7, FP = 1e-30;
      const qab = a+b, qap = a+1, qam = a-1;
      let c = 1, d = 1 - qab*x/qap;
      if (Math.abs(d) < FP) d = FP; d = 1/d; let h = d;
      for (let m = 1; m <= MAXIT; m++) {
        const m2 = 2*m;
        let aa = m*(b-m)*x/((qam+m2)*(a+m2));
        d = 1+aa*d; if (Math.abs(d)<FP) d=FP; c = 1+aa/c; if (Math.abs(c)<FP) c=FP; d=1/d; h*=d*c;
        aa = -(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
        d = 1+aa*d; if (Math.abs(d)<FP) d=FP; c = 1+aa/c; if (Math.abs(c)<FP) c=FP; d=1/d;
        const del = d*c; h *= del; if (Math.abs(del-1) < EPS) break;
      }
      return h;
    }
    function betai(a, b, x) {
      if (x <= 0) return 0; if (x >= 1) return 1;
      const bt = Math.exp(lgamma(a+b)-lgamma(a)-lgamma(b)+a*Math.log(x)+b*Math.log(1-x));
      return x < (a+1)/(a+b+2) ? bt*betacf(a,b,x)/a : 1-bt*betacf(b,a,1-x)/b;
    }
    function tPValue(t, df) { return betai(df/2, 0.5, df/(df + t*t)); }

    function linearRegression(pts) {
      const n = pts.length;
      if (n < 3) return null; // need df = n-2 ≥ 1 for a meaningful p-value
      const sx  = pts.reduce((s, p) => s + p.x, 0);
      const sy  = pts.reduce((s, p) => s + p.y, 0);
      const sxy = pts.reduce((s, p) => s + p.x * p.y, 0);
      const sx2 = pts.reduce((s, p) => s + p.x * p.x, 0);
      const denom = n * sx2 - sx * sx;
      if (!denom) return null;
      const m    = (n * sxy - sx * sy) / denom;
      const b    = (sy - m * sx) / n;
      const SSxx = sx2 - sx * sx / n;
      const SSres = pts.reduce((s, p) => { const e = p.y-(m*p.x+b); return s+e*e; }, 0);
      if (SSres === 0) return { m, b, pValue: m === 0 ? 1 : 0 };
      const SE   = Math.sqrt(SSres / ((n - 2) * SSxx));
      return { m, b, pValue: tPValue(Math.abs(m / SE), n - 2) };
    }

    function drawScatter(canvasEl, points, { xLabel, yMin = 0, yMax = 5, logX = false }) {
      const dpr = window.devicePixelRatio || 1;
      const W_CSS = canvasEl.parentElement.clientWidth;
      const H_CSS = 256;
      canvasEl.width  = W_CSS * dpr;
      canvasEl.height = H_CSS * dpr;
      canvasEl.style.width  = W_CSS + 'px';
      canvasEl.style.height = H_CSS + 'px';

      const ctx = canvasEl.getContext('2d');
      ctx.scale(dpr, dpr);

      // measure star label width so left padding is exactly what's needed
      ctx.font = `11px -apple-system, "Segoe UI Symbol", sans-serif`;
      const starLabelW = Math.ceil(ctx.measureText('★★★★★').width);
      const pad = { top: 18, right: 18, bottom: 46, left: starLabelW + 10 };
      const W = W_CSS, H = H_CSS;
      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top  - pad.bottom;

      const muted  = cssVar('--text-muted');
      const border = cssVar('--border');
      const accent = cssVar('--accent');
      const bgCard = cssVar('--bg-card') || cssVar('--bg');
      const bgAlt  = cssVar('--bg-alt');

      ctx.clearRect(0, 0, W, H);

      // Support log scale on x-axis: transform coordinates before layout
      const toRaw   = x => logX ? Math.log(x) : x;
      const origXMin = Math.min(...points.map(p => p.x));
      const origXMax = Math.max(...points.map(p => p.x));
      const xMin = toRaw(origXMin);
      const xMax = toRaw(origXMax);
      const xRange = xMax - xMin || 1;

      const toX = x => pad.left + (toRaw(x) - xMin) / xRange * plotW;
      const toY = y => pad.top  + (1 - (y - yMin) / (yMax - yMin)) * plotH;

      // Plot area background
      ctx.fillStyle = bgAlt;
      if (ctx.roundRect) {
        ctx.beginPath(); ctx.roundRect(pad.left, pad.top, plotW, plotH, 6); ctx.fill();
      } else {
        ctx.fillRect(pad.left, pad.top, plotW, plotH);
      }

      // Dashed horizontal grid lines + star Y labels
      ctx.font = `11px -apple-system, "Segoe UI Symbol", sans-serif`;
      for (let r = yMin; r <= yMax; r++) {
        const y = toY(r);
        if (r > yMin) {
          ctx.strokeStyle = border;
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 6]);
          ctx.globalAlpha = 0.55;
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(pad.left + plotW, y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }
        if (r > 0) {
          ctx.fillStyle = '#f59e0b';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText('★'.repeat(r), pad.left - 5, y);
        }
      }

      // Points — tiny and faint; trend line is the signal, these are just context
      for (const p of points) {
        const yJitter = (Math.random() - 0.5) * 0.28;
        // log mode: jitter in pixel space (data jitter would be uneven across the scale)
        // linear mode: jitter in data space so it scales with the axis range
        const px = logX
          ? toX(p.x) + (Math.random() - 0.5) * 8
          : toX(p.x + (Math.random() - 0.5) * xRange * 0.012);
        ctx.beginPath();
        ctx.arc(px, toY(p.y + yJitter), 2.5, 0, Math.PI * 2);
        ctx.fillStyle = muted;
        ctx.globalAlpha = 0.35;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Trend line — regression computed in transformed (log) space
      const ptsReg = points.map(p => ({ x: toRaw(p.x), y: p.y }));
      const reg = linearRegression(ptsReg);
      if (reg) {
        const y0 = Math.max(yMin, Math.min(yMax, reg.m * xMin + reg.b));
        const y1 = Math.max(yMin, Math.min(yMax, reg.m * xMax + reg.b));
        ctx.save();
        ctx.beginPath(); ctx.rect(pad.left, pad.top, plotW, plotH); ctx.clip();
        const areaGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
        areaGrad.addColorStop(0, accent + '40');
        areaGrad.addColorStop(1, accent + '06');
        ctx.beginPath();
        ctx.moveTo(toX(origXMin), toY(y0));
        ctx.lineTo(toX(origXMax), toY(y1));
        ctx.lineTo(toX(origXMax), toY(yMin));
        ctx.lineTo(toX(origXMin), toY(yMin));
        ctx.closePath();
        ctx.fillStyle = areaGrad;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(toX(origXMin), toY(y0));
        ctx.lineTo(toX(origXMax), toY(y1));
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 1;
        ctx.stroke();
        ctx.restore();
      }

      // Bottom axis line
      ctx.strokeStyle = border;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + plotH);
      ctx.lineTo(pad.left + plotW, pad.top + plotH);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // X tick marks + labels
      const xTicks = logX ? niceLogTicks(origXMin, origXMax) : niceTicks(origXMin, origXMax, 5);
      ctx.fillStyle = muted;
      ctx.font = `11px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (const t of xTicks) {
        const tx = toX(t);
        ctx.strokeStyle = border;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(tx, pad.top + plotH);
        ctx.lineTo(tx, pad.top + plotH + 4);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillText(t, tx, pad.top + plotH + 7);
      }

      // X axis label
      ctx.fillStyle = muted;
      ctx.font = `11px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(xLabel, W / 2, H - 2);

      return reg || null;
    }

    function niceTicks(min, max, count) {
      const range = max - min || 1;
      const step  = Math.pow(10, Math.floor(Math.log10(range / count)));
      const nice  = [1, 2, 5, 10].map(f => f * step).find(s => range / s <= count * 1.5) || step;
      const start = Math.ceil(min / nice) * nice;
      const ticks = [];
      for (let t = start; t <= max + nice * 0.01; t += nice) ticks.push(Math.round(t * 1000) / 1000);
      return ticks;
    }

    function niceLogTicks(min, max) {
      const ticks = [];
      const lo = Math.pow(10, Math.floor(Math.log10(Math.max(min, 1))));
      for (let base = lo; base <= max; base *= 10) {
        for (const f of [1, 2, 5]) {
          const v = base * f;
          if (v >= min && v <= max) ticks.push(v);
        }
      }
      return ticks;
    }

    // ── Ring SVG ───────────────────────────────────────────────────────────────

    function buildRingCard(type, period, target, current, isOwn, { onSet, onRemove, color = 'var(--accent)' } = {}) {
      const label = TARGET_TYPES[type] || type;
      const R = 44, CX = 55, CY = 55, SW = 9;
      const circ = 2 * Math.PI * R;
      const pct  = target > 0 ? Math.min(1, current / target) : 0;
      const offset = circ * (1 - pct);
      const done = target > 0 && current >= target;

      const card = document.createElement('div');
      card.className = 'card target-card';

      const lbl = document.createElement('div');
      lbl.className = 'target-label';
      lbl.textContent = label;
      card.appendChild(lbl);

      const ringWrap = document.createElement('div');
      ringWrap.className = 'target-ring-wrap';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 110 110`);

      const track = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      track.setAttribute('cx', CX); track.setAttribute('cy', CY); track.setAttribute('r', R);
      track.setAttribute('fill', 'none');
      track.setAttribute('stroke', 'var(--border)');
      track.setAttribute('stroke-width', SW);
      svg.appendChild(track);

      if (done) {
        // Solid disc fill behind the outer ring stroke
        const disc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        disc.setAttribute('cx', CX); disc.setAttribute('cy', CY); disc.setAttribute('r', R);
        disc.setAttribute('fill', color);
        svg.appendChild(disc);
      }

      const prog = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      prog.setAttribute('cx', CX); prog.setAttribute('cy', CY); prog.setAttribute('r', R);
      prog.setAttribute('fill', 'none');
      prog.setAttribute('stroke', color);
      prog.setAttribute('stroke-width', SW);
      prog.setAttribute('stroke-linecap', 'round');
      prog.setAttribute('stroke-dasharray', circ);
      prog.setAttribute('stroke-dashoffset', target > 0 ? offset : circ);
      svg.appendChild(prog);

      ringWrap.appendChild(svg);

      if (done) {
        ringWrap.style.filter = `drop-shadow(0 0 10px ${color})`;
      }

      const center = document.createElement('div');
      center.className = 'target-ring-center';
      const num = document.createElement('div');
      num.className = 'target-ring-num';
      num.textContent = current;
      if (done) num.style.color = '#fff';
      const denom = document.createElement('div');
      denom.className = 'target-ring-denom';

        removeBtn.title = 'Remove target';
        removeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
        removeBtn.addEventListener('click', () => { if (onRemove) onRemove(); });

        const row = document.createElement('div');
        row.className = 'target-input-row';

        input.type = 'number'; input.min = '1'; input.max = '9999';

        input.placeholder = 'Target';

        input.addEventListener('change', trySet);

    // ── Charts ─────────────────────────────────────────────────────────────────

    function layoutBubbles(items, W, H) {
      const maxVal = items[0].value;
      let maxR = Math.min(W, H) * 0.20;
      const nodes = items.map((item, i) => ({
        ...item,
        r: Math.sqrt(item.value / maxVal) * maxR,
        x: W / 2 + Math.cos(i * 2.399) * maxR * Math.sqrt(i + 1),
        y: H / 2 + Math.sin(i * 2.399) * maxR * Math.sqrt(i + 1),
      }));

      // Scale radii down if circles can't physically fit
      const totalArea = nodes.reduce((s, n) => s + Math.PI * n.r * n.r, 0);
      if (totalArea > W * H * 0.82) {
        const scale = Math.sqrt(W * H * 0.82 / totalArea);
        nodes.forEach(n => { n.r *= scale; });
      }

      const clamp = n => {
        n.x = Math.max(n.r, Math.min(W - n.r, n.x));
        n.y = Math.max(n.r, Math.min(H - n.r, n.y));
      };
      const separate = () => {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            const dx = b.x - a.x || 0.001, dy = b.y - a.y || 0.001;
            const d = Math.sqrt(dx * dx + dy * dy);
            const min = a.r + b.r + 2;
            if (d < min) {
              const f = (min - d) / d * 0.5;
              a.x -= dx * f; a.y -= dy * f;
              b.x += dx * f; b.y += dy * f;
              clamp(a); clamp(b);
            }
          }
        }
      };

      for (let t = 0; t < 200; t++) {
        for (const n of nodes) {
          n.x += (W / 2 - n.x) * 0.015;
          n.y += (H / 2 - n.y) * 0.015;
        }
        separate(); separate(); separate();
        nodes.forEach(clamp);
      }
      for (let pass = 0; pass < 300; pass++) separate();

      // Scale the whole pack up to fill the canvas
      const pad  = 6;
      const minX = Math.min(...nodes.map(n => n.x - n.r));
      const maxX = Math.max(...nodes.map(n => n.x + n.r));
      const minY = Math.min(...nodes.map(n => n.y - n.r));
      const maxY = Math.max(...nodes.map(n => n.y + n.r));
      const fill = Math.min((W - pad * 2) / (maxX - minX), (H - pad * 2) / (maxY - minY), 1.4);
      if (fill > 1) {
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        nodes.forEach(n => {
          n.r *= fill;
          n.x  = W / 2 + (n.x - cx) * fill;
          n.y  = H / 2 + (n.y - cy) * fill;
        });
      }

      return nodes;
    }

    async function drawCountriesPie(canvasEl, legendEl) {
      const counts = {};
      for (const b of books) {
        if (b.country) counts[b.country] = (counts[b.country] || 0) + 1;
      }
      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return false;

      const total = entries.reduce((s, [, c]) => s + c, 0);
      const items = entries.map(([name, value]) => ({ name, value }));
      const flagImages = await loadFlagImages(items.map(i => i.name));

      const dpr     = window.devicePixelRatio || 1;
      const parentW = canvasEl.parentElement.clientWidth;
      const W = parentW;
      const H = Math.round(W * MAP_ASPECT);

      const nodes = layoutBubbles(items, W, H);

      canvasEl.width  = W * dpr; canvasEl.height = H * dpr;
      canvasEl.style.width  = W + 'px';
      canvasEl.style.height = H + 'px';
      canvasEl.style.display = 'block';
      canvasEl.style.margin  = '0';
      legendEl.style.display = 'none';

      const ctx = canvasEl.getContext('2d');
      ctx.scale(dpr, dpr);

      const accent = cssVar('--accent');

      function render(sel = -1) {
        ctx.clearRect(0, 0, W, H);
        nodes.forEach((n, ni) => {
          const { name, value, x, y, r } = n;

          const flagImg = flagImages.get(name);
          if (flagImg) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
            ctx.filter = 'brightness(1.08)';
            ctx.drawImage(flagImg, x - r, y - r, r * 2, r * 2);
            ctx.filter = 'none';
            // 3D bubble shading
            ctx.save();
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
            const sGrad = ctx.createRadialGradient(x, y + r * 0.4, 0, x, y, r);
            sGrad.addColorStop(0.4, 'rgba(0,0,0,0)');
            sGrad.addColorStop(1,   'rgba(0,0,0,0.09)');
            ctx.fillStyle = sGrad;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
            const hGrad = ctx.createRadialGradient(x + r * 0.55, y - r * 0.55, 0, x + r * 0.3, y - r * 0.3, r * 1.05);
            hGrad.addColorStop(0,    'rgba(255,255,255,0.18)');
            hGrad.addColorStop(0.3,  'rgba(255,255,255,0.04)');
            hGrad.addColorStop(1,    'rgba(255,255,255,0)');
            ctx.fillStyle = hGrad;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
            ctx.restore();
          } else {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = PIE_COLOR_OTHER;
            ctx.fill();
            ctx.restore();
          }


          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.35)';
          ctx.shadowBlur = 8;
          ctx.shadowOffsetY = 3;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.strokeStyle = ni === sel ? accent : 'rgba(0,0,0,0.15)';
          ctx.globalAlpha = ni === sel ? 0.55 : 1;
          ctx.lineWidth = ni === sel ? 2 : 1;
          ctx.stroke();
          ctx.restore();


          if (r >= 20) {
            const pct = Math.round(value / total * 100);
            const fs = Math.max(10, Math.min(15, r * 0.28));
            ctx.save();
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `700 ${fs}px -apple-system, sans-serif`;
            ctx.lineJoin = 'round';
            ctx.lineWidth = fs * 0.22;
            ctx.strokeStyle = 'rgba(0,0,0,0.55)';
            ctx.strokeText(`${pct}%`, x, y + 1);
            ctx.fillStyle = '#fff';
            ctx.fillText(`${pct}%`, x, y + 1);
            ctx.restore();
          }
        });

      }

      render();

      const selOverlay = document.getElementById('bubble-sel');
      function updateSelectionOverlay(idx = selected) {
        if (idx < 0) { selOverlay.style.display = 'none'; return; }
        const n = nodes[idx];
        const scaleX = canvasEl.offsetWidth / W;
        const scaleY = canvasEl.offsetHeight / H;
        selOverlay.style.display = '';
        selOverlay.style.left   = (n.x - n.r) * scaleX + 'px';
        selOverlay.style.top    = (n.y - n.r) * scaleY + 'px';
        selOverlay.style.width  = n.r * 2 * scaleX + 'px';
        selOverlay.style.height = n.r * 2 * scaleY + 'px';
      }

      const labelEl  = document.getElementById('chart-countries-label');
      const labelName = document.getElementById('chart-countries-label-name');
      const labelPct  = document.getElementById('chart-countries-label-pct');

      labelEl.style.cursor = 'pointer';
      labelEl.addEventListener('click', () => {
        if (selected < 0) return;
        const country = encodeURIComponent(nodes[selected].name.toLowerCase());
        const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
        location.href = `../library/?country=${country}${u}`;
      });

      let selected = -1;

      function showLabel(idx) {
        const display = idx >= 0 ? idx : selected;
        if (display < 0) {
          labelEl.style.visibility = 'hidden';
        } else {
          const n = nodes[display];
          labelName.textContent = n.name;
          labelPct.textContent  = `${n.value} book${n.value === 1 ? '' : 's'}`;
          labelEl.style.visibility = 'visible';
        }
      }

      let hovered = -1;
      function hitTest(cx, cy) {
        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i], dx = cx - n.x, dy = cy - n.y;
          if (dx * dx + dy * dy <= n.r * n.r) return i;
        }
        return -1;
      }
      function canvasCoords(clientX, clientY) {
        const rect = canvasEl.getBoundingClientRect();
        return [(clientX - rect.left) * (W / rect.width), (clientY - rect.top) * (H / rect.height)];
      }
      canvasEl.addEventListener('mousemove', e => {
        const [cx, cy] = canvasCoords(e.clientX, e.clientY);
        const hit = hitTest(cx, cy);
        canvasEl.style.cursor = hit >= 0 ? 'pointer' : '';
        if (hit !== hovered) { hovered = hit; showLabel(hovered); updateSelectionOverlay(hovered); }
      });
      canvasEl.addEventListener('mouseleave', () => {
        hovered = -1; showLabel(-1); canvasEl.style.cursor = '';
        updateSelectionOverlay(-1);
      });
      canvasEl.addEventListener('click', e => {
        const [cx, cy] = canvasCoords(e.clientX, e.clientY);
        const hit = hitTest(cx, cy);
        if (hit >= 0 && hit === selected) {
          const country = encodeURIComponent(nodes[hit].name.toLowerCase());
          const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
          location.href = `../library/?country=${country}${u}`;
        } else {
          selected = hit;
          render(selected);
          showLabel(hovered);
        }
      });
      canvasEl.addEventListener('touchstart', e => {
        const t = e.touches[0];
        const [cx, cy] = canvasCoords(t.clientX, t.clientY);
        const hit = hitTest(cx, cy);
        if (hit >= 0 && hit === selected) {
          const country = encodeURIComponent(nodes[hit].name.toLowerCase());
          const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
          location.href = `../library/?country=${country}${u}`;
        } else {
          selected = hit;
          render(selected);
          showLabel(hit);
        }
        if (hit >= 0) e.preventDefault();
      }, { passive: false });
      canvasEl.addEventListener('touchend', () => {
        hovered = -1;
        updateSelectionOverlay(-1);
        showLabel(-1);
      });

      return true;
    }

    // Shared aspect ratio for both the bubble chart and map — derived from Winkel Tripel projection bounds
    const _phi1    = Math.acos(2 / Math.PI);
    const _xMax    = Math.PI / 2 + 1;
    const _xLeft   = (-160 * Math.PI / 360) * (1 + Math.cos(_phi1));
    const _yRange  = Math.PI / 2 + 60 * Math.PI / 180; // yMax − yBottom (90°N to 60°S)
    const MAP_ASPECT = _yRange / (_xMax - _xLeft);

    let worldGeoCache = null;
    async function drawCountriesMap(counts) {
      const mapEl     = document.getElementById('chart-countries-map');
      const labelEl   = document.getElementById('chart-countries-label');
      const labelName = document.getElementById('chart-countries-label-name');
      const labelPct  = document.getElementById('chart-countries-label-pct');

      if (!worldGeoCache) {
        const res = await fetch('https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson');
        worldGeoCache = await res.json();
      }

      // Reverse map: ISO code → original country string from user's books (for library link)
      const isoToName = {};
      for (const b of books) {
        if (b.country) {
          const code = COUNTRY_ISO[b.country.toLowerCase()];
          if (code && !isoToName[code]) isoToName[code] = b.country;
        }
      }

      // Winkel Tripel projection — average of equirectangular and Aitoff
      const phi1    = Math.acos(2 / Math.PI);    // standard parallel ≈ 50.47°
      const xMax    = Math.PI / 2 + 1;           // half-width in projection units
      const yMax    = Math.PI / 2;               // north pole y
      const yBottom = -60 * Math.PI / 180;       // clip southern ocean at 60°S
      // At φ=0, x = λ/2 × (1 + cos(φ₁)) — use this to derive the left edge cutoff longitude
      const xLeft   = (-160 * Math.PI / 360) * (1 + Math.cos(phi1)); // clip east Pacific at 160°W

      mapEl.innerHTML = '';
      const canvas = document.createElement('canvas');
      mapEl.appendChild(canvas);

      const dpr = window.devicePixelRatio || 1;
      const W   = mapEl.offsetWidth || 600;
      const H   = Math.round(W * MAP_ASPECT);
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      canvas.style.cssText = `width:100%;height:${H}px;display:block`;

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const accent  = cssVar('--accent');
      const border  = cssVar('--border');
      const bgCard  = cssVar('--bg-card');
      const max      = Math.max(...Object.values(counts), 1);
      const nonZero  = Object.values(counts).filter(v => v > 0);
      const minCount = nonZero.length ? Math.min(...nonZero) : 1;

      // Parse a hex color into [r, g, b] — getComputedStyle always returns hex here
      const hexRgb = h => { h = h.trim().replace(/^#/,''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
      const [ar,ag,ab] = hexRgb(accent);
      // 3-stop gradient in the accent hue: very light (t=0) → accent (t=0.5) → very dark (t=1)
      // Lightness levels match the reference scale: ~87% / ~63% / ~19%
      const lR = Math.round(255 * 0.85 + ar * 0.15), lG = Math.round(255 * 0.85 + ag * 0.15), lB = Math.round(255 * 0.85 + ab * 0.15);
      const mR = Math.round(255 * 0.30 + ar * 0.70), mG = Math.round(255 * 0.30 + ag * 0.70), mB = Math.round(255 * 0.30 + ab * 0.70);
      const dR = Math.round(ar * 0.55),               dG = Math.round(ag * 0.55),               dB = Math.round(ab * 0.55);
      const mixColor = t => {
        let r, g, b;
        if (t <= 0.5) { const u = t * 2; r = Math.round(lR + (mR-lR)*u); g = Math.round(lG + (mG-lG)*u); b = Math.round(lB + (mB-lB)*u); }
        else          { const u = (t-0.5)*2; r = Math.round(mR + (dR-mR)*u); g = Math.round(mG + (dG-mG)*u); b = Math.round(mB + (dB-mB)*u); }
        return `rgb(${r},${g},${b})`;
      };
      const noValueColor = '#FFFFFF';
      function project([lon, lat]) {
        const λ = lon * Math.PI / 180;
        const φ = lat * Math.PI / 180;
        const α = Math.acos(Math.cos(φ) * Math.cos(λ / 2));
        const sinc = α < 1e-10 ? 1 : Math.sin(α) / α;
        const x = 0.5 * (λ * Math.cos(phi1) + 2 * Math.cos(φ) * Math.sin(λ / 2) / sinc);
        const y = 0.5 * (φ + Math.sin(φ) / sinc);
        return [(x - xLeft) / (xMax - xLeft) * W, (yMax - y) / (yMax - yBottom) * H];
      }

      function featurePath(geometry) {
        const p    = new Path2D();
        const polys = geometry.type === 'Polygon' ? [geometry.coordinates] : geometry.coordinates;
        for (const poly of polys) {
          for (const ring of poly) {
            let first = true;
            for (const coord of ring) {
              const [x, y] = project(coord);
              first ? p.moveTo(x, y) : p.lineTo(x, y);
              first = false;
            }
            p.closePath();
          }
        }
        return p;
      }

      // First pass: fills
      const drawn = [];
      for (const feat of worldGeoCache.features) {
        if (!feat.geometry) continue;
        let iso = (feat.properties.ISO_A2 || '').toLowerCase();
        if (iso === '-99') {
          // Known Natural Earth data quality issue — fall back to ISO_A2_EH, then ADMIN name lookup
          iso = (feat.properties.ISO_A2_EH || '').toLowerCase();
          if (!iso || iso === '-99') {
            const admin = (feat.properties.ADMIN || feat.properties.NAME || '').toLowerCase();
            iso = COUNTRY_ISO[admin] || '';
          }
        }
        if (!iso || iso === 'aq') continue;
        const count = counts[iso] || 0;
        const t     = count > 0 ? (max === minCount ? 1 : (count - minCount) / (max - minCount)) : 0;
        const p     = featurePath(feat.geometry);
        drawn.push({ p, iso, count, t, name: feat.properties.NAME });
        ctx.globalAlpha = 1;
        ctx.fillStyle   = count > 0 ? mixColor(t) : noValueColor;
        ctx.fill(p);
      }
      ctx.globalAlpha = 1;

      // Third pass: borders on top
      ctx.globalAlpha = 1;
      ctx.strokeStyle = cssVar('--text-muted');
      ctx.lineWidth   = 0.8;
      for (const { p } of drawn) ctx.stroke(p);

      // Overlay canvas for hover/pin highlight — drawn on top, avoids redrawing base map
      mapEl.style.position = 'relative';
      const overlay = document.createElement('canvas');
      overlay.width  = W * dpr;
      overlay.height = H * dpr;
      overlay.style.cssText = `position:absolute;top:0;left:0;width:100%;height:${H}px;pointer-events:none`;
      mapEl.appendChild(overlay);
      const octx = overlay.getContext('2d');
      octx.scale(dpr, dpr);

      // isPointInPath needs physical pixel coords when ctx has a DPR scale transform
      function hitTest(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width, sy = canvas.height / rect.height;
        const mx = (e.clientX - rect.left) * sx;
        const my = (e.clientY - rect.top)  * sy;
        for (let i = drawn.length - 1; i >= 0; i--) {
          if (ctx.isPointInPath(drawn[i].p, mx, my)) return drawn[i];
        }
        return null;
      }

      let hovered = null, pinned = null;

      function redrawOverlay() {
        octx.clearRect(0, 0, W, H);
        if (hovered) { octx.fillStyle = 'rgba(0,0,0,0.09)'; octx.fill(hovered.p); }
        if (pinned)  { octx.strokeStyle = accent; octx.lineWidth = 1.5; octx.stroke(pinned.p); }
      }

      function showLabel(d) {
        if (!d) { labelEl.style.visibility = 'hidden'; return; }
        labelName.textContent = d.name;
        labelPct.textContent  = d.count > 0 ? `${d.count} book${d.count === 1 ? '' : 's'}` : '';
        labelEl.style.visibility = 'visible';
      }

      canvas.addEventListener('mousemove', e => {
        const hit = hitTest(e);
        if (hit === hovered) return;
        hovered = hit;
        canvas.style.cursor = (hit && hit.count > 0) ? 'pointer' : '';
        redrawOverlay();
        showLabel(hit || pinned);
      });

      canvas.addEventListener('mouseleave', () => {
        hovered = null;
        canvas.style.cursor = '';
        redrawOverlay();
        showLabel(pinned);
      });

      canvas.addEventListener('click', e => {
        const hit = hitTest(e);
        if (!hit) { pinned = null; redrawOverlay(); showLabel(hovered); return; }
        if (pinned === hit && hit.count > 0) {
          const name = isoToName[hit.iso] || hit.name;
          const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
          location.href = `../library/?country=${encodeURIComponent(name.toLowerCase())}${u}`;
          return;
        }
        pinned = pinned === hit ? null : hit;
        redrawOverlay();
        showLabel(pinned || hovered);
      });
    }

    async function drawCharts() {
      const finished = books.filter(b => b.rating != null);

      const ptsPages = finished
        .filter(b => b.totalPages > 0)
        .map(b => ({ x: b.totalPages, y: b.rating }));

      const thisYear = new Date().getFullYear();
      const ptsAge = finished
        .filter(b => b.releaseYear > 0)
        .map(b => ({ x: Math.max(1, thisYear - b.releaseYear), y: b.rating }));

      const countriesCanvas = document.getElementById('chart-countries');
      const countriesLegend = document.getElementById('chart-countries-legend');
      const countriesMapEl  = document.getElementById('chart-countries-map');
      const toggleEl        = document.getElementById('countries-view-toggle');
      const bubbleBtn       = document.getElementById('countries-bubble-btn');
      const mapBtn          = document.getElementById('countries-map-btn');

      // Build counts map (lowercase country name → count)
      const countryCounts = {};
      for (const b of books) {
        if (b.country) {
          const code = COUNTRY_ISO[b.country.toLowerCase()];
          if (code) countryCounts[code] = (countryCounts[code] || 0) + 1;
        }
      }

      if (await drawCountriesPie(countriesCanvas, countriesLegend)) {
        document.getElementById('chart-countries-empty').style.display = 'none';
        if (!toggleEl._wired) {
          toggleEl.style.display = '';
          toggleEl._wired = true;
          let mapDrawn = false;

          const chartWrap = countriesCanvas.parentElement;
          const showBubble = () => {
            bubbleBtn.classList.add('active'); mapBtn.classList.remove('active');
            chartWrap.style.display = ''; countriesMapEl.style.display = 'none';
          };
          const showMap = async () => {
            mapBtn.classList.add('active'); bubbleBtn.classList.remove('active');
            chartWrap.style.display = 'none'; countriesMapEl.style.display = '';
            if (!mapDrawn) { await drawCountriesMap(countryCounts); mapDrawn = true; }
          };

          bubbleBtn.addEventListener('click', () => { showBubble(); localStorage.setItem('countries-view', 'bubble'); });
          mapBtn.addEventListener('click',    () => { showMap();   localStorage.setItem('countries-view', 'map'); });

          if (localStorage.getItem('countries-view') === 'map') await showMap();
        }
      } else {
        countriesCanvas.style.display = 'none';
        document.getElementById('chart-countries-empty').style.display = '';
      }

      const pagesCanvas = document.getElementById('chart-pages');
      const ageCanvas   = document.getElementById('chart-age');

      // Build subject / possessive depending on whose profile this is
      const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      let subjHtml, verb, possHtml;
      if (isOwn) {
        subjHtml = 'You'; verb = 'tend'; possHtml = 'your';
      } else {
        const name = esc(targetProfile.displayName || targetProfile.username);
        subjHtml = name; verb = 'tends'; possHtml = `${name}'s`;
      }

      if (ptsPages.length >= 2) {
        const reg = drawScatter(pagesCanvas, ptsPages, { xLabel: 'Pages', yMin: 0, yMax: 5, logX: true });
        if (reg) {
          const p = reg.pValue, up = reg.m > 0;
          document.getElementById('chart-pages-summary').innerHTML = p < 0.05 && up
            ? `${subjHtml} ${verb} to rate longer books more highly.`
            : p < 0.05 && !up
            ? `${subjHtml} ${verb} to rate shorter books more highly.`
            : p < 0.1 && up
            ? `${subjHtml} ${verb} to rate longer books slightly more highly.`
            : p < 0.1 && !up
            ? `${subjHtml} ${verb} to rate shorter books slightly more highly.`
            : `Book length doesn't seem to have much effect on ${possHtml} ratings.`;
        }
      } else {
        pagesCanvas.style.display = 'none';
        document.getElementById('chart-pages-empty').style.display = '';
      }

      if (ptsAge.length >= 2) {
        const reg = drawScatter(ageCanvas, ptsAge, { xLabel: 'Book age (years)', yMin: 0, yMax: 5, logX: true });
        if (reg) {
          const p = reg.pValue, up = reg.m > 0;
          document.getElementById('chart-age-summary').innerHTML = p < 0.05 && up
            ? `${subjHtml} ${verb} to rate older books more highly.`
            : p < 0.05 && !up
            ? `${subjHtml} ${verb} to rate more recent books more highly.`
            : p < 0.1 && up
            ? `${subjHtml} ${verb} to rate older books slightly more highly.`
            : p < 0.1 && !up
            ? `${subjHtml} ${verb} to rate more recent books slightly more highly.`
            : `A book's age doesn't seem to have much effect on ${possHtml} ratings.`;
        }
      } else {
        ageCanvas.style.display = 'none';
        document.getElementById('chart-age-empty').style.display = '';
      }
    }

    drawCharts();

    new MutationObserver(() => drawCharts())
      .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    window.addEventListener('resize', () => drawCharts());

    } // end if (targetProfile)
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
