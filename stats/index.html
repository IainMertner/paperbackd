  <style>
    .stats-tab-bar {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: .75rem;
    }
    .stats-tab-btn {
      flex: 1;
      padding: .5rem .25rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      font-size: .9rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      font-weight: 400;
      transition: color .15s;
    }
    .stats-tab-btn.active {
      border-bottom-color: var(--accent);
      color: var(--text);
      font-weight: 600;
    }
    .target-card {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
      margin-top: 0 !important;
      position: relative;
    }
    .target-label {
      font-size: .8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      font-weight: 500;
    }
    .target-ring-wrap {
      width: 110px;
      height: 110px;
      position: relative;
    }
    .target-ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .target-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }
    .target-ring-num {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .target-ring-denom {
      font-size: .75rem;
      color: var(--text-muted);
    }
    .target-input-row {
      display: flex;
      align-items: center;
      gap: .4rem;
      width: 100%;
      justify-content: center;
    }
    .target-input-row input {
      width: 64px;
      padding: .3rem .4rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text);
      font-size: .85rem;
      font-family: inherit;
      text-align: center;
    }
    .target-save-btn {
      padding: .3rem .65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: .8rem;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
    }
    .target-save-btn:hover { opacity: .85; }
    .chart-card {
      padding: 1rem;
      margin-bottom: .75rem;
    }
    .chart-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .75rem;
    }
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    .chart-empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--text-muted);
      font-size: .85rem;
    }
    canvas.scatter {
      display: block;
      width: 100%;
    }
  </style>
</head>

  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getProfile, getFinishedBooks, db } from '../js/firebase.js';
    import { doc, updateDoc, deleteField } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const NOW  = new Date();
    const CY   = NOW.getFullYear();
    const CM   = NOW.getMonth();

    const TARGET_TYPES  = { books: 'Books read', countries: 'Countries' };
    const PERIODS       = ['monthly', 'yearly', 'overall'];
    const PERIOD_LABELS = { monthly: 'Monthly', yearly: 'Yearly', overall: 'Overall' };
    const PERIOD_COLORS = { monthly: '#3b82f6', yearly: '#f59e0b', overall: '#8b5cf6' };

    let editMode = false;

    // ── Helpers ────────────────────────────────────────────────────────────────

    function showToast(msg) {
      let t = document.getElementById('global-toast');
      if (!t) { t = document.createElement('div'); t.id = 'global-toast'; t.className = 'global-toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('visible'), 5000);
    }

    function cssVar(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    const PIE_COLOR_OTHER = '#6b7280';

    const PIE_COLORS = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1','#14b8a6','#f43f5e','#eab308','#a855f7'];

    const COUNTRY_ISO = {
      'united states': 'us', 'usa': 'us', 'us': 'us',
      'united kingdom': 'gb', 'uk': 'gb', 'england': 'gb', 'great britain': 'gb', 'britain': 'gb', 'scotland': 'gb', 'wales': 'gb', 'northern ireland': 'gb',
      'france': 'fr', 'germany': 'de', 'italy': 'it', 'spain': 'es', 'portugal': 'pt',
      'netherlands': 'nl', 'belgium': 'be', 'switzerland': 'ch', 'austria': 'at',
      'sweden': 'se', 'norway': 'no', 'denmark': 'dk', 'finland': 'fi',
      'poland': 'pl', 'ukraine': 'ua', 'greece': 'gr',
      'czech republic': 'cz', 'czechia': 'cz', 'hungary': 'hu', 'romania': 'ro',
      'serbia': 'rs', 'croatia': 'hr', 'slovakia': 'sk', 'bulgaria': 'bg',
      'russia': 'ru', 'ireland': 'ie', 'iceland': 'is', 'luxembourg': 'lu',
      'estonia': 'ee', 'latvia': 'lv', 'lithuania': 'lt',
      'japan': 'jp', 'china': 'cn', 'south korea': 'kr', 'korea': 'kr', 'taiwan': 'tw',
      'india': 'in', 'pakistan': 'pk', 'bangladesh': 'bd', 'sri lanka': 'lk',
      'vietnam': 'vn', 'thailand': 'th', 'indonesia': 'id', 'philippines': 'ph',
      'malaysia': 'my', 'singapore': 'sg', 'myanmar': 'mm', 'cambodia': 'kh',
      'iran': 'ir', 'turkey': 'tr', 'israel': 'il', 'jordan': 'jo', 'iraq': 'iq',
      'saudi arabia': 'sa', 'united arab emirates': 'ae', 'uae': 'ae',
      'canada': 'ca', 'mexico': 'mx', 'cuba': 'cu', 'guatemala': 'gt', 'costa rica': 'cr',
      'trinidad and tobago': 'tt', 'trinidad': 'tt', 'tobago': 'tt', 'jamaica': 'jm', 'haiti': 'ht', 'dominican republic': 'do',
      'brazil': 'br', 'argentina': 'ar', 'colombia': 'co', 'chile': 'cl',
      'peru': 'pe', 'venezuela': 've', 'ecuador': 'ec', 'bolivia': 'bo', 'uruguay': 'uy', 'paraguay': 'py',
      'australia': 'au', 'new zealand': 'nz',
      'nigeria': 'ng', 'south africa': 'za', 'egypt': 'eg', 'kenya': 'ke',
      'ghana': 'gh', 'ethiopia': 'et', 'morocco': 'ma', 'tanzania': 'tz',
      'uganda': 'ug', 'zimbabwe': 'zw', 'rwanda': 'rw', 'angola': 'ao',
      'hong kong': 'hk',
    };

    const flagImageCache = new Map();

    function loadFlagImage(code) {
      if (flagImageCache.has(code)) return Promise.resolve(flagImageCache.get(code));
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => { flagImageCache.set(code, img); resolve(img); };
        img.onerror = () => resolve(null);
        img.src = `https://cdn.jsdelivr.net/gh/HatScripts/circle-flags@latest/flags/${code}.svg`;
      });
    }

    async function loadFlagImages(names) {
      const result = new Map();
      await Promise.all(names.map(async name => {
        const code = COUNTRY_ISO[name.toLowerCase()];
        if (!code) return;
        const img = await loadFlagImage(code);
        if (img) result.set(name, img);
      }));
      return result;
    }

    function linearRegression(pts) {
      const n = pts.length;
      if (n < 2) return null;
      const sx = pts.reduce((s, p) => s + p.x, 0);
      const sy = pts.reduce((s, p) => s + p.y, 0);
      const sxy = pts.reduce((s, p) => s + p.x * p.y, 0);
      const sx2 = pts.reduce((s, p) => s + p.x * p.x, 0);
      const denom = n * sx2 - sx * sx;
      if (!denom) return null;
      const m = (n * sxy - sx * sy) / denom;
      const b = (sy - m * sx) / n;
      return { m, b };
    }

    function drawScatter(canvasEl, points, { xLabel, yMin = 0, yMax = 5 }) {
      const dpr = window.devicePixelRatio || 1;
      const W_CSS = canvasEl.parentElement.clientWidth;
      const H_CSS = 256;
      canvasEl.width  = W_CSS * dpr;
      canvasEl.height = H_CSS * dpr;
      canvasEl.style.width  = W_CSS + 'px';
      canvasEl.style.height = H_CSS + 'px';

      const ctx = canvasEl.getContext('2d');
      ctx.scale(dpr, dpr);

      // measure star label width so left padding is exactly what's needed
      ctx.font = `11px -apple-system, "Segoe UI Symbol", sans-serif`;
      const starLabelW = Math.ceil(ctx.measureText('★★★★★').width);
      const pad = { top: 18, right: 18, bottom: 46, left: starLabelW + 10 };
      const W = W_CSS, H = H_CSS;
      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top  - pad.bottom;

      const muted  = cssVar('--text-muted');
      const border = cssVar('--border');
      const accent = cssVar('--accent');
      const bgCard = cssVar('--bg-card') || cssVar('--bg');
      const bgAlt  = cssVar('--bg-alt');

      ctx.clearRect(0, 0, W, H);

      const xs = points.map(p => p.x);
      const xMin = Math.min(...xs);
      const xMax = Math.max(...xs);
      const xRange = xMax - xMin || 1;

      const toX = x => pad.left + ((x - xMin) / xRange) * plotW;
      const toY = y => pad.top  + (1 - (y - yMin) / (yMax - yMin)) * plotH;

      // Plot area background
      ctx.fillStyle = bgAlt;
      if (ctx.roundRect) {
        ctx.beginPath(); ctx.roundRect(pad.left, pad.top, plotW, plotH, 6); ctx.fill();
      } else {
        ctx.fillRect(pad.left, pad.top, plotW, plotH);
      }

      // Dashed horizontal grid lines + star Y labels
      ctx.font = `11px -apple-system, "Segoe UI Symbol", sans-serif`;
      for (let r = yMin; r <= yMax; r++) {
        const y = toY(r);
        if (r > yMin) {
          ctx.strokeStyle = border;
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 6]);
          ctx.globalAlpha = 0.55;
          ctx.beginPath();
          ctx.moveTo(pad.left, y);
          ctx.lineTo(pad.left + plotW, y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }
        if (r > 0) {
          ctx.fillStyle = '#f59e0b';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillText('★'.repeat(r), pad.left - 5, y);
        }
      }

      // Points — tiny and faint; trend line is the signal, these are just context
      for (const p of points) {
        const jitter  = (Math.random() - 0.5) * 0.28;
        const xJitter = (Math.random() - 0.5) * xRange * 0.012;
        ctx.beginPath();
        ctx.arc(toX(p.x + xJitter), toY(p.y + jitter), 2.5, 0, Math.PI * 2);
        ctx.fillStyle = muted;
        ctx.globalAlpha = 0.35;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Trend line — the hero: thick, solid, with a strong gradient area underneath
      const reg = linearRegression(points);
      if (reg) {
        const x0 = xMin, x1 = xMax;
        const y0 = Math.max(yMin, Math.min(yMax, reg.m * x0 + reg.b));
        const y1 = Math.max(yMin, Math.min(yMax, reg.m * x1 + reg.b));
        ctx.save();
        ctx.beginPath(); ctx.rect(pad.left, pad.top, plotW, plotH); ctx.clip();
        const areaGrad = ctx.createLinearGradient(0, pad.top, 0, pad.top + plotH);
        areaGrad.addColorStop(0, accent + '40');
        areaGrad.addColorStop(1, accent + '06');
        ctx.beginPath();
        ctx.moveTo(toX(x0), toY(y0));
        ctx.lineTo(toX(x1), toY(y1));
        ctx.lineTo(toX(x1), toY(yMin));
        ctx.lineTo(toX(x0), toY(yMin));
        ctx.closePath();
        ctx.fillStyle = areaGrad;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(toX(x0), toY(y0));
        ctx.lineTo(toX(x1), toY(y1));
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 1;
        ctx.stroke();
        ctx.restore();
      }

      // Bottom axis line
      ctx.strokeStyle = border;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + plotH);
      ctx.lineTo(pad.left + plotW, pad.top + plotH);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // X tick marks + labels
      const xTicks = niceTicks(xMin, xMax, 5);
      ctx.fillStyle = muted;
      ctx.font = `11px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      for (const t of xTicks) {
        const tx = toX(t);
        ctx.strokeStyle = border;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(tx, pad.top + plotH);
        ctx.lineTo(tx, pad.top + plotH + 4);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillText(t, tx, pad.top + plotH + 7);
      }

      // X axis label
      ctx.fillStyle = muted;
      ctx.font = `11px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(xLabel, W / 2, H - 2);
    }

    function niceTicks(min, max, count) {
      const range = max - min || 1;
      const step  = Math.pow(10, Math.floor(Math.log10(range / count)));
      const nice  = [1, 2, 5, 10].map(f => f * step).find(s => range / s <= count * 1.5) || step;
      const start = Math.ceil(min / nice) * nice;
      const ticks = [];
      for (let t = start; t <= max + nice * 0.01; t += nice) ticks.push(Math.round(t * 1000) / 1000);
      return ticks;
    }

    // ── Ring SVG ───────────────────────────────────────────────────────────────

    function buildRingCard(type, period, target, current, isOwn, { onSet, onRemove, color = 'var(--accent)' } = {}) {
      const label = TARGET_TYPES[type] || type;
      const R = 44, CX = 55, CY = 55, SW = 9;
      const circ = 2 * Math.PI * R;
      const pct  = target > 0 ? Math.min(1, current / target) : 0;
      const offset = circ * (1 - pct);
      const done = target > 0 && current >= target;

      const card = document.createElement('div');
      card.className = 'card target-card';

      const lbl = document.createElement('div');
      lbl.className = 'target-label';
      lbl.textContent = label;
      card.appendChild(lbl);

      const ringWrap = document.createElement('div');
      ringWrap.className = 'target-ring-wrap';

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', `0 0 110 110`);

      const track = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      track.setAttribute('cx', CX); track.setAttribute('cy', CY); track.setAttribute('r', R);
      track.setAttribute('fill', 'none');
      track.setAttribute('stroke', 'var(--border)');
      track.setAttribute('stroke-width', SW);
      svg.appendChild(track);

      if (done) {
        // Solid disc fill behind the outer ring stroke
        const disc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        disc.setAttribute('cx', CX); disc.setAttribute('cy', CY); disc.setAttribute('r', R);
        disc.setAttribute('fill', color);
        svg.appendChild(disc);
      }

      const prog = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      prog.setAttribute('cx', CX); prog.setAttribute('cy', CY); prog.setAttribute('r', R);
      prog.setAttribute('fill', 'none');
      prog.setAttribute('stroke', color);
      prog.setAttribute('stroke-width', SW);
      prog.setAttribute('stroke-linecap', 'round');
      prog.setAttribute('stroke-dasharray', circ);
      prog.setAttribute('stroke-dashoffset', target > 0 ? offset : circ);
      svg.appendChild(prog);

      ringWrap.appendChild(svg);

      if (done) {
        ringWrap.style.filter = `drop-shadow(0 0 10px ${color})`;
      }

      const center = document.createElement('div');
      center.className = 'target-ring-center';
      const num = document.createElement('div');
      num.className = 'target-ring-num';
      num.textContent = current;
      if (done) num.style.color = '#fff';
      const denom = document.createElement('div');
      denom.className = 'target-ring-denom';
      denom.textContent = target > 0 ? `of ${target}` : 'no target';
      if (done) denom.style.color = 'rgba(255,255,255,.75)';
      center.appendChild(num);
      center.appendChild(denom);
      ringWrap.appendChild(center);
      card.appendChild(ringWrap);

      if (isOwn) {
        const removeBtn = document.createElement('button');
        removeBtn.className = 'target-remove-btn';
        removeBtn.style.cssText = `position:absolute;top:.4rem;right:.4rem;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:.15rem;display:${editMode ? 'block' : 'none'}`;
        removeBtn.title = 'Remove target';
        removeBtn.innerHTML = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
        removeBtn.addEventListener('click', () => { if (onRemove) onRemove(); });
        card.appendChild(removeBtn);

        const row = document.createElement('div');
        row.className = 'target-input-row';
        row.style.display = editMode ? 'flex' : 'none';
        const input = document.createElement('input');
        input.type = 'number'; input.min = '1'; input.max = '9999';
        input.value = target > 0 ? target : '';
        input.placeholder = 'Target';
        function trySet() { const v = parseInt(input.value, 10); if (v > 0 && onSet) onSet(v); }
        input.addEventListener('change', trySet);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') trySet(); });
        row.appendChild(input);
        card.appendChild(row);
      } else if (target > 0) {
        const pctEl = document.createElement('div');
        pctEl.style.cssText = 'font-size:.8rem;color:var(--text-muted)';
        pctEl.textContent = `${Math.round(pct * 100)}%`;
        card.appendChild(pctEl);
      }

      return card;
    }

    // ── Main ───────────────────────────────────────────────────────────────────

    const { user, profile: myProfile } = await requireAuth();
    try {
    const params      = new URLSearchParams(location.search);
    const targetParam = params.get('u')?.toLowerCase();
    const isOwn       = !targetParam || targetParam === myProfile.username;

    let targetProfile;
    if (isOwn) {
      targetProfile = myProfile;
    } else {
      targetProfile = await getProfileByUsername(targetParam);
    }

    if (!targetProfile) {
      document.getElementById('page-heading').textContent = 'User not found';
    } else {

    document.getElementById('page-heading').innerHTML = isOwn
      ? 'Stats'
      : `<a href="../profile/?u=${encodeURIComponent(targetProfile.username)}" style="color:inherit;text-decoration:none">${targetProfile.username}</a>'s stats`;

    const books = await getFinishedBooks(targetProfile.uid);

    // ── Tab switching ──────────────────────────────────────────────────────────

    const tabTargets = document.getElementById('tab-targets');
    const tabGeneral = document.getElementById('tab-general');
    const panelTargets = document.getElementById('panel-targets');
    const panelGeneral = document.getElementById('panel-general');

    let chartsDrawn = false;

    function switchTab(name) {
      const onGeneral = name === 'general';
      tabGeneral.classList.toggle('active', onGeneral);
      tabTargets.classList.toggle('active', !onGeneral);
      panelGeneral.hidden = !onGeneral;
      panelTargets.hidden = onGeneral;
      if (onGeneral) { drawCharts(); chartsDrawn = true; }
    }

    tabGeneral.addEventListener('click', () => switchTab('general'));
    tabTargets.addEventListener('click', () => switchTab('targets'));

    // ── Targets ────────────────────────────────────────────────────────────────

    let targetsData = { ...(targetProfile.targets || {}) };

    function computeProgress(type, period) {
      const finished = books.filter(b => {
        if (period === 'overall') return true;
        const ts = b.finishedAt;
        if (!ts) return false;
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        if (period === 'yearly')  return d.getFullYear() === CY;
        if (period === 'monthly') return d.getFullYear() === CY && d.getMonth() === CM;
        return true;
      });
      if (type === 'books')     return finished.length;
      if (type === 'countries') return new Set(finished.map(b => b.country).filter(Boolean)).size;
      return 0;
    }

    async function saveTarget(type, period, value) {
      const k = `${type}_${period}`;
      if (value > 0) {
        targetsData[k] = value;
        await updateDoc(doc(db, 'users', targetProfile.uid), { [`targets.${k}`]: value });
      } else {
        delete targetsData[k];
        await updateDoc(doc(db, 'users', targetProfile.uid), { [`targets.${k}`]: deleteField() });
      }
      rebuildSections();
    }

    const targetsContent = document.getElementById('targets-content');
    const sectionsEl = document.createElement('div');

    function rebuildSections() {
      sectionsEl.innerHTML = '';
      let hasAny = false;
      for (const period of PERIODS) {
        const entries = Object.entries(targetsData)
          .filter(([k]) => k.endsWith(`_${period}`))
          .map(([k, v]) => ({ type: k.slice(0, -(period.length + 1)), value: v }))
          .sort((a, b) => (TARGET_TYPES[a.type] || a.type).localeCompare(TARGET_TYPES[b.type] || b.type));
        if (!entries.length) continue;
        hasAny = true;

        const section = document.createElement('div');
        section.style.marginBottom = '1rem';

        const color = PERIOD_COLORS[period] || 'var(--accent)';

        const heading = document.createElement('div');
        heading.style.cssText = `font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${color};margin-bottom:.5rem`;
        heading.textContent = PERIOD_LABELS[period];
        section.appendChild(heading);

        const sectionGrid = document.createElement('div');
        sectionGrid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:.625rem';
        for (const { type, value } of entries) {
          const current = computeProgress(type, period);
          sectionGrid.appendChild(buildRingCard(type, period, value, current, isOwn, {
            onSet:    v => saveTarget(type, period, v),
            onRemove: () => { showToast('Target removed'); saveTarget(type, period, 0); },
            color,
          }));
        }
        section.appendChild(sectionGrid);
        sectionsEl.appendChild(section);
      }
      if (!hasAny && !isOwn) {
        const empty = document.createElement('div');
        empty.style.cssText = 'text-align:center;padding:2rem 0;color:var(--text-muted);font-size:.875rem';
        empty.textContent = 'No targets set.';
        sectionsEl.appendChild(empty);
      }
    }

    if (isOwn) {
      let isPrivate = targetProfile.targetsPrivate !== false;

      const headerRow = document.createElement('div');
      headerRow.style.cssText = 'display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem';

      const addBtn = document.createElement('button');
      addBtn.style.cssText = 'background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:.35rem .65rem;font-size:.85rem;font-family:inherit;color:var(--text-muted);cursor:pointer';
      addBtn.textContent = 'Edit targets';

      const lockBtn = document.createElement('button');
      lockBtn.style.cssText = 'display:inline-flex;align-items:center;gap:.3rem;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:.35rem .65rem;font-size:.85rem;font-family:inherit;color:var(--text-muted);cursor:pointer;margin-left:auto';

      function updateLockBtn() {
        const icon = isPrivate
          ? '<rect x="3" y="11" width="18" height="11" rx="2" fill="currentColor"/><path d="M7 11V7a5 5 0 0 1 10 0v4" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>'
          : '<rect x="3" y="11" width="18" height="11" rx="2" fill="currentColor"/><path d="M7 11V7a5 5 0 0 1 9.9-1" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>';
        lockBtn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16">${icon}</svg>${isPrivate ? 'Private' : 'Public'}`;
      }

      updateLockBtn();

      lockBtn.addEventListener('click', async () => {
        isPrivate = !isPrivate;
        updateLockBtn();
        showToast(isPrivate ? 'Made targets private' : 'Made targets public');
        await updateDoc(doc(db, 'users', targetProfile.uid), { targetsPrivate: isPrivate });
      });

      headerRow.appendChild(addBtn);
      headerRow.appendChild(lockBtn);
      headerRow.style.cssText = 'display:flex;align-items:center;gap:.5rem;margin-top:.75rem';

      // Add target form
      const addForm = document.createElement('div');
      addForm.style.cssText = 'display:none;background:var(--bg-alt);border-radius:var(--radius-sm);padding:.75rem;margin-top:.75rem;flex-wrap:wrap;gap:.5rem;align-items:flex-end';

      const selStyle = 'flex:1;min-width:100px;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit';

      const typeSelect = document.createElement('select');
      typeSelect.style.cssText = selStyle;
      Object.entries(TARGET_TYPES).forEach(([v, l]) => {
        const o = document.createElement('option'); o.value = v; o.textContent = l;
        typeSelect.appendChild(o);
      });

      const periodSelect = document.createElement('select');
      periodSelect.style.cssText = selStyle;
      PERIODS.forEach(p => {
        const o = document.createElement('option'); o.value = p; o.textContent = PERIOD_LABELS[p];
        periodSelect.appendChild(o);
      });

      const numInput = document.createElement('input');
      numInput.type = 'number'; numInput.min = '1'; numInput.placeholder = 'Target';
      numInput.style.cssText = 'width:72px;padding:.3rem .4rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit;text-align:center';

      const formAddBtn = document.createElement('button');
      formAddBtn.textContent = 'Add';
      formAddBtn.style.cssText = 'padding:.3rem .65rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;cursor:pointer;font-weight:500';

      formAddBtn.addEventListener('click', async () => {
        const value = parseInt(numInput.value, 10);
        if (!value || value < 1) return;
        addForm.style.display = 'none';
        numInput.value = '';
        await saveTarget(typeSelect.value, periodSelect.value, value);
      });

      addForm.appendChild(typeSelect);
      addForm.appendChild(periodSelect);
      addForm.appendChild(numInput);
      addForm.appendChild(formAddBtn);

      addBtn.addEventListener('click', () => {
        editMode = !editMode;
        addForm.style.display = editMode ? 'flex' : 'none';
        sectionsEl.querySelectorAll('.target-remove-btn').forEach(b => { b.style.display = editMode ? 'block' : 'none'; });
        sectionsEl.querySelectorAll('.target-input-row').forEach(r => { r.style.display = editMode ? 'flex' : 'none'; });
      });
      targetsContent.appendChild(sectionsEl);
      targetsContent.appendChild(addForm);
      targetsContent.appendChild(headerRow);
      rebuildSections();

    } else if (targetProfile.targetsPrivate !== false) {
      switchTab('general');
      const msg = document.createElement('div');
      msg.style.cssText = 'text-align:center;padding:2.5rem 1rem;color:var(--text-muted)';
      msg.innerHTML = `
        <svg viewBox="0 0 24 24" width="40" height="40"
             style="margin-bottom:.75rem;display:block;margin-inline:auto;opacity:.5">
          <rect x="3" y="11" width="18" height="11" rx="2" fill="currentColor"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <div style="font-size:.9rem">This user's targets are private.</div>`;
      targetsContent.appendChild(msg);
    } else {
      targetsContent.appendChild(sectionsEl);
      rebuildSections();
      if (!Object.keys(targetsData).length) switchTab('general');
    }

    // ── Charts ─────────────────────────────────────────────────────────────────

    function layoutBubbles(items, W, H) {
      const maxVal = items[0].value;
      let maxR = Math.min(W, H) * 0.18;
      const nodes = items.map((item, i) => ({
        ...item,
        r: Math.sqrt(item.value / maxVal) * maxR,
        x: W / 2 + Math.cos(i * 2.399) * maxR * Math.sqrt(i + 1),
        y: H / 2 + Math.sin(i * 2.399) * maxR * Math.sqrt(i + 1),
      }));

      // Scale radii down if circles can't physically fit
      const totalArea = nodes.reduce((s, n) => s + Math.PI * n.r * n.r, 0);
      if (totalArea > W * H * 0.78) {
        const scale = Math.sqrt(W * H * 0.78 / totalArea);
        nodes.forEach(n => { n.r *= scale; });
      }

      const clamp = n => {
        n.x = Math.max(n.r, Math.min(W - n.r, n.x));
        n.y = Math.max(n.r, Math.min(H - n.r, n.y));
      };
      const separate = () => {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            const dx = b.x - a.x || 0.001, dy = b.y - a.y || 0.001;
            const d = Math.sqrt(dx * dx + dy * dy);
            const min = a.r + b.r + 6;
            if (d < min) {
              const f = (min - d) / d * 0.5;
              a.x -= dx * f; a.y -= dy * f;
              b.x += dx * f; b.y += dy * f;
              clamp(a); clamp(b);
            }
          }
        }
      };

      for (let t = 0; t < 200; t++) {
        for (const n of nodes) {
          n.x += (W / 2 - n.x) * 0.015;
          n.y += (H / 2 - n.y) * 0.015;
        }
        separate(); separate(); separate(); // multiple passes per tick
        nodes.forEach(clamp);
      }

      // Final guarantee: keep separating until no overlaps remain
      for (let pass = 0; pass < 300; pass++) separate();

      return nodes;
    }

    async function drawCountriesPie(canvasEl, legendEl) {
      const counts = {};
      for (const b of books) {
        if (b.country) counts[b.country] = (counts[b.country] || 0) + 1;
      }
      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return false;

      const total = entries.reduce((s, [, c]) => s + c, 0);
      const items = entries.map(([name, value]) => ({ name, value }));
      const flagImages = await loadFlagImages(items.map(i => i.name));

      const dpr     = window.devicePixelRatio || 1;
      const parentW = canvasEl.parentElement.clientWidth;
      const W = parentW;
      const H = Math.min(Math.round(W * 1.1), 520);

      const nodes = layoutBubbles(items, W, H);

      canvasEl.width  = W * dpr; canvasEl.height = H * dpr;
      canvasEl.style.width  = W + 'px';
      canvasEl.style.height = H + 'px';
      canvasEl.style.display = 'block';
      canvasEl.style.margin  = '0';
      legendEl.style.display = 'none';

      const ctx = canvasEl.getContext('2d');
      ctx.scale(dpr, dpr);

      const accent = cssVar('--accent');

      function render(sel = -1) {
        ctx.clearRect(0, 0, W, H);
        nodes.forEach((n, ni) => {
          const { name, value, x, y, r } = n;

          const flagImg = flagImages.get(name);
          if (flagImg) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
            ctx.filter = 'brightness(1.08)';
            ctx.drawImage(flagImg, x - r, y - r, r * 2, r * 2);
            ctx.filter = 'none';
            // 3D bubble shading
            ctx.save();
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
            const sGrad = ctx.createRadialGradient(x, y + r * 0.4, 0, x, y, r);
            sGrad.addColorStop(0.4, 'rgba(0,0,0,0)');
            sGrad.addColorStop(1,   'rgba(0,0,0,0.09)');
            ctx.fillStyle = sGrad;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
            const hGrad = ctx.createRadialGradient(x + r * 0.55, y - r * 0.55, 0, x + r * 0.3, y - r * 0.3, r * 1.05);
            hGrad.addColorStop(0,    'rgba(255,255,255,0.18)');
            hGrad.addColorStop(0.3,  'rgba(255,255,255,0.04)');
            hGrad.addColorStop(1,    'rgba(255,255,255,0)');
            ctx.fillStyle = hGrad;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
            ctx.restore();
          } else {
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = PIE_COLOR_OTHER;
            ctx.fill();
            ctx.restore();
          }


          ctx.save();
          ctx.shadowColor = 'rgba(0,0,0,0.35)';
          ctx.shadowBlur = 8;
          ctx.shadowOffsetY = 3;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.strokeStyle = ni === sel ? accent : 'rgba(0,0,0,0.15)';
          ctx.globalAlpha = ni === sel ? 0.55 : 1;
          ctx.lineWidth = ni === sel ? 2 : 1;
          ctx.stroke();
          ctx.restore();


          if (r >= 20) {
            const pct = Math.round(value / total * 100);
            const fs = Math.max(10, Math.min(15, r * 0.28));
            ctx.save();
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.clip();
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `700 ${fs}px -apple-system, sans-serif`;
            ctx.lineJoin = 'round';
            ctx.lineWidth = fs * 0.22;
            ctx.strokeStyle = 'rgba(0,0,0,0.55)';
            ctx.strokeText(`${pct}%`, x, y + 1);
            ctx.fillStyle = '#fff';
            ctx.fillText(`${pct}%`, x, y + 1);
            ctx.restore();
          }
        });

      }

      render();

      const selOverlay = document.getElementById('bubble-sel');
      function updateSelectionOverlay(idx = selected) {
        if (idx < 0) { selOverlay.style.display = 'none'; return; }
        const n = nodes[idx];
        const scaleX = canvasEl.offsetWidth / W;
        const scaleY = canvasEl.offsetHeight / H;
        selOverlay.style.display = '';
        selOverlay.style.left   = (n.x - n.r) * scaleX + 'px';
        selOverlay.style.top    = (n.y - n.r) * scaleY + 'px';
        selOverlay.style.width  = n.r * 2 * scaleX + 'px';
        selOverlay.style.height = n.r * 2 * scaleY + 'px';
      }

      const labelEl  = document.getElementById('chart-countries-label');
      const labelName = document.getElementById('chart-countries-label-name');
      const labelPct  = document.getElementById('chart-countries-label-pct');

      labelEl.style.cursor = 'pointer';
      labelEl.addEventListener('click', () => {
        if (selected < 0) return;
        const country = encodeURIComponent(nodes[selected].name.toLowerCase());
        const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
        location.href = `../library/?country=${country}${u}`;
      });

      let selected = -1;

      function showLabel(idx) {
        const display = idx >= 0 ? idx : selected;
        if (display < 0) {
          labelEl.style.visibility = 'hidden';
        } else {
          const n = nodes[display];
          labelName.textContent = n.name;
          labelPct.textContent  = `${n.value} book${n.value === 1 ? '' : 's'}`;
          labelEl.style.visibility = 'visible';
        }
      }

      let hovered = -1;
      function hitTest(cx, cy) {
        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i], dx = cx - n.x, dy = cy - n.y;
          if (dx * dx + dy * dy <= n.r * n.r) return i;
        }
        return -1;
      }
      function canvasCoords(clientX, clientY) {
        const rect = canvasEl.getBoundingClientRect();
        return [(clientX - rect.left) * (W / rect.width), (clientY - rect.top) * (H / rect.height)];
      }
      canvasEl.addEventListener('mousemove', e => {
        const [cx, cy] = canvasCoords(e.clientX, e.clientY);
        const hit = hitTest(cx, cy);
        canvasEl.style.cursor = hit >= 0 ? 'pointer' : '';
        if (hit !== hovered) { hovered = hit; showLabel(hovered); updateSelectionOverlay(hovered); }
      });
      canvasEl.addEventListener('mouseleave', () => {
        hovered = -1; showLabel(-1); canvasEl.style.cursor = '';
        updateSelectionOverlay(-1);
      });
      canvasEl.addEventListener('click', e => {
        const [cx, cy] = canvasCoords(e.clientX, e.clientY);
        const hit = hitTest(cx, cy);
        if (hit >= 0 && hit === selected) {
          const country = encodeURIComponent(nodes[hit].name.toLowerCase());
          const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
          location.href = `../library/?country=${country}${u}`;
        } else {
          selected = hit;
          render(selected);
          showLabel(hovered);
        }
      });
      canvasEl.addEventListener('touchstart', e => {
        const t = e.touches[0];
        const [cx, cy] = canvasCoords(t.clientX, t.clientY);
        const hit = hitTest(cx, cy);
        if (hit >= 0 && hit === selected) {
          const country = encodeURIComponent(nodes[hit].name.toLowerCase());
          const u = targetParam ? `&u=${encodeURIComponent(targetProfile.username)}` : '';
          location.href = `../library/?country=${country}${u}`;
        } else {
          selected = hit;
          render(selected);
          showLabel(hit);
        }
        if (hit >= 0) e.preventDefault();
      }, { passive: false });
      canvasEl.addEventListener('touchend', () => {
        hovered = -1;
        updateSelectionOverlay(-1);
        showLabel(-1);
      });

      return true;
    }

    async function drawCharts() {
      const finished = books.filter(b => b.rating != null);

      const ptsPages = finished
        .filter(b => b.totalPages > 0)
        .map(b => ({ x: b.totalPages, y: b.rating }));

      const ptsAge = finished
        .filter(b => b.releaseYear > 0)
        .map(b => ({ x: b.releaseYear, y: b.rating }));

      const countriesCanvas = document.getElementById('chart-countries');
      const countriesLegend = document.getElementById('chart-countries-legend');
      if (await drawCountriesPie(countriesCanvas, countriesLegend)) {
        document.getElementById('chart-countries-empty').style.display = 'none';
      } else {
        countriesCanvas.style.display = 'none';
        document.getElementById('chart-countries-empty').style.display = '';
      }

      const pagesCanvas = document.getElementById('chart-pages');
      const ageCanvas   = document.getElementById('chart-age');

      if (ptsPages.length >= 2) {
        drawScatter(pagesCanvas, ptsPages, { xLabel: 'Pages', yMin: 0, yMax: 5 });
      } else {
        pagesCanvas.style.display = 'none';
        document.getElementById('chart-pages-empty').style.display = '';
      }

      if (ptsAge.length >= 2) {
        drawScatter(ageCanvas, ptsAge, { xLabel: 'Publication year', yMin: 0, yMax: 5 });
      } else {
        ageCanvas.style.display = 'none';
        document.getElementById('chart-age-empty').style.display = '';
      }
    }

    // Redraw on theme change or resize, but only once the tab has been opened
    new MutationObserver(() => { if (chartsDrawn) drawCharts(); })
      .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    window.addEventListener('resize', () => { if (chartsDrawn) drawCharts(); });

    } // end if (targetProfile)
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
