  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Paperbackd</title>
  <link rel="stylesheet" href="css/main.css">
  <script>
    (function(){ const t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme',t); })();
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="./">Paperbackd</a>
      <nav class="desktop-nav">
        <a href="./"        data-nav="home">Feed</a>
        <a href="search/"   data-nav="search">Search</a>
        <a href="library/"  data-nav="library">Library</a>
        <a href="profile/"  data-nav="profile">Profile</a>
        <a href="settings/" data-nav="settings">Settings</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <main class="page-content">


  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="./" data-nav="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>

      Feed
    </a>
    <a class="mobile-nav-item" href="search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>

      </svg>
      Search

    <a class="mobile-nav-item" href="library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      Library
    </a>
    <a class="mobile-nav-item" href="profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Profile
    </a>
    <a class="mobile-nav-item" href="settings/" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
      Settings

  <script src="js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from './js/auth.js';
    import { getFollowing, getFeed, getProfile, getBookByGbid, removeActivityEvent } from './js/firebase.js';

    const { user } = await requireAuth();
    const main = document.querySelector('main.page-content');

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(ts) {
      if (!ts?.seconds) return '';
      const diff  = Date.now() - ts.seconds * 1000;
      const mins  = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days  = Math.floor(diff / 86400000);
      if (mins < 1)   return 'just now';
      if (mins < 60)  return `${mins}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7)   return `${days}d ago`;
      return new Date(ts.seconds * 1000)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function dayLabel(ts) {
      if (!ts?.seconds) return null;
      const d   = new Date(ts.seconds * 1000);
      const now = new Date();
      const today    = new Date(now.getFullYear(),  now.getMonth(),  now.getDate());
      const eventDay = new Date(d.getFullYear(),    d.getMonth(),    d.getDate());
      const diffDays = Math.round((today - eventDay) / 86400000);
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      const opts = d.getFullYear() === now.getFullYear()
        ? { day: 'numeric', month: 'long' }
        : { day: 'numeric', month: 'long', year: 'numeric' };
      return d.toLocaleDateString('en-GB', opts);
    }

    let avatarMap = {};
    let borderColorMap = {};
    let usernameMap = {};

    function showReviewModal(reviewText, bookTitle, username, rating) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;box-sizing:border-box';
      const modal = document.createElement('div');
      modal.style.cssText = 'background:var(--bg-card);border-radius:var(--radius);padding:1.25rem 1.25rem 1.25rem 1.25rem;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.3)';
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '×';
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.4rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:0';
      closeBtn.addEventListener('click', () => overlay.remove());
      const title = document.createElement('div');
      title.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:.15rem;padding-right:1.5rem';
      title.textContent = bookTitle;
      const byline = document.createElement('div');
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.75rem';
      byline.style.cssText = 'font-size:.78rem;color:var(--text-muted);margin-bottom:.5rem';
      byline.textContent = `${username}'s review`;
      const starsRow = document.createElement('div');
      starsRow.style.cssText = 'margin-bottom:.75rem';
      starsRow.innerHTML = rating ? renderStars(rating) : '';
      const body = document.createElement('div');
      body.style.cssText = 'font-size:.9rem;line-height:1.6;white-space:pre-wrap';
      body.textContent = reviewText;
      modal.append(closeBtn, title, byline, starsRow, body);
      overlay.appendChild(modal);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
    }

    function renderEvent(event) {
      const card   = document.createElement('div');
      card.className = 'card';
      const username   = usernameMap[event.uid] || event.username;
      const initial    = (username?.[0] || '?').toUpperCase();
      const avatarUrl  = avatarMap[event.uid];
      const avatarContent = avatarUrl
        ? `<img src="${esc(avatarUrl)}" alt="">`
        : esc(initial);
      const borderColor = borderColorMap[event.uid];
      const borderStyle = borderColor ? `border-color:${borderColor};` : '';
      const bookLink = event.gbid
        ? `<a href="book/?gbid=${esc(event.gbid)}" style="font-style:italic;color:inherit;text-decoration:none">${esc(event.bookTitle)}</a>`
        : `<em>${esc(event.bookTitle)}</em>`;
      const action  = event.type === 'started'
        ? `started reading ${bookLink}`
        : `finished ${bookLink}`;
      const author  = event.bookAuthor
        ? `<span style="color:var(--text-muted)"> by ${esc(event.bookAuthor)}</span>`
        : '';
      const reviewBtn = event.hasReview && event.gbid
        ? `<button class="review-btn" style="font-size:.75rem;color:var(--accent);background:none;border:none;padding:0;cursor:pointer;font-family:inherit">Read review</button>`
        : '';
      const ratingRow = (event.type === 'finished' && event.rating != null)
        ? `<div style="margin-top:.2rem;display:flex;align-items:center;gap:.5rem">${renderStars(event.rating)}${reviewBtn}</div>`
        : '';
      const coverThumb = event.coverUrl && event.gbid
        ? `<a href="book/?gbid=${esc(event.gbid)}" style="position:absolute;bottom:-4px;right:-7px;z-index:1;display:block"><img src="${esc(event.coverUrl)}" alt="" style="width:22px;border-radius:2px;display:block;box-shadow:0 1px 4px rgba(0,0,0,.4)"></a>`
        : '';
      card.innerHTML = `<div class="friend-item">
        <div style="position:relative;flex-shrink:0;width:36px;height:36px">
          <a class="friend-avatar" href="profile/?u=${esc(username)}" style="text-decoration:none;color:inherit;${borderStyle}">${avatarContent}</a>
          ${coverThumb}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.9rem;line-height:1.4"><a href="profile/?u=${esc(username)}" style="font-weight:600;color:inherit;text-decoration:none">${esc(username)}</a> ${action}${author}</div>
          ${ratingRow}
          <div class="book-finished-meta">${timeAgo(event.timestamp)}</div>
        </div>
      </div>`;
      const btn = card.querySelector('.review-btn');
      if (btn) {
        btn.addEventListener('click', async () => {
          btn.textContent = 'Loading…';
          btn.disabled = true;
          try {
            const book = await getBookByGbid(event.uid, event.gbid);
            if (book?.review) showReviewModal(book.review, event.bookTitle, username, event.rating);
          } finally {
            btn.textContent = 'Read review';
            btn.disabled = false;
          }
        });
      }

      if (event.uid === user.uid) {
        const dateField = event.type === 'started' ? 'addedAt' : 'finishedAt';
        const dateLabel = event.type === 'started' ? 'start date' : 'finished date';
        const dateStr   = event.timestamp?.seconds
          ? new Date(event.timestamp.seconds * 1000).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
          : 'unknown date';

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.textContent = '×';
        removeBtn.style.cssText = 'position:absolute;top:.35rem;right:.5rem;background:none;border:none;font-size:1.1rem;line-height:1;cursor:pointer;color:var(--text-muted);padding:.1rem .3rem;opacity:.55';
        removeBtn.title = 'Remove from feed';
        removeBtn.addEventListener('click', async () => {
          if (!confirm(`Remove this event from your feed?\n\nThis will also clear the ${dateLabel} (${dateStr}) from "${event.bookTitle}" in your library.`)) return;
          removeBtn.disabled = true;
          try {
            await removeActivityEvent(user.uid, event.id, event.gbid, dateField);
            card.remove();
          } catch (e) {
            console.error(e);
            removeBtn.disabled = false;
          }
        });
        card.style.position = 'relative';
        card.appendChild(removeBtn);
      }

      return card;
    }

    try {
      const [following, myProfile] = await Promise.all([getFollowing(user.uid), getProfile(user.uid)]);
      const followingUids = following.map(f => f.uid);
      const mutedUids     = myProfile?.muted || [];
      avatarMap[user.uid]      = myProfile?.avatarUrl || null;
      borderColorMap[user.uid] = myProfile?.avatarBorderColor || null;
      usernameMap[user.uid]    = myProfile?.username || null;
      following.forEach(f => {
        avatarMap[f.uid]      = f.avatarUrl || null;
        borderColorMap[f.uid] = f.avatarBorderColor || null;
        usernameMap[f.uid]    = f.username || null;
      });
      const feed          = (await getFeed(user.uid, followingUids))
        .filter(e => e.uid === user.uid || !mutedUids.includes(e.uid));

      // Backfill coverUrl for old entries that predate storing it in activity
      const coverless = feed.filter(e => !e.coverUrl && e.gbid);
      if (coverless.length) {
        await Promise.all(coverless.map(async e => {
          const book = await getBookByGbid(e.uid, e.gbid);
          if (book?.coverUrl) e.coverUrl = book.coverUrl;
        }));
      }

      if (feed.length === 0) {
        const p = document.createElement('p');
        p.style.cssText = 'color:var(--text-muted);font-size:.9rem;margin-top:.25rem';
        p.textContent   = followingUids.length === 0
          ? 'Follow some readers to see their activity here.'
          : 'No activity yet.';
        main.appendChild(p);
      } else {
        let lastDay = null;
        feed.forEach(e => {
          const label = dayLabel(e.timestamp);
          if (label !== lastDay) {
            lastDay = label;
            const div = document.createElement('div');
            div.className = 'feed-day-divider';
            div.textContent = label || '';
            main.appendChild(div);
          }
          main.appendChild(renderEvent(e));
        });
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }
  </script>
</body>
</html>
