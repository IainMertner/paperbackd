  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getBooks, addBook, addFinishedBook, updateBookProgress, finishBook, deleteBook, dnfBook, unfinishBook, updateBookRating, updateBookDates, clearBookDate, updateBookCover, updateShelf, getProfileByUsername, updateBookMeta, updateBookReads, getLists, syncBookActivity, getAuthorCountryOverrides } from '../js/firebase.js';
    import { deleteField } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';

    let viewMode = localStorage.getItem('library-view') || 'grid';

    function makeBookListRow(book) {
      const el = document.createElement('div');
      el.className = 'books-list-row';
      el.dataset.title    = (book.title    || '').toLowerCase();
      el.dataset.author   = (book.author   || '').toLowerCase();
      el.dataset.language = (book.language || '').toLowerCase();
      el.dataset.format   = (book.format   || '').toLowerCase();
      el.dataset.country  = (book.country  || '').toLowerCase();
      el.dataset.lists    = book._listIds || '';
      el.dataset.gbid     = book.gbid || '';
      const author = book.author ? `<span style="color:var(--text-muted);font-weight:400"> · ${esc(book.author)}</span>` : '';
      let rightHtml = '';
      const listRating = getDisplayRating(book);
      if (listRating) {
        let s = '';
        for (let i = 1; i <= 5; i++) {
          if (listRating >= i)          s += '<span class="star-char full">★</span>';
          else if (listRating >= i-0.5) s += '<span class="star-char half">★</span>';
          else                          s += '<span class="star-char">★</span>';
        }
        rightHtml = `<span style="flex-shrink:0;margin-left:.5rem;display:inline-flex;gap:.05rem;line-height:1">${s}</span>`;
      } else if (book.status === 'reading' && book.totalPages) {
        const pct = Math.round((book.currentPage / book.totalPages) * 100);
        rightHtml = `<span style="flex-shrink:0;margin-left:.5rem;font-size:.75rem;color:var(--text-muted)">${pct}%</span>`;
      }
      el.innerHTML = `<div style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.875rem;font-weight:600">${esc(book.title)}${author}</div>${rightHtml}`;
      return el;
    }

    async function hcPost(query, variables) {
      const r = await fetch(HARDCOVER_PROXY, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, variables })
      });
      if (!r.ok) throw new Error(`Proxy error ${r.status}`);
      return r.json();
    }

    function cleanTitle(t)  { return (t || '').replace(/\s*\([^)]*#\s*\d+[^)]*\)/g, '').trim(); }
    function cleanAuthor(a) { return (a || '').replace(/^([^,]+),\s*(.+)$/, '$2 $1').trim(); }

    async function searchHardcover(q) {
      const data = await hcPost(`query($q:String!){search(query:$q,query_type:"Book",per_page:3){results}}`, { q });
      const doc = data?.data?.search?.results?.hits?.[0]?.document;
      return doc?.slug ? doc : null;
    }

    // Loaded once; used by repairBook and the background country fetch on book-add
    let _authorOverridesCache = null;
    async function getOverrides() {
      if (!_authorOverridesCache) _authorOverridesCache = await getAuthorCountryOverrides();
      return _authorOverridesCache;
    }

    async function repairBook(book) {
      const updates = {};

      // Phase 1: match unmatched book via Hardcover title search
      if (!book.gbid && !book.coverUrl?.startsWith('data:')) {
        try {
          const title  = cleanTitle(book.title);
          const author = cleanAuthor(book.author || '');
          let doc = await searchHardcover(`${title} ${author}`.trim());
          if (!doc && author) doc = await searchHardcover(title);
          if (doc?.slug) {
            if (!book.gbid)      updates.gbid        = doc.slug;
            if (!book.coverUrl)  updates.coverUrl    = doc.image?.url || '';
            if (!book.totalPages && doc.pages) updates.totalPages = doc.pages;
            if (book.releaseYear == null && doc.release_year) updates.releaseYear = doc.release_year;
          }
        } catch (e) { console.warn('Repair: title search failed', e); }
      }

      // Phase 2: fill gaps for already-matched book via slug query
      const gbid = updates.gbid || book.gbid;
      if (gbid && !/^\d+$/.test(gbid) && (book.releaseYear == null || !book.totalPages || !book.author)) {
        try {
          const data = await hcPost(
            `query($slug:String!){books(where:{slug:{_eq:$slug}},limit:1){slug pages release_year contributions{author{name}}}}`,
            { slug: gbid }
          );
          const hc = data?.data?.books?.[0];
          if (hc) {
            if (book.releaseYear == null && hc.release_year) updates.releaseYear = hc.release_year;
            if (!book.totalPages  && hc.pages)               updates.totalPages  = hc.pages;
            if (!book.author) {
              const name = hc.contributions?.[0]?.author?.name;
              if (name) updates.author = name;
            }
          }
        } catch (e) { console.warn('Repair: slug query failed', e); }
      }

      // Phase 2.5: re-normalize stored country
      const storedCountry = book.country;
      if (storedCountry && normalizeCountry(storedCountry) !== storedCountry) {
        updates.country = normalizeCountry(storedCountry);
      }

      // Phase 3: country lookup — overrides first, then Wikidata
      const authorForCountry = updates.author || book.author;
      if (!book.country && !updates.country && authorForCountry) {
        const overrides = await getOverrides();
        const overrideKey = authorForCountry.toLowerCase().trim();
        if (overrides[overrideKey]) {
          updates.country = overrides[overrideKey];
        } else {
          try {
            const base = 'https://www.wikidata.org/w/api.php';
            const sr = await fetch(`${base}?action=wbsearchentities&search=${encodeURIComponent(authorForCountry)}&language=en&type=item&format=json&origin=*&limit=1`);
            if (sr.ok) {
              const sd = await sr.json();
              const qid = sd.search?.[0]?.id;
              if (qid) {
                const er = await fetch(`${base}?action=wbgetentities&ids=${qid}&props=claims&format=json&origin=*`);
                if (er.ok) {
                  const ed = await er.json();
                  const p27 = ed.entities?.[qid]?.claims?.P27 || [];
                  const bestP27 = p27.find(c => c.rank === 'preferred') || p27.find(c => c.rank === 'normal') || p27[0];
                  const countryQid = bestP27?.mainsnak?.datavalue?.value?.id;
                  if (countryQid) {
                    const lr = await fetch(`${base}?action=wbgetentities&ids=${countryQid}&props=labels&languages=en&format=json&origin=*`);
                    if (lr.ok) {
                      const ld = await lr.json();
                      const countryName = ld.entities?.[countryQid]?.labels?.en?.value;
                      if (countryName) updates.country = normalizeCountry(countryName);
                    }
                  }
                }
              }
            }
          } catch (e) { /* silently ignore */ }
        }
      }

      return updates;
    }

    const { user, profile } = await requireAuth();

    const params   = new URLSearchParams(location.search);
    const viewUser = params.get('u')?.toLowerCase();
    const isOwn    = !viewUser;
    if (isOwn) document.getElementById('page-title').innerHTML = `<a href="../profile/" style="color:var(--accent);text-decoration:none">${esc(profile.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>library<span class="title-dot">.</span>`;

    const readingList  = document.getElementById('reading-list');
    const finishedList = document.getElementById('finished-list');

    function toAuthorSlug(name) {
      return (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showEmpty(container, id, msg) {
      const p = document.createElement('p');
      p.id = id;
      p.style.cssText = 'color:var(--text-muted);font-size:.875rem;margin-bottom:.625rem';
      p.textContent = msg;
      container.appendChild(p);
    }

    function renderStars(rating) {
      if (!rating) return '';
      let html = '<span class="stars-display">';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          html += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) html += '<span class="star-char half">★</span>';
        else                      html += '<span class="star-char">★</span>';
      }
      return html + '</span>';
    }

    function createStarPicker(initial) {
      const wrap = document.createElement('div');
      wrap.className = 'star-picker';
      let value = initial || 0;
      const btns = [];

      for (let i = 1; i <= 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-pick-btn';
        btn.textContent = '★';
        btn.dataset.i = i;
        btns.push(btn);
        wrap.appendChild(btn);
      }

      function update(v) {
        value = v;
        btns.forEach((b, idx) => {
          const n = idx + 1;
          b.classList.remove('full', 'half');
          if (value >= n)          b.classList.add('full');
          else if (value >= n-0.5) b.classList.add('half');
        });
      }

      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.star-pick-btn');
        if (!btn) return;
        const i    = parseInt(btn.dataset.i);
        const half = e.offsetX < btn.offsetWidth / 2;
        const v    = half ? i - 0.5 : i;
        update(v === value ? 0 : v);
      });

      wrap.getValue = () => value || null;
      wrap.setValue = v => update(v || 0);
      update(value);
      return wrap;
    }

    const TRASH_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;

    function cellRatingHtml(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        if (rating >= i)          stars += '<span class="star-char full">★</span>';
        else if (rating >= i-0.5) stars += '<span class="star-char half">★</span>';
        else                      stars += '<span class="star-char">★</span>';
      }
      const num = Number.isInteger(rating) ? String(rating) : rating.toFixed(1);
      return `<span class="rating-stars-full">${stars}</span><span class="rating-stars-compact">★ ${num}</span>`;
    }

    function bookCoverHtml(book) {
      const inner = book.coverUrl
        ? `<img class="book-cover book-cover-img" src="${esc(book.coverUrl)}" alt="">`
        : `<div class="book-cover">📖</div>`;
      return `<div class="book-cover-wrap">${inner}</div>`;
    }

    function coverInnerHtml(book) {
      return book.coverUrl
        ? `<img class="book-cover book-cover-img" src="${esc(book.coverUrl)}" alt="">`
        : `<div class="book-cover">📖</div>`;
    }

    function makeBookCoverCell(book) {
      const cell = document.createElement('div');
      cell.className = 'library-cover-cell';
      cell.dataset.id       = book.id;
      cell.dataset.title    = (book.title    || '').toLowerCase();
      cell.dataset.author   = (book.author   || '').toLowerCase();
      cell.dataset.language = (book.language || '').toLowerCase();
      cell.dataset.format   = (book.format   || '').toLowerCase();
      cell.dataset.country  = (book.country  || '').toLowerCase();
      cell.dataset.lists    = book._listIds || '';
      cell.dataset.gbid     = book.gbid || '';
      if (book.coverUrl) {
        const img = document.createElement('img');
        img.src = book.coverUrl; img.alt = '';
        cell.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'library-cover-placeholder';
        ph.textContent = '📖';
        cell.appendChild(ph);
      }
      if (book.status === 'reading' && book.totalPages) {
        const pct = Math.round((book.currentPage / book.totalPages) * 100);
        const strip = document.createElement('div');
        strip.className = 'library-progress-strip';
        const fill = document.createElement('div');
        fill.className = 'library-progress-fill';
        fill.style.width = pct + '%';
        strip.appendChild(fill);
        cell.appendChild(strip);
        const pctEl = document.createElement('div');
        pctEl.className = 'library-progress-pct';
        pctEl.textContent = pct + '%';
        cell.appendChild(pctEl);
      }
      const info = document.createElement('div');
      info.className = 'library-cover-info';
      const coverRating = getDisplayRating(book);
      if (coverRating) {
        const badge = document.createElement('div');
        badge.className = 'library-cover-rating';
        badge.innerHTML = cellRatingHtml(coverRating);
        info.appendChild(badge);
      }
      const titleEl = document.createElement('div');
      titleEl.className = 'library-cover-title';
      titleEl.textContent = book.title;
      info.appendChild(titleEl);
      cell.appendChild(info);
      return cell;
    }

    function createBookModal(cardEl) {
      const overlay = document.createElement('div');
      overlay.className = 'book-modal-overlay';
      const inner = document.createElement('div');
      inner.className = 'book-modal-inner';

      inner.appendChild(cardEl);
      overlay.appendChild(inner);

      const nativeRemove = overlay.remove.bind(overlay);
      function dismiss() {
        nativeRemove();
      }
      overlay.remove = dismiss;

      const closeBtn = document.createElement('button');
      closeBtn.innerHTML = '&times;';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.style.cssText = 'position:absolute;top:.6rem;right:.75rem;background:none;border:none;font-size:1.25rem;line-height:1;color:var(--text-muted);cursor:pointer;padding:.1rem;transition:color .15s;z-index:1';
      closeBtn.addEventListener('mouseenter', () => closeBtn.style.color = 'var(--text)');
      closeBtn.addEventListener('mouseleave', () => closeBtn.style.color = 'var(--text-muted)');
      closeBtn.addEventListener('click', dismiss);
      cardEl.style.position = 'relative';
      cardEl.appendChild(closeBtn);
      overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
      document.addEventListener('keydown', function onEsc(e) {
        if (e.key === 'Escape') { dismiss(); document.removeEventListener('keydown', onEsc); }
      });
      document.body.appendChild(overlay);
      return overlay;
    }

    function attachReadingCell(cell, book) {
      cell.addEventListener('click', () => {
        let overlay;
        const card = renderReading(book, cell, () => overlay?.remove());
        overlay = createBookModal(card);
        card.querySelector('.page-input:not(.page-total)')?.select();
      });
    }

    function attachFinishedCell(cell, book) {
      cell.addEventListener('click', () => {
        let overlay;
        const card = renderFinished(book, cell, () => overlay?.remove());
        overlay = createBookModal(card);
      });
    }


    async function openCoverPicker(book, wrapEl, coverCell) {
      const overlay = document.createElement('div');
      overlay.className = 'cover-picker-overlay';
      const modal = document.createElement('div');
      modal.className = 'cover-picker-modal';
      modal.innerHTML = `<div style="font-weight:600;margin-bottom:.2rem">${esc(book.title)}</div>
        <div style="font-size:.82rem;color:var(--text-muted);margin-bottom:.875rem">Choose an edition cover</div>
        <div class="cover-picker-grid" id="cpg"><span style="font-size:.85rem;color:var(--text-muted)">Loading…</span></div>`;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

      const grid = modal.querySelector('#cpg');

      function bestCoverUrl(url) {
        if (!url) return url;
        // OpenLibrary: upgrade S or M thumbnails to L
        url = url.replace(/-(S|M)\.jpg(\?|$)/, '-L.jpg$2');
        return url;
      }

      try {
        let editions = [];

        // search by title to get multiple book IDs (catches different publisher entries)
        const searchData = await hcPost(
          `query($q:String!){search(query:$q,query_type:"Book",per_page:8){results}}`,
          { q: book.title }
        );
        const hits = searchData?.data?.search?.results?.hits || [];
        const bookIds = [...new Set(hits.map(h => h.document?.id).filter(Boolean).map(id => parseInt(id, 10)).filter(n => !isNaN(n)))];

        // If the stored gbid is a slug (not numeric), resolve it to an ID too
        const slug = /^\d+$/.test(book.gbid) ? '' : (book.gbid || '');
        if (slug) {
          const d = await hcPost(
            `query($s:String!){books(where:{slug:{_eq:$s}},limit:1){id}}`,
            { s: slug }
          );
          const id = d?.data?.books?.[0]?.id;
          if (id && !bookIds.includes(id)) bookIds.push(id);
        }

        if (bookIds.length) {
          const d = await hcPost(
            `query($ids:[Int!]!){editions(where:{book_id:{_in:$ids}},limit:100){id image{url width height} publisher{name} release_year}}`,
            { ids: bookIds }
          );
          const seen = new Set();
          editions = (d?.data?.editions || []).filter(e => {
            if (!e.image?.url) return false;
            // Filter out low-res covers (width known and too small for a shelf)
            if (e.image.width && e.image.width < 180) return false;
            const url = bestCoverUrl(e.image.url);
            if (seen.has(url)) return false;
            seen.add(url);
            e.image.url = url;
            return true;
          });
        }

        grid.innerHTML = '';

        const currentUrl = book.coverUrl || null;
        const filteredEditions = editions.filter(e => e.image.url !== currentUrl);

        async function pickCover(url) {
          if (url === book.coverUrl) { overlay.remove(); return; }
          book.coverUrl = url;
          wrapEl.innerHTML = coverInnerHtml(book);
          const newCoverImg = wrapEl.querySelector('.book-cover, .book-cover-img');
          if (newCoverImg) { newCoverImg.style.width = '72px'; newCoverImg.style.height = '108px'; }
          if (coverCell && !coverCell.classList.contains('books-list-row')) {
            const existImg = coverCell.querySelector('img:not(.book-cover-img)');
            const existPh  = coverCell.querySelector('.library-cover-placeholder');
            if (existImg) { existImg.src = url; }
            else {
              const img = document.createElement('img');
              img.src = url; img.alt = '';
              existPh ? existPh.replaceWith(img) : coverCell.prepend(img);
            }
          }
          overlay.remove();
          updateBookCover(user.uid, book.id, url, { gbid: book.gbid, title: book.title });
          if (profile.shelf?.some(s => s.gbid === book.gbid && book.gbid)) {
            const updatedShelf = profile.shelf.map(s =>
              s.gbid === book.gbid ? { ...s, coverUrl: url } : s
            );
            await updateShelf(user.uid, updatedShelf);
            profile.shelf = updatedShelf;
            const cached = JSON.parse(localStorage.getItem('rl_profile') || '{}');
            if (cached.shelf) { cached.shelf = updatedShelf; localStorage.setItem('rl_profile', JSON.stringify(cached)); }
          }
        }

        // Current cover first (selected state)
        if (currentUrl) {
          const item = document.createElement('div');
          item.className = 'cover-picker-item selected';
          item.title = 'Current cover';
          item.innerHTML = `<img src="${esc(currentUrl)}" alt="" loading="lazy">`;
          item.addEventListener('click', () => overlay.remove());
          grid.appendChild(item);
        }

        // Upload custom cover
        const uploadInput = document.createElement('input');
        uploadInput.type = 'file';
        uploadInput.accept = 'image/*';
        uploadInput.style.display = 'none';
        modal.appendChild(uploadInput);

        const uploadItem = document.createElement('div');
        uploadItem.className = 'cover-picker-item cover-picker-upload';
        uploadItem.title = 'Upload custom cover';
        uploadItem.innerHTML = `<div class="cover-picker-upload-inner">+</div>`;
        uploadItem.addEventListener('click', () => uploadInput.click());
        uploadInput.addEventListener('change', async () => {
          const file = uploadInput.files[0];
          if (!file) return;
          uploadInput.value = '';
          uploadItem.style.opacity = '0.5';
          try {
            const dataUrl = await new Promise((resolve, reject) => {
              const img = new Image();
              const objectUrl = URL.createObjectURL(file);
              img.onload = () => {
                URL.revokeObjectURL(objectUrl);
                const MAX_W = 400, MAX_H = 600;
                const scale = Math.min(MAX_W / img.width, MAX_H / img.height, 1);
                const w = Math.round(img.width * scale);
                const h = Math.round(img.height * scale);
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
              };
              img.onerror = reject;
              img.src = objectUrl;
            });
            await pickCover(dataUrl);
          } catch (e) {
            console.error(e);
            uploadItem.style.opacity = '';
            alert('Could not load that image.');
          }
        });
        grid.appendChild(uploadItem);

        if (!filteredEditions.length) {
          const msg = document.createElement('div');
          msg.style.cssText = 'font-size:.85rem;color:var(--text-muted);width:100%;padding-top:.25rem';
          msg.textContent = currentUrl ? 'No other edition covers found.' : 'No edition covers found.';
          grid.appendChild(msg);
        }

        filteredEditions.forEach(ed => {
          const url = ed.image.url;
          const item = document.createElement('div');
          item.className = 'cover-picker-item';
          if (ed.publisher?.name || ed.release_year) item.title = [ed.publisher?.name, ed.release_year].filter(Boolean).join(' · ');
          item.innerHTML = `<img src="${esc(url)}" alt="" loading="lazy">`;
          item.addEventListener('click', () => { item.style.opacity = '0.5'; pickCover(url); });
          grid.appendChild(item);
        });
      } catch (err) {
        console.error(err);
        grid.innerHTML = '<span style="font-size:.85rem;color:var(--text-muted)">Failed to load covers.</span>';
      }
    }

    function tsOf(book, field) {
      const ts = book[field];
      if (!ts) return 0;
      if (ts.seconds != null) return ts.seconds;
      if (ts.toDate) return ts.toDate().getTime() / 1000;
      return 0;
    }

    function formatDateTs(ts, precision) {
      if (!ts?.toDate || !precision) return 'Unknown';
      const d = ts.toDate();
      if (precision === 'year') return String(d.getFullYear());
      if (precision === 'day')  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      return d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    }

    function createPartialDatePicker(ts, precision) {
      const d = ts?.toDate?.() ?? null;
      const initYear  = d ? d.getFullYear() : null;
      const initMonth = (d && precision !== 'year') ? d.getMonth() + 1 : null;
      const initDay   = (d && precision !== 'year' && precision !== 'month') ? d.getDate() : null;

      const wrap = document.createElement('div');
      wrap.className = 'date-picker-partial';

      const daySel = document.createElement('select');
      daySel.className = 'date-day-select';
      daySel.innerHTML = '<option value="">Day</option>' +
        Array.from({length: 31}, (_, i) => i + 1)
          .map(n => `<option value="${n}"${initDay === n ? ' selected' : ''}>${n}</option>`)
          .join('');

      const monthSel = document.createElement('select');
      monthSel.className = 'date-month-select';
      monthSel.innerHTML = '<option value="">Month</option>' +
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
          .map((m, i) => `<option value="${i+1}"${initMonth === i+1 ? ' selected' : ''}>${m}</option>`)
          .join('');

      const currentYear = new Date().getFullYear();
      const yearSel = document.createElement('select');
      yearSel.className = 'date-year-select';
      let yearOpts = '<option value="">Year</option>';
      for (let y = currentYear + 1; y >= 1900; y--) {
        yearOpts += `<option value="${y}"${initYear === y ? ' selected' : ''}>${y}</option>`;
      }
      yearSel.innerHTML = yearOpts;

      wrap.append(daySel, monthSel, yearSel);

      wrap.getDate = () => {
        const year = parseInt(yearSel.value);
        if (!year) return { date: null, precision: null };
        const month = parseInt(monthSel.value) || 0;
        const day   = parseInt(daySel.value)  || 0;
        if (!month) return { date: new Date(year, 0, 1, 12, 0, 0), precision: 'year' };
        if (!day)   return { date: new Date(year, month - 1, 1, 12, 0, 0), precision: 'month' };
        return { date: new Date(year, month - 1, Math.min(day, 31), 12, 0, 0), precision: 'day' };
      };

      return wrap;
    }

    function makeDateEl(label, ts, field, book, withActivity = true) {
      const precision = book[field + 'Precision'] ?? null;
      const el = document.createElement('div');
      el.style.cssText = 'display:flex;align-items:center;gap:.4rem;margin-top:.35rem';
      if (label) {
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
        lbl.textContent = label;
        el.appendChild(lbl);
      }
      const val = document.createElement('span');
      val.className = 'book-date-editable';
      val.style.cssText = 'font-size:.8rem;color:var(--text)';
      val.textContent = (ts && precision) ? formatDateTs(ts, precision) : '—';

      const picker = createPartialDatePicker(ts, precision);
      picker.style.display = 'none';

      const clearDateBtn = document.createElement('button');
      clearDateBtn.type = 'button';
      clearDateBtn.textContent = 'Clear';
      clearDateBtn.style.cssText = 'font-size:.72rem;color:var(--text-muted);background:none;border:none;cursor:pointer;font-family:inherit;padding:0 .1rem;flex-shrink:0';
      clearDateBtn.addEventListener('mousedown', e => {
        e.preventDefault();
        picker.querySelectorAll('select').forEach(s => s.value = '');
        collapse();
      });
      picker.appendChild(clearDateBtn);

      el.append(val, picker);

      let collapsing = false;
      function collapse() {
        if (collapsing) return;
        collapsing = true;
        const { date, precision: newPrec } = picker.getDate();
        picker.style.display = 'none';
        val.style.display = '';
        if (!date) {
          val.textContent = '—';
          if (book[field]) {
            book[field] = null;
            book[field + 'Precision'] = null;
            clearBookDate(user.uid, book.id, field).catch(console.error);
            if (withActivity) {
              const type = field === 'addedAt' ? 'started' : 'finished';
              const bookInfo = { title: book.title, author: book.author, gbid: book.gbid,
                rating: book.rating, review: book.review, username: profile.username, bookId: book.id };
              syncBookActivity(user.uid, type, null, null, bookInfo).catch(console.error);
            }
          }
          return;
        }
        book[field] = { toDate: () => date };
        book[field + 'Precision'] = newPrec;
        val.textContent = formatDateTs(book[field], newPrec);
        const updates = { [field]: date, [field + 'Precision']: newPrec };
        const bookInfo = withActivity ? {
          title: book.title, author: book.author, gbid: book.gbid,
          rating: book.rating, review: book.review, username: profile.username, bookId: book.id
        } : null;
        updateBookDates(user.uid, book.id, updates, bookInfo).catch(console.error);
      }

      val.addEventListener('click', () => {
        collapsing = false;
        val.style.display = 'none';
        picker.style.display = '';
        picker.querySelector('select, input')?.focus();
        function onOutside(e) {
          if (picker.contains(e.target)) return;
          collapse();
          document.removeEventListener('mousedown', onOutside);
        }
        document.addEventListener('mousedown', onOutside);
      });

      picker.addEventListener('focusout', e => {
        if (picker.contains(e.relatedTarget)) return;
        collapse();
      });

      picker.addEventListener('keydown', e => {
        if (e.key === 'Escape') { e.stopPropagation(); picker.style.display = 'none'; val.style.display = ''; }
        if (e.key === 'Enter')  collapse();
      });

      return el;
    }

      async function doSaveBookMeta() {
        const updates = {};
        fieldDefs.forEach(({ key, type }) => {
          const raw = inputs[key].value.trim();
          const val = type === 'number' ? (parseInt(raw) || null) : (raw || null);
          if (val !== (book[key] ?? null)) updates[key] = val;
        });
        if (!Object.keys(updates).length) return;
        const siblings = book.gbid ? allBooks.filter(b => b.id !== book.id && b.gbid === book.gbid) : [];
        await Promise.all([
          updateBookMeta(user.uid, book.id, updates),
          ...siblings.map(sib => updateBookMeta(user.uid, sib.id, updates)),
        ]);
        [book, ...siblings].forEach(b => {
          Object.assign(b, updates);
          const el = readingList.querySelector(`[data-id="${b.id}"]`) || finishedList.querySelector(`[data-id="${b.id}"]`);
          if (el) {
            if (updates.title    != null) { el.dataset.title    = updates.title.toLowerCase(); }
            if ('author'   in updates)    { el.dataset.author   = (updates.author   || '').toLowerCase(); }
            if ('country'  in updates)    { el.dataset.country  = (updates.country  || '').toLowerCase(); }
            const titleEl  = el.querySelector('.book-title');
            const authorEl = el.querySelector('.book-author');
            if (titleEl  && updates.title  != null) titleEl.textContent  = updates.title;
            if (authorEl && 'author' in updates) { authorEl.textContent = updates.author || ''; if (authorEl.tagName === 'A') authorEl.href = `../author/?slug=${toAuthorSlug(updates.author || '')}`; }
          }
        });
        if (updates.title) {
          const titleEl = card.querySelector('.book-title');
          if (titleEl) titleEl.textContent = updates.title;
          if (coverCell) {
            coverCell.dataset.title = updates.title.toLowerCase();
            const cellTitle = coverCell.querySelector('.library-cover-title');
            if (cellTitle) cellTitle.textContent = updates.title;
          }
        }
        if (Object.prototype.hasOwnProperty.call(updates, 'author')) {
          const authorEl = card.querySelector('.book-author');
          if (authorEl) { authorEl.textContent = updates.author || ''; if (authorEl.tagName === 'A') authorEl.href = `../author/?slug=${toAuthorSlug(updates.author || '')}`; }
          if (coverCell) coverCell.dataset.author = (updates.author || '').toLowerCase();
        }
      }

      fieldDefs.forEach(({ key, type }) => {
        inputs[key].addEventListener(type === 'select' ? 'change' : 'blur', doSaveBookMeta);
      });

      card.appendChild(section);
      return section;
    }

          toast.style.cssText = 'position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:.7rem;padding:.25rem .65rem;border-radius:20px;white-space:nowrap;z-index:2;opacity:0;transition:opacity .2s;pointer-events:none';
          toast.textContent = keys.length ? `Updated: ${keys.map(k => LABELS[k] || k).join(', ')}` : 'Already up to date';
          if (!keys.length) toast.style.background = 'var(--text-muted)';
          card.appendChild(toast);
          requestAnimationFrame(() => toast.style.opacity = '1');
          repairBtn.style.color = 'var(--accent)'; repairBtn.title = 'Done';
          setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 200);
            repairBtn.style.color = ''; repairBtn.title = 'Repair this book'; repairBtn.disabled = false;
          }, 3000);
        } catch (e) {
          console.error(e);
          repairBtn.style.color = '#ef4444'; repairBtn.title = 'Failed';
          setTimeout(() => { repairBtn.style.color = ''; repairBtn.title = 'Repair this book'; repairBtn.disabled = false; }, 2000);
        }
      });

      card.querySelector('.book-started-date').replaceWith(makeDateEl('Started', book.addedAt, 'addedAt', book));

      // Inline Language / Format rows (click-to-edit, same style as finished card)
      const readingMeta = card.querySelector('.book-reading-meta');
      function textToggleRowR(labelText, displayVal, buildControl, onSave) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
        lbl.textContent = labelText;
        const textEl = document.createElement('span');
        textEl.className = 'book-date-editable';
        textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
        textEl.textContent = displayVal || '—';
        const ctrl = buildControl();
        ctrl.style.display = 'none';
        textEl.addEventListener('click', () => { textEl.style.display = 'none'; ctrl.style.display = ''; ctrl.focus?.(); });
        ctrl.addEventListener('blur', () => { textEl.textContent = ctrl.value || '—'; ctrl.style.display = 'none'; textEl.style.display = ''; onSave(ctrl.value || null); });
        row.append(lbl, textEl, ctrl);
        return row;
      }

      const langDlId = `dl-rlang-${book.id}`;
      const langDl = document.createElement('datalist');
      langDl.id = langDlId;
      LANGUAGES.forEach(v => { const o = document.createElement('option'); o.value = v; langDl.appendChild(o); });
      card.appendChild(langDl);

      readingMeta.appendChild(textToggleRowR('Language', book.language || 'English', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.className = 'page-input';
        inp.style.cssText = 'font-size:.8rem;width:auto';
        inp.value = book.language || 'English';
        inp.setAttribute('list', langDlId);
        return inp;
      }, val => { book.language = val; updateBookMeta(user.uid, book.id, { language: val }); }));

      readingMeta.appendChild(textToggleRowR('Format', book.format || '—', () => {
        const sel = document.createElement('select');
        sel.className = 'page-input';
        sel.style.cssText = 'font-size:.8rem;width:auto';
        ['', 'Physical', 'E-reader', 'Audiobook'].forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v || '—';
          if (v === (book.format || '')) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener('change', () => sel.blur());
        return sel;
      }, val => { book.format = val; updateBookMeta(user.uid, book.id, { format: val }); }));

      const controls = card.querySelector('.progress-controls');
      const curInput = controls.querySelector('.page-input');
      let totalPagesVal = book.totalPages || null;

      curInput.style.cssText = 'border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-right:none';
      const pgNumWrap = document.createElement('div');
      pgNumWrap.className = 'date-num-wrap';
      const pgNumBtns = document.createElement('div');
      pgNumBtns.className = 'date-num-btns';
      const pgUp = document.createElement('button');
      pgUp.type = 'button'; pgUp.className = 'date-num-btn'; pgUp.textContent = '▲';
      pgUp.addEventListener('click', () => {
        const v = parseInt(curInput.value) || 0;
        curInput.value = totalPagesVal ? Math.min(v + 1, totalPagesVal) : v + 1;
        curInput.dispatchEvent(new Event('input'));
      });
      const pgDown = document.createElement('button');
      pgDown.type = 'button'; pgDown.className = 'date-num-btn'; pgDown.textContent = '▼';
      pgDown.addEventListener('click', () => {
        const v = parseInt(curInput.value) || 0;
        if (v > 0) { curInput.value = v - 1; curInput.dispatchEvent(new Event('input')); }
      });
      pgNumBtns.append(pgUp, pgDown);
      curInput.replaceWith(pgNumWrap);
      pgNumWrap.append(curInput, pgNumBtns);

      let pgSaveTimer;
      async function saveProgress() {
        clearTimeout(pgSaveTimer);
        const cur     = Math.max(0, parseInt(curInput.value) || 0);
        const total   = totalPagesVal;
        const clamped = total ? Math.min(cur, total) : cur;
        curInput.value = clamped;
        const updates = { currentPage: clamped };
        if (total !== book.totalPages) updates.totalPages = total;
        await updateBookMeta(user.uid, book.id, updates, { gbid: book.gbid, title: book.title });
        book.currentPage = clamped;
        if (total != null) book.totalPages = total;
        if (coverCell && total) {
          let strip = coverCell.querySelector('.library-progress-strip');
          if (!strip) {
            strip = document.createElement('div');
            strip.className = 'library-progress-strip';
            const fill = document.createElement('div');
            fill.className = 'library-progress-fill';
            strip.appendChild(fill);
            coverCell.insertBefore(strip, coverCell.querySelector('.library-cover-title'));
          }
          const pct = Math.round((clamped / total) * 100);
          coverCell.querySelector('.library-progress-fill').style.width = pct + '%';
          let pctEl = coverCell.querySelector('.library-progress-pct');
          if (!pctEl) { pctEl = document.createElement('div'); pctEl.className = 'library-progress-pct'; coverCell.appendChild(pctEl); }
          pctEl.textContent = pct + '%';
        }
      }

      curInput.addEventListener('input', () => {
        clearTimeout(pgSaveTimer);
        pgSaveTimer = setTimeout(saveProgress, 700);
      });

      controls.addEventListener('focusout', e => {
        if (controls.contains(e.relatedTarget)) return;
        clearTimeout(pgSaveTimer);
        saveProgress();
      });

      const totalDisplay = controls.querySelector('.page-total-display');
      totalDisplay.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.inputMode = 'numeric'; inp.className = 'page-input page-total';
        inp.value = totalPagesVal || '';
        inp.setAttribute('aria-label', 'Total pages');
        inp.style.cssText = 'border-radius:var(--radius-sm) 0 0 var(--radius-sm);border-right:none';
        const tNumWrap = document.createElement('div');
        tNumWrap.className = 'date-num-wrap';
        const tNumBtns = document.createElement('div');
        tNumBtns.className = 'date-num-btns';
        const tUp = document.createElement('button');
        tUp.type = 'button'; tUp.className = 'date-num-btn'; tUp.textContent = '▲';
        tUp.addEventListener('mousedown', e => e.preventDefault());
        tUp.addEventListener('click', () => { const v = parseInt(inp.value) || 0; inp.value = v + 1; });
        const tDown = document.createElement('button');
        tDown.type = 'button'; tDown.className = 'date-num-btn'; tDown.textContent = '▼';
        tDown.addEventListener('mousedown', e => e.preventDefault());
        tDown.addEventListener('click', () => { const v = parseInt(inp.value) || 0; if (v > 1) inp.value = v - 1; });
        tNumBtns.append(tUp, tDown);
        tNumWrap.append(inp, tNumBtns);
        totalDisplay.replaceWith(tNumWrap);
        inp.focus(); inp.select();
        function commitTotal() {
          totalPagesVal = parseInt(inp.value) || null;
          totalDisplay.textContent = totalPagesVal || '?';
          tNumWrap.replaceWith(totalDisplay);
          saveProgress();
        }
        inp.addEventListener('blur', commitTotal);
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); inp.blur(); } });
      });

      trashBtn.addEventListener('click', async () => {
        if (!confirm(`Remove "${book.title}" from your library?`)) return;
        await deleteBook(user.uid, book.id, { title: book.title, author: book.author });
        const idx = allBooks.findIndex(b => b.id === book.id);
        if (idx !== -1) allBooks.splice(idx, 1);
        if (coverCell) coverCell.remove();
        closeModal();
        if (!readingList.querySelector('[data-title]')) {
          showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
        }
        updateCounts();
      });

      const detailsSection = addDetailsEditor(card, book, coverCell, [
        { label: 'Title',        key: 'title',       type: 'text'   },
        { label: 'Author',       key: 'author',      type: 'text'   },
        { label: 'Country',      key: 'country',     type: 'text',   options: COUNTRIES },
        { label: 'Release year', key: 'releaseYear', type: 'number' },
      ]);
      detailsSection.style.cssText = 'display:none;padding-top:.6rem;margin-top:.5rem;border-top:1px solid var(--border)';
      detailsSection.querySelectorAll('.page-input').forEach(el => el.style.background = 'var(--bg)');

      const bookInfoWrap = document.createElement('div');
      bookInfoWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';

      const bookInfoHeader = document.createElement('div');
      bookInfoHeader.style.cssText = 'display:flex;align-items:center;gap:.15rem;margin:-.5rem -.625rem;padding:.5rem .625rem';
      const bookInfoBtn = document.createElement('button');
      bookInfoBtn.style.cssText = 'flex:1;font-size:.75rem;font-weight:600;text-align:left;background:none;border:none;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase;padding:0;font-family:inherit';
      bookInfoBtn.textContent = 'Book info ▾';
      bookInfoBtn.addEventListener('click', () => {
        const open = detailsSection.style.display === 'none';
        detailsSection.style.display = open ? '' : 'none';
        bookInfoBtn.textContent = `Book info ${open ? '▴' : '▾'}`;
      });
      bookInfoHeader.append(bookInfoBtn, repairBtn, trashBtn);

      bookInfoWrap.appendChild(bookInfoHeader);
      bookInfoWrap.appendChild(detailsSection);
      card.appendChild(bookInfoWrap);

      // Status tabs — Finished / Did not finish
      const statusRow = document.createElement('div');
      statusRow.style.cssText = 'display:flex;margin-top:.75rem;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden';

      function makeStatusTab(label, hoverColor) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.style.cssText = 'flex:1;padding:.45rem .5rem;font-size:.78rem;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:color .15s';
        btn.addEventListener('mouseover', () => btn.style.color = hoverColor);
        btn.addEventListener('mouseout',  () => btn.style.color = 'var(--text-muted)');
        return btn;
      }

      const finishedTab = makeStatusTab('Finished',       'var(--accent)');
      const dnfTab      = makeStatusTab('Did not finish', '#c84f4f');
      const tabDivider  = document.createElement('div');
      tabDivider.style.cssText = 'width:1px;background:var(--border);flex-shrink:0';
      statusRow.append(finishedTab, tabDivider, dnfTab);
      card.appendChild(statusRow);

      finishedTab.addEventListener('click', () => {
        statusRow.innerHTML = '';
        statusRow.style.cssText = 'margin-top:.75rem;padding:.625rem;border:1px solid var(--border);border-radius:var(--radius-sm)';

        const label = document.createElement('div');
        label.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
        label.textContent = 'Rate this book (optional)';
        statusRow.appendChild(label);

        const picker = createStarPicker(0);
        statusRow.appendChild(picker);

        const ta = document.createElement('textarea');
        ta.className = 'review-input';
        ta.placeholder = 'Write a review… (optional)';
        ta.rows = 3;
        statusRow.appendChild(ta);

        const actions = document.createElement('div');
        actions.style.cssText = 'display:flex;gap:.5rem;margin-top:.5rem';
        actions.innerHTML = `<button class="join-club-btn btn-do-finish" type="button">Mark as finished</button><button class="btn-update btn-cancel-finish" type="button">Cancel</button>`;
        statusRow.appendChild(actions);

        actions.querySelector('.btn-cancel-finish').addEventListener('click', () => {
          card.replaceWith(renderReading(book, coverCell, closeModal));
        });

        actions.querySelector('.btn-do-finish').addEventListener('click', async () => {
          const rating = picker.getValue();
          const review = ta.value.trim() || null;
          const newReadLocal = { startedAt: book.addedAt || null, startedAtPrecision: book.addedAtPrecision || null, finishedAt: { toDate: () => new Date() }, finishedAtPrecision: 'day', language: book.language || null, format: book.format || null, rating, review };

          const existingFinished =
            (book.gbid  && allBooks.find(b => b.gbid  === book.gbid                               && b.id !== book.id && b.status === 'finished')) ||
            (book.title && allBooks.find(b => b.title?.toLowerCase() === book.title?.toLowerCase() && b.id !== book.id && b.status === 'finished'));

          if (existingFinished) {
            await finishBook(user.uid, existingFinished.id, { title: existingFinished.title, author: existingFinished.author, gbid: existingFinished.gbid, rating, review, language: book.language, format: book.format, coverUrl: existingFinished.coverUrl }, profile.username);
            await deleteBook(user.uid, book.id, { title: book.title, author: book.author });
            existingFinished.rating = rating;
            existingFinished.review = review;
            existingFinished.reads  = (existingFinished.reads || []).concat([newReadLocal]);
            if (coverCell) coverCell.remove();
            finishedList.querySelector(`[data-gbid="${book.gbid}"]`)?.remove();
            closeModal();
            if (!readingList.querySelector('[data-title]')) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
            document.getElementById('finished-empty')?.remove();
            if (viewMode === 'list') {
              const newRow = makeBookListRow(existingFinished);
              newRow.addEventListener('click', () => { let ov; const c = renderFinished(existingFinished, newRow, () => ov?.remove()); ov = createBookModal(c); });
              finishedList.prepend(newRow);
            } else {
              const newCell = makeBookCoverCell(existingFinished);
              attachFinishedCell(newCell, existingFinished);
              finishedList.prepend(newCell);
            }
            updateCounts();
          } else {
            await finishBook(user.uid, book.id, { title: book.title, author: book.author, gbid: book.gbid, rating, review, language: book.language, format: book.format, coverUrl: book.coverUrl, startedAt: book.addedAt?.toDate?.(), startedAtPrecision: book.addedAtPrecision || null }, profile.username);
            book.status     = 'finished';
            book.finishedAt = { toDate: () => new Date() };
            book.rating     = rating;
            book.review     = review;
            book.reads      = (book.reads || []).concat([newReadLocal]);
            if (coverCell) coverCell.remove();
            closeModal();
            if (!readingList.querySelector('[data-title]')) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
            document.getElementById('finished-empty')?.remove();
            if (viewMode === 'list') {
              const newRow = makeBookListRow(book);
              newRow.addEventListener('click', () => { let ov; const c = renderFinished(book, newRow, () => ov?.remove()); ov = createBookModal(c); });
              finishedList.prepend(newRow);
            } else {
              const newCell = makeBookCoverCell(book);
              attachFinishedCell(newCell, book);
              finishedList.prepend(newCell);
            }
            updateCounts();
          }
        });
      });

      dnfTab.addEventListener('click', async () => {
        if (!confirm(`Mark "${book.title}" as did not finish?`)) return;
        await dnfBook(user.uid, book.id, book);
        const idx = allBooks.findIndex(b => b.id === book.id);
        if (idx !== -1) allBooks.splice(idx, 1);
        if (coverCell) coverCell.remove();
        closeModal();
        if (!readingList.querySelector('[data-title]')) showEmpty(readingList, 'reading-empty', 'Nothing in progress.');
        updateCounts();
      });

      return card;
    }

    function renderFinished(book, coverCell, closeModal) {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem">
          <div style="flex:1;min-width:0">
            ${titleHtml}
            ${book.author ? `<a class="book-author" href="../author/?slug=${toAuthorSlug(book.author)}" style="text-decoration:none">${esc(book.author)}</a>` : ''}
          </div>
        </div>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-date-range"></div>
            <div class="book-rating-editor"></div>
          </div>
          ${bookCoverHtml(book)}
        </div>`;

      const coverWrap = card.querySelector('.book-cover-wrap');
      const coverImg  = coverWrap.querySelector('.book-cover, .book-cover-img');
      if (coverImg) { coverImg.style.width = '72px'; coverImg.style.height = '108px'; }
      coverWrap.addEventListener('click', () => openCoverPicker(book, coverWrap, coverCell));

      const coverCol = document.createElement('div');
      coverCol.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex-shrink:0';
      const trashBtn = document.createElement('button');
      trashBtn.className = 'btn-remove-x';
      trashBtn.setAttribute('aria-label', 'Remove'); trashBtn.title = 'Remove';
      trashBtn.innerHTML = TRASH_ICON;
      trashBtn.style.cssText = 'margin:0';
      const repairBtn = document.createElement('button');
      repairBtn.className = 'btn-remove-x btn-repair';
      repairBtn.setAttribute('aria-label', 'Repair'); repairBtn.title = 'Repair this book';
      repairBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>';
      repairBtn.style.cssText = 'margin:0';
      coverWrap.replaceWith(coverCol);
      coverCol.append(coverWrap);
      card.querySelector('.book-entry').style.alignItems = 'stretch';

      repairBtn.addEventListener('click', async () => {
        repairBtn.disabled = true; repairBtn.title = 'Repairing…';
        try {
          const updates = await repairBook(book);
          if (Object.keys(updates).length) {
            await updateBookMeta(user.uid, book.id, updates, { gbid: book.gbid, title: book.title });
            Object.assign(book, updates);
            if (updates.title) { const el = card.querySelector('.book-title'); if (el) el.textContent = updates.title; }
            if ('author' in updates) { const el = card.querySelector('.book-author'); if (el) { el.textContent = updates.author || ''; if (el.tagName === 'A') el.href = `../author/?slug=${toAuthorSlug(updates.author || '')}`; } }
            if (updates.coverUrl) { const img = coverWrap.querySelector('img'); if (img) img.src = updates.coverUrl; }
            if (updates.totalPages) { const inp = card.querySelector('.page-total'); if (inp) { inp.value = updates.totalPages; inp.dispatchEvent(new Event('input')); } }
            card.querySelectorAll('[data-key]').forEach(inp => { if (inp.dataset.key in updates && updates[inp.dataset.key] != null) inp.value = updates[inp.dataset.key]; });
          }
          const keys = Object.keys(updates);
          const LABELS = { gbid: 'ID', coverUrl: 'Cover', totalPages: 'Pages', releaseYear: 'Year', author: 'Author', title: 'Title', country: 'Country' };
          const toast = document.createElement('div');
          toast.style.cssText = 'position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:.7rem;padding:.25rem .65rem;border-radius:20px;white-space:nowrap;z-index:2;opacity:0;transition:opacity .2s;pointer-events:none';
          toast.textContent = keys.length ? `Updated: ${keys.map(k => LABELS[k] || k).join(', ')}` : 'Already up to date';
          if (!keys.length) toast.style.background = 'var(--text-muted)';
          card.appendChild(toast);
          requestAnimationFrame(() => toast.style.opacity = '1');
          repairBtn.style.color = 'var(--accent)'; repairBtn.title = 'Done';
          setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 200);
            repairBtn.style.color = ''; repairBtn.title = 'Repair this book'; repairBtn.disabled = false;
          }, 3000);
        } catch (e) {
          console.error(e);
          repairBtn.style.color = '#ef4444'; repairBtn.title = 'Failed';
          setTimeout(() => { repairBtn.style.color = ''; repairBtn.title = 'Repair this book'; repairBtn.disabled = false; }, 2000);
        }
      });

      // Reads array drives all per-read fields
      const reads = getReads(book);
      const tsVal = ts => ts?.seconds ?? (ts?.toDate ? ts.toDate().getTime() / 1000 : 0);
      reads.sort((a, b) => tsVal(b.finishedAt) - tsVal(a.finishedAt));
      let selectedReadIdx = 0;

      // Per-read date pickers (replace static book-level date range)
      const rangeEl = card.querySelector('.book-date-range');
      rangeEl.className = 'book-date-range';
      rangeEl.style.cssText = 'display:flex;flex-direction:column;gap:.2rem;margin:.2rem 0';

      // Add language datalist once (reused by rebuilt rows)
      const langDl = document.createElement('datalist');
      langDl.id = `dl-lang-${book.id}`;
      LANGUAGES.forEach(v => { const o = document.createElement('option'); o.value = v; langDl.appendChild(o); });
      card.appendChild(langDl);

      let startedPicker, finishedPicker, langInput, fmtSel;
      function buildDatePickers(r) {
        rangeEl.innerHTML = '';
        function dateRow(labelText, ts, prec, getPicker) {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
          const lbl = document.createElement('span');
          lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
          lbl.textContent = labelText;

          const picker = createPartialDatePicker(ts || null, prec || null);
          picker.style.display = 'none';

          const textEl = document.createElement('span');
          textEl.className = 'book-date-editable';
          textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
          textEl.textContent = (ts && prec) ? formatDateTs(ts, prec) : '—';

          function collapseDateRow() {
            const { date: d, precision: p } = picker.getDate();
            textEl.textContent = d ? formatDateTs({ toDate: () => d }, p) : '—';
            picker.style.display = 'none';
            textEl.style.display = '';
            debouncedSave();
          }

          textEl.addEventListener('click', () => {
            textEl.style.display = 'none';
            picker.style.display = '';
            picker.querySelector('select, input')?.focus();
            function onOutside(e) {
              if (picker.contains(e.target)) return;
              collapseDateRow();
              document.removeEventListener('mousedown', onOutside);
            }
            document.addEventListener('mousedown', onOutside);
          });
          picker.addEventListener('focusout', e => {
            if (picker.contains(e.relatedTarget)) return;
            collapseDateRow();
          });

          getPicker(picker);
          row.append(lbl, textEl, picker);
          return row;
        }

        const sd = dateRow('Started',  r?.startedAt,  r?.startedAtPrecision,  p => startedPicker  = p);
        const fd = dateRow('Finished', r?.finishedAt, r?.finishedAtPrecision, p => finishedPicker = p);

        function labelRow(labelText) {
          const row = document.createElement('div');
          row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
          const lbl = document.createElement('span');
          lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
          lbl.textContent = labelText;
          return { row, lbl };
        }
        function textToggleRow(labelText, displayVal, buildControl) {
          const { row, lbl } = labelRow(labelText);
          const textEl = document.createElement('span');
          textEl.className = 'book-date-editable';
          textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
          textEl.textContent = displayVal || '—';
          const ctrl = buildControl();
          ctrl.style.display = 'none';
          textEl.addEventListener('click', () => { textEl.style.display = 'none'; ctrl.style.display = ''; ctrl.focus?.(); });
          ctrl.addEventListener('blur', () => { textEl.textContent = ctrl.value || '—'; ctrl.style.display = 'none'; textEl.style.display = ''; });
          row.append(lbl, textEl, ctrl);
          return row;
        }

        const ll = textToggleRow('Language', r?.language || 'English', () => {
          langInput = document.createElement('input');
          langInput.type = 'text'; langInput.className = 'page-input';
          langInput.style.cssText = 'font-size:.8rem;width:auto';
          langInput.value = r?.language || 'English';
          langInput.setAttribute('list', langDl.id);
          return langInput;
        });

        const fl = textToggleRow('Format', r?.format || '—', () => {
          fmtSel = document.createElement('select');
          fmtSel.className = 'page-input';
          fmtSel.style.cssText = 'font-size:.8rem;width:auto';
          ['', 'Physical', 'E-reader', 'Audiobook'].forEach(v => {
            const o = document.createElement('option');
            o.value = v; o.textContent = v || '—';
            if (v === (r?.format || '')) o.selected = true;
            fmtSel.appendChild(o);
          });
          fmtSel.addEventListener('change', () => fmtSel.blur());
          return fmtSel;
        });

        rangeEl.append(sd, fd, ll, fl);
      }
      buildDatePickers(reads[selectedReadIdx]);

      const ratingEditor = card.querySelector('.book-rating-editor');
      ratingEditor.style.marginTop = '.5rem';
      const starPicker = createStarPicker(reads[selectedReadIdx]?.rating || book.rating || 0);
      ratingEditor.appendChild(starPicker);

      const reviewWrap = document.createElement('div');
      reviewWrap.style.cssText = 'margin-top:.5rem';

      const reviewText = document.createElement('div');
      reviewText.style.cssText = 'font-size:.82rem;cursor:pointer;line-height:1.4;white-space:pre-wrap;word-break:break-word;min-height:1.2em;font-style:italic';

      const reviewTa = document.createElement('textarea');
      reviewTa.className   = 'review-input';
      reviewTa.placeholder = 'Write a review…';
      reviewTa.rows = 3;
      reviewTa.style.display = 'none';
      reviewTa.style.marginTop = '0';

      function setReviewDisplay(val) {
        if (val) {
          reviewText.textContent = '“' + val + '”';
          reviewText.style.color = 'var(--text)';
        } else {
          reviewText.textContent = 'Write a review…';
          reviewText.style.color = 'var(--text-muted)';
        }
      }

      setReviewDisplay(reads[selectedReadIdx]?.review || book.review || '');
      reviewTa.value = reads[selectedReadIdx]?.review || book.review || '';

      reviewText.addEventListener('click', () => {
        reviewText.style.display = 'none';
        reviewTa.style.display = '';
        reviewTa.focus();
      });

      reviewWrap.append(reviewText, reviewTa);
      ratingEditor.appendChild(reviewWrap);

      trashBtn.addEventListener('click', async () => {
        if (!confirm(`Remove "${book.title}" from your library?`)) return;
        await deleteBook(user.uid, book.id, { title: book.title, author: book.author });
        const idx = allBooks.findIndex(b => b.id === book.id);
        if (idx !== -1) allBooks.splice(idx, 1);
        if (coverCell) coverCell.remove();
        closeModal();
        if (!finishedList.querySelector('[data-title]')) {
          showEmpty(finishedList, 'finished-empty', 'No finished books yet.');
        }
        updateCounts();
      });


      async function saveCurrentRead() {
        const { date: startedAtDate,  precision: startedAtPrec  } = startedPicker.getDate();
        const { date: finishedAtDate, precision: finishedAtPrec } = finishedPicker.getDate();
        const existing = reads[selectedReadIdx];
        if (!existing && !startedAtDate && !finishedAtDate) return;
        reads[selectedReadIdx] = {
          startedAt:           startedAtDate  ? { toDate: () => startedAtDate  } : null,
          startedAtPrecision:  startedAtDate  ? startedAtPrec  : null,
          finishedAt:          finishedAtDate ? { toDate: () => finishedAtDate } : null,
          finishedAtPrecision: finishedAtDate ? finishedAtPrec : null,
          language: langInput.value.trim() || null,
          format:   fmtSel.value           || null,
          rating:   starPicker.getValue(),
          review:   reviewTa.value.trim()  || null,
        };
        book.reads = reads;
        await updateBookReads(user.uid, book.id, reads);
        const mostRecent = reads.reduce((best, r) => {
          const rTs = r.finishedAt?.toDate?.()?.getTime?.() ?? 0;
          const bTs = best?.finishedAt?.toDate?.()?.getTime?.() ?? 0;
          return rTs > bTs ? r : best;
        }, null);
        const selectedRead = reads[selectedReadIdx];
        const bookInfo = { title: book.title, author: book.author, gbid: book.gbid,
          rating: mostRecent?.rating ?? null, review: mostRecent?.review ?? null,
          username: profile.username, bookId: book.id };
        try {
          await syncBookActivity(user.uid, 'finished',
            mostRecent?.finishedAt?.toDate?.() ?? null,
            mostRecent?.finishedAtPrecision ?? null,
            bookInfo
          );
        } catch (e) { console.error('Finished activity sync failed:', e); }
        try {
          await syncBookActivity(user.uid, 'started',
            selectedRead?.startedAt?.toDate?.() ?? null,
            selectedRead?.startedAtPrecision ?? null,
            bookInfo
          );
        } catch (e) { console.error('Started activity sync failed:', e); }
        book.rating     = mostRecent?.rating;
        book.review     = mostRecent?.review;
        book.finishedAt = mostRecent?.finishedAt;
        if (coverCell) {
          let badge = coverCell.querySelector('.library-cover-rating');
          const displayRating = mostRecent?.rating;
          if (displayRating) {
            const html = cellRatingHtml(displayRating);
            if (badge) { badge.innerHTML = html; }
            else {
              badge = document.createElement('div');
              badge.className = 'library-cover-rating';
              badge.innerHTML = html;
              const info = coverCell.querySelector('.library-cover-info');
              if (info) info.insertBefore(badge, info.firstChild);
            }
          } else if (badge) {
            badge.remove();
          }
        }
        buildHistList();
      }

      let saveTimer;
      function debouncedSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveCurrentRead, 700); }

      // Auto-save per-read fields
      rangeEl.addEventListener('change',   debouncedSave);
      rangeEl.addEventListener('focusout', debouncedSave);
      starPicker.addEventListener('click',  () => saveCurrentRead());
      reviewTa.addEventListener('blur',    () => { setReviewDisplay(reviewTa.value.trim()); reviewTa.style.display = 'none'; reviewText.style.display = ''; saveCurrentRead(); });
      reviewTa.addEventListener('input',   debouncedSave);

      const detailsSection = addDetailsEditor(card, book, coverCell, [
        { label: 'Title',        key: 'title',       type: 'text'   },
        { label: 'Author',       key: 'author',      type: 'text'   },
        { label: 'Country',      key: 'country',     type: 'text',   options: COUNTRIES },
        { label: 'Release year', key: 'releaseYear', type: 'number' },
        { label: 'Total pages',  key: 'totalPages',  type: 'number' },
      ]);
      detailsSection.style.cssText = 'display:none;padding-top:.6rem;margin-top:.5rem;border-top:1px solid var(--border)';
      detailsSection.querySelectorAll('.page-input').forEach(el => el.style.background = 'var(--bg)');

      const bookInfoWrap = document.createElement('div');
      bookInfoWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';

      const bookInfoHeader = document.createElement('div');
      bookInfoHeader.style.cssText = 'display:flex;align-items:center;gap:.15rem;margin:-.5rem -.625rem;padding:.5rem .625rem';
      const bookInfoBtn = document.createElement('button');
      bookInfoBtn.style.cssText = 'flex:1;font-size:.75rem;font-weight:600;text-align:left;background:none;border:none;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase;padding:0;font-family:inherit';
      bookInfoBtn.textContent = 'Book info ▾';
      bookInfoBtn.addEventListener('click', () => {
        const open = detailsSection.style.display === 'none';
        detailsSection.style.display = open ? '' : 'none';
        bookInfoBtn.textContent = `Book info ${open ? '▴' : '▾'}`;
      });
      bookInfoHeader.append(bookInfoBtn, repairBtn, trashBtn);

      bookInfoWrap.appendChild(bookInfoHeader);
      bookInfoWrap.appendChild(detailsSection);
      card.appendChild(bookInfoWrap);

      // Reading history panel — same style as Book info, only shown when >1 reads
      const histWrap = document.createElement('div');
      histWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';

      const histToggleBtn = document.createElement('button');
      histToggleBtn.style.cssText = 'font-size:.75rem;font-weight:600;width:calc(100% + 1.25rem);text-align:left;background:none;border:none;display:flex;align-items:center;padding:.5rem .625rem;margin:-.5rem -.625rem;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase';

      const histList = document.createElement('div');
      histList.style.display = 'none';

      histToggleBtn.addEventListener('click', () => {
        const open = histList.style.display === 'none';
        histList.style.display = open ? '' : 'none';
        histToggleBtn.textContent = `Reading history ${open ? '▴' : '▾'}`;
        if (open) buildHistList();
      });

      histWrap.appendChild(histToggleBtn);
      histWrap.appendChild(histList);
      card.appendChild(histWrap);

      const fmtR = (ts, prec) => {
        if (!ts?.toDate) return '';
        const d = ts.toDate();
        if (!prec || prec === 'month') return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
        if (prec === 'year') return String(d.getFullYear());
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      };

      function buildHistList() {
        histWrap.style.display = reads.length > 1 ? '' : 'none';
        histToggleBtn.textContent = `Reading history ${histList.style.display === 'none' ? '▾' : '▴'}`;
        if (histList.style.display === 'none') { histList.innerHTML = ''; return; }

        histList.innerHTML = '';
        histList.style.cssText = 'padding-top:.5rem;margin-top:.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.1rem';

        reads.forEach((r, i) => {
          const row = document.createElement('div');
          const isSelected = i === selectedReadIdx;
          row.style.cssText = `display:flex;align-items:center;gap:.4rem;padding:.3rem .4rem;border-radius:var(--radius-sm);cursor:pointer;transition:background .1s;${isSelected ? 'background:var(--bg);border:1px solid var(--border)' : ''}`;

          const finished = fmtR(r.finishedAt, r.finishedAtPrecision);
          const started  = fmtR(r.startedAt,  r.startedAtPrecision);
          const dateStr  = finished || started || '—';

          const dot = document.createElement('span');
          dot.style.cssText = `flex-shrink:0;width:6px;height:6px;border-radius:50%;background:${isSelected ? 'var(--accent)' : 'var(--border)'};margin-right:.1rem`;

          const dateEl = document.createElement('span');
          dateEl.style.cssText = `flex:1;font-size:.82rem;color:${isSelected ? 'var(--text)' : 'var(--text-muted)'}`;
          dateEl.textContent = dateStr;

          const starsEl = document.createElement('span');
          starsEl.style.cssText = 'font-size:.78rem';
          if (r.rating) starsEl.innerHTML = cellRatingHtml(r.rating);

          const delBtn = document.createElement('button');
          delBtn.type = 'button';
          delBtn.textContent = '×';
          delBtn.style.cssText = 'background:none;border:none;color:var(--text-muted);font-size:1rem;line-height:1;padding:0 .15rem;cursor:pointer;opacity:.4;flex-shrink:0';
          delBtn.addEventListener('mouseenter', () => delBtn.style.opacity = '1');
          delBtn.addEventListener('mouseleave', () => delBtn.style.opacity = '.4');

          row.addEventListener('mouseenter', () => { if (i !== selectedReadIdx) row.style.background = 'var(--bg)'; });
          row.addEventListener('mouseleave', () => { if (i !== selectedReadIdx) row.style.background = ''; });

          row.addEventListener('click', e => {
            if (e.target === delBtn) return;
            clearTimeout(saveTimer);
            selectedReadIdx = i;
            starPicker.setValue(r.rating || 0);
            reviewTa.value = r.review || '';
            setReviewDisplay(r.review || '');
            buildDatePickers(r);
            buildHistList();
          });

          delBtn.addEventListener('click', async e => {
            e.stopPropagation();
            if (reads.length === 1) {
              if (!confirm(`Remove "${book.title}" from your library?`)) return;
              await deleteBook(user.uid, book.id, { title: book.title, author: book.author });
              const idx = allBooks.findIndex(b => b.id === book.id);
              if (idx !== -1) allBooks.splice(idx, 1);
              if (coverCell) coverCell.remove();
              closeModal();
              if (!finishedList.querySelector('[data-title]')) showEmpty(finishedList, 'finished-empty', 'No finished books yet.');
              updateCounts();
              return;
            }
            clearTimeout(saveTimer);
            reads.splice(i, 1);
            if (selectedReadIdx >= reads.length) selectedReadIdx = reads.length - 1;
            book.reads = reads;
            await updateBookReads(user.uid, book.id, reads);
            const sel = reads[selectedReadIdx];
            starPicker.setValue(sel?.rating || 0);
            reviewTa.value = sel?.review || '';
            setReviewDisplay(sel?.review || '');
            buildDatePickers(sel);
            buildHistList();
          });

          row.append(dot, dateEl, starsEl, delBtn);
          histList.appendChild(row);
        });
      }

      buildHistList();
      return card;
    }

    function renderReadingView(book) {
      const pct  = book.totalPages ? Math.round((book.currentPage / book.totalPages) * 100) : 0;
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem">
          <div style="flex:1;min-width:0">
            ${titleHtml}
            ${book.author ? `<a class="book-author" href="../author/?slug=${toAuthorSlug(book.author)}" style="text-decoration:none">${esc(book.author)}</a>` : ''}
          </div>
        </div>
        <div class="book-entry">
          <div class="book-info">
            <div class="book-started-date"></div>
            <div class="book-reading-meta" style="display:flex;flex-direction:column;gap:.2rem;margin:.2rem 0"></div>
            <div class="progress-bar-track">
              <div class="progress-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="progress-label">${book.totalPages ? `Page ${book.currentPage} of ${book.totalPages} · ${pct}%` : `Page ${book.currentPage}`}</div>
          </div>
          ${bookCoverHtml(book)}
        </div>`;

      const coverWrap = card.querySelector('.book-cover-wrap');
      const coverImg  = coverWrap?.querySelector('.book-cover, .book-cover-img');
      if (coverImg) { coverImg.style.width = '72px'; coverImg.style.height = '108px'; }

      // Static started date
      const startedStr = book.addedAt ? formatDateTs(book.addedAt, book.addedAtPrecision || 'month') : null;
      const startedRow = document.createElement('div');
      startedRow.style.cssText = 'display:flex;align-items:center;gap:.4rem';
      const startedLbl = document.createElement('span');
      startedLbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
      startedLbl.textContent = 'Started';
      const startedVal = document.createElement('span');
      startedVal.style.cssText = 'font-size:.8rem;color:var(--text)';
      startedVal.textContent = startedStr || '—';
      startedRow.append(startedLbl, startedVal);
      card.querySelector('.book-started-date').replaceWith(startedRow);

      // Static Language / Format rows
      const readingMeta = card.querySelector('.book-reading-meta');
      function staticMetaRow(labelText, val) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
        lbl.textContent = labelText;
        const textEl = document.createElement('span');
        textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
        textEl.textContent = val || '—';
        row.append(lbl, textEl);
        return row;
      }
      readingMeta.appendChild(staticMetaRow('Language', book.language || 'English'));
      readingMeta.appendChild(staticMetaRow('Format',   book.format   || null));

      // Book info collapsible (same wrap/btn as owned card)
      const detailsSection = document.createElement('div');
      detailsSection.style.cssText = 'display:none;padding-top:.6rem;margin-top:.5rem;border-top:1px solid var(--border)';
      [
        ['Title',        book.title],
        ['Author',       book.author],
        ['Country',      book.country],
        ['Release year', book.releaseYear],
      ].forEach(([lbl, val]) => {
        if (!val) return;
        detailsSection.appendChild(staticMetaRow(lbl, String(val)));
      });

      const bookInfoWrap = document.createElement('div');
      bookInfoWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';
      const bookInfoBtn = document.createElement('button');
      bookInfoBtn.style.cssText = 'font-size:.75rem;font-weight:600;width:calc(100% + 1.25rem);text-align:left;background:none;border:none;display:flex;align-items:center;padding:.5rem .625rem;margin:-.5rem -.625rem;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase';
      bookInfoBtn.textContent = 'Book info ▾';
      bookInfoBtn.addEventListener('click', () => {
        const open = detailsSection.style.display === 'none';
        detailsSection.style.display = open ? '' : 'none';
        bookInfoBtn.textContent = `Book info ${open ? '▴' : '▾'}`;
      });
      bookInfoWrap.appendChild(bookInfoBtn);
      bookInfoWrap.appendChild(detailsSection);
      card.appendChild(bookInfoWrap);

      return card;
    }

    function renderFinishedView(book) {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.id = book.id;
      const titleHtml = book.gbid
        ? `<a class="book-title" href="../book/?gbid=${esc(book.gbid)}" style="text-decoration:none;color:inherit">${esc(book.title)}</a>`
        : `<span class="book-title">${esc(book.title)}</span>`;
      card.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem">
          <div style="flex:1;min-width:0">
            ${titleHtml}
            ${book.author ? `<a class="book-author" href="../author/?slug=${toAuthorSlug(book.author)}" style="text-decoration:none">${esc(book.author)}</a>` : ''}
          </div>
        </div>
