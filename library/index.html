        <div class="book-entry">
          <div class="book-info">
            <div class="book-date-range"></div>
            <div class="book-rating-editor"></div>
          </div>
          ${bookCoverHtml(book)}
        </div>`;

      const coverWrap = card.querySelector('.book-cover-wrap');
      const coverImg  = coverWrap?.querySelector('.book-cover, .book-cover-img');
      if (coverImg) { coverImg.style.width = '72px'; coverImg.style.height = '108px'; }

      const reads = getReads(book);
      const tsVal = ts => ts?.seconds ?? (ts?.toDate ? ts.toDate().getTime() / 1000 : 0);
      reads.sort((a, b) => tsVal(b.finishedAt) - tsVal(a.finishedAt));
      const r = reads[0] || {};

      // Static date-range rows (same layout as buildDatePickers)
      const rangeEl = card.querySelector('.book-date-range');
      rangeEl.style.cssText = 'display:flex;flex-direction:column;gap:.2rem;margin:.2rem 0';

      function staticDateRow(labelText, ts, prec) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
        lbl.textContent = labelText;
        const textEl = document.createElement('span');
        textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
        textEl.textContent = (ts && prec) ? formatDateTs(ts, prec) : '—';
        row.append(lbl, textEl);
        return row;
      }
      function staticLabelRow(labelText, val) {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.4rem';
        const lbl = document.createElement('span');
        lbl.style.cssText = 'font-size:.72rem;color:var(--text-muted);min-width:50px';
        lbl.textContent = labelText;
        const textEl = document.createElement('span');
        textEl.style.cssText = 'font-size:.8rem;color:var(--text)';
        textEl.textContent = val || '—';
        row.append(lbl, textEl);
        return row;
      }

      rangeEl.append(
        staticDateRow('Started',  r.startedAt,  r.startedAtPrecision),
        staticDateRow('Finished', r.finishedAt, r.finishedAtPrecision),
        staticLabelRow('Language', r.language || 'English'),
        staticLabelRow('Format',   r.format   || null),
      );

      // Static rating + review (same container as owned)
      const ratingEditor = card.querySelector('.book-rating-editor');
      ratingEditor.style.marginTop = '.5rem';
      if (r.rating) {
        const starsEl = document.createElement('div');
        starsEl.innerHTML = renderStars(r.rating);
        ratingEditor.appendChild(starsEl);
      }
      if (r.review) {
        const reviewText = document.createElement('div');
        reviewText.style.cssText = 'margin-top:.5rem;font-size:.82rem;line-height:1.4;white-space:pre-wrap;word-break:break-word;font-style:italic;color:var(--text)';
        reviewText.textContent = '“' + r.review + '”';
        ratingEditor.appendChild(reviewText);
      }

      // Book info collapsible
      const detailsSection = document.createElement('div');
      detailsSection.style.cssText = 'display:none;padding-top:.6rem;margin-top:.5rem;border-top:1px solid var(--border)';
      [
        ['Title',        book.title],
        ['Author',       book.author],
        ['Country',      book.country],
        ['Release year', book.releaseYear],
        ['Total pages',  book.totalPages],
      ].forEach(([lbl, val]) => {
        if (!val) return;
        detailsSection.appendChild(staticLabelRow(lbl, String(val)));
      });

      const bookInfoWrap = document.createElement('div');
      bookInfoWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';
      const bookInfoBtn = document.createElement('button');
      bookInfoBtn.style.cssText = 'font-size:.75rem;font-weight:600;width:calc(100% + 1.25rem);text-align:left;background:none;border:none;display:flex;align-items:center;padding:.5rem .625rem;margin:-.5rem -.625rem;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase';
      bookInfoBtn.textContent = 'Book info ▾';
      bookInfoBtn.addEventListener('click', () => {
        const open = detailsSection.style.display === 'none';
        detailsSection.style.display = open ? '' : 'none';
        bookInfoBtn.textContent = `Book info ${open ? '▴' : '▾'}`;
      });
      bookInfoWrap.appendChild(bookInfoBtn);
      bookInfoWrap.appendChild(detailsSection);
      card.appendChild(bookInfoWrap);

      // Reading history collapsible (same structure as owned, no delete/click-to-switch)
      if (reads.length > 1) {
        const histWrap = document.createElement('div');
        histWrap.style.cssText = 'margin-top:.75rem;padding:.5rem .625rem;background:var(--bg-alt);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden';
        const histToggleBtn = document.createElement('button');
        histToggleBtn.style.cssText = 'font-size:.75rem;font-weight:600;width:calc(100% + 1.25rem);text-align:left;background:none;border:none;display:flex;align-items:center;padding:.5rem .625rem;margin:-.5rem -.625rem;cursor:pointer;color:var(--text-muted);letter-spacing:.02em;text-transform:uppercase';
        histToggleBtn.textContent = 'Reading history ▾';
        const histList = document.createElement('div');
        histList.style.display = 'none';

        const fmtR = (ts, prec) => {
          if (!ts?.toDate) return '';
          const d = ts.toDate();
          if (!prec || prec === 'month') return d.toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
          if (prec === 'year') return String(d.getFullYear());
          return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        let selectedViewIdx = 0;

        function selectRead(idx) {
          selectedViewIdx = idx;
          const rd = reads[idx];
          rangeEl.innerHTML = '';
          rangeEl.append(
            staticDateRow('Started',  rd.startedAt,  rd.startedAtPrecision),
            staticDateRow('Finished', rd.finishedAt, rd.finishedAtPrecision),
            staticLabelRow('Language', rd.language || 'English'),
            staticLabelRow('Format',   rd.format   || null),
          );
          ratingEditor.innerHTML = '';
          if (rd.rating) {
            const starsEl = document.createElement('div');
            starsEl.innerHTML = renderStars(rd.rating);
            ratingEditor.appendChild(starsEl);
          }
          if (rd.review) {
            const reviewText = document.createElement('div');
            reviewText.style.cssText = 'margin-top:.5rem;font-size:.82rem;line-height:1.4;white-space:pre-wrap;word-break:break-word;font-style:italic;color:var(--text)';
            reviewText.textContent = '"' + rd.review + '"';
            ratingEditor.appendChild(reviewText);
          }
          histList.querySelectorAll('[data-read-row]').forEach((r, i) => {
            const sel = i === idx;
            r.style.background   = sel ? 'var(--bg)' : '';
            r.style.border       = sel ? '1px solid var(--border)' : '';
            r.querySelector('[data-dot]').style.background  = sel ? 'var(--accent)' : 'var(--border)';
            r.querySelector('[data-label]').style.color     = sel ? 'var(--text)' : 'var(--text-muted)';
          });
        }

        histToggleBtn.addEventListener('click', () => {
          const open = histList.style.display === 'none';
          histList.style.display = open ? '' : 'none';
          histToggleBtn.textContent = `Reading history ${open ? '▴' : '▾'}`;
          if (!open || histList.children.length) return;
          histList.style.cssText = 'padding-top:.5rem;margin-top:.5rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.1rem';
          reads.forEach((rd, i) => {
            const row = document.createElement('div');
            row.dataset.readRow = '';
            const isSelected = i === selectedViewIdx;
            row.style.cssText = `display:flex;align-items:center;gap:.4rem;padding:.3rem .4rem;border-radius:var(--radius-sm);cursor:pointer;${isSelected ? 'background:var(--bg);border:1px solid var(--border)' : ''}`;
            const finished = fmtR(rd.finishedAt, rd.finishedAtPrecision);
            const started  = fmtR(rd.startedAt,  rd.startedAtPrecision);
            const dateStr  = finished || started || '—';
            const dot = document.createElement('span');
            dot.dataset.dot = '';
            dot.style.cssText = `flex-shrink:0;width:6px;height:6px;border-radius:50%;background:${isSelected ? 'var(--accent)' : 'var(--border)'};margin-right:.1rem`;
            const dateEl = document.createElement('span');
            dateEl.dataset.label = '';
            dateEl.style.cssText = `flex:1;font-size:.82rem;color:${isSelected ? 'var(--text)' : 'var(--text-muted)'}`;
            dateEl.textContent = dateStr;
            const starsEl = document.createElement('span');
            starsEl.style.cssText = 'font-size:.78rem';
            if (rd.rating) starsEl.innerHTML = cellRatingHtml(rd.rating);
            row.append(dot, dateEl, starsEl);
            row.addEventListener('click', () => selectRead(i));
            histList.appendChild(row);
          });
        });

        histWrap.appendChild(histToggleBtn);
        histWrap.appendChild(histList);
        card.appendChild(histWrap);
      }

      return card;
    }

    let allBooks = [];

    function updateCounts() {
      const rc = allBooks.filter(b => b.status === 'reading').length;
      const fc = allBooks.filter(b => b.status === 'finished').length;
      document.getElementById('reading-title').textContent  = `Currently Reading · ${rc}`;
      document.getElementById('finished-title').textContent = `Finished · ${fc}`;
    }

    function getReads(book) {
      if (book.reads && book.reads.length > 0) return book.reads;
      if (book.finishedAt) return [{ startedAt: book.addedAt || null, startedAtPrecision: book.addedAtPrecision || null, finishedAt: book.finishedAt, finishedAtPrecision: book.finishedAtPrecision || null, language: book.language || null, format: book.format || null, rating: book.rating || null, review: book.review || null }];
      return [];
    }

    function getDisplayRating(book) {
      if (book.reads && book.reads.length > 0) {
        const tsVal = ts => ts?.seconds ?? (ts?.toDate ? ts.toDate().getTime() / 1000 : 0);
        return book.reads.reduce((best, r) =>
          tsVal(r.finishedAt) > tsVal(best.finishedAt) ? r : best, book.reads[0]
        ).rating || null;
      }
      return book.rating || null;
    }

    try {
      function sortBooks(books) {
        const reading  = books
          .filter(b => b.status === 'reading')
          .sort((a, b) => tsOf(b, 'addedAt') - tsOf(a, 'addedAt'));
        const finished = books
          .filter(b => b.status === 'finished')
          .sort((a, b) => {
            const bTs = tsOf(b, 'finishedAt') || tsOf(b, 'addedAt');
            const aTs = tsOf(a, 'finishedAt') || tsOf(a, 'addedAt');
            return bTs - aTs;
          });
        return { reading, finished };
      }

      function setTitles(reading, finished) {
        document.getElementById('reading-title').textContent  = `Currently Reading · ${reading.length}`;
        document.getElementById('finished-title').textContent = `Finished · ${finished.length}`;
      }

      function setupFinishedSort(finished, attachCell, listAttachFn) {
        const finishedSortEl = document.getElementById('finished-sort');
        finishedSortEl.style.display = '';
        const sortBtns = finishedSortEl.querySelectorAll('.sort-btn');

        let sortState = (() => { try { return JSON.parse(localStorage.getItem('library-finished-sort')) || {}; } catch { return {}; } })();
        if (!sortState.key) sortState = { key: 'date', dir: 'desc' };

        const updateSortUI = () => {
          sortBtns.forEach(btn => {
            const active = btn.dataset.key === sortState.key;
            btn.classList.toggle('sort-btn-active', active);
            if (active) {
              btn.textContent = btn.dataset.key === 'alpha'
                ? (sortState.dir === 'asc' ? 'A–Z' : 'Z–A')
                : btn.dataset.label + (sortState.dir === 'asc' ? ' ↑' : ' ↓');
            } else {
              btn.textContent = btn.dataset.label;
            }
          });
        };

        const alphaKey = t => (t || '').replace(/^the\s+/i, '');

        const renderFinishedSorted = () => {
          finishedList.innerHTML = '';
          finishedList.className = viewMode === 'list' ? 'books-list' : 'books-grid';
          const { key, dir } = sortState;
          const asc = dir === 'asc';
          const sorted = [...finished];
          switch (key) {
            case 'alpha': {
              sorted.sort((a, b) => { const ak = alphaKey(a.title), bk = alphaKey(b.title); return asc ? ak.localeCompare(bk) : bk.localeCompare(ak); });
              break;
            }
            case 'release': sorted.sort((a, b) => asc ? (a.releaseYear||9999) - (b.releaseYear||9999) : (b.releaseYear||0) - (a.releaseYear||0)); break;
            case 'rating':  sorted.sort((a, b) => asc ? (a.rating||0) - (b.rating||0) : (b.rating||0) - (a.rating||0)); break;
            default:        sorted.sort((a, b) => { const af = tsOf(a,'finishedAt'), bf = tsOf(b,'finishedAt'); if (!af && !bf) return 0; if (!af) return 1; if (!bf) return -1; return asc ? af - bf : bf - af; });
          }
          if (!sorted.length) { showEmpty(finishedList, 'finished-empty', 'No finished books yet.'); return; }
          sorted.forEach(b => {
            if (viewMode === 'list' && listAttachFn) {
              const row = makeBookListRow(b); listAttachFn(row, b); finishedList.appendChild(row);
            } else {
              const cell = makeBookCoverCell(b); attachCell(cell, b); finishedList.appendChild(cell);
            }
          });
          const q = (document.getElementById('library-filter')?.value || '').trim().toLowerCase();
          if (q) finishedList.querySelectorAll('[data-title]').forEach(el => {
            const show = el.dataset.title.includes(q) || el.dataset.author.includes(q);
            el.style.display = show ? '' : 'none';
            el.classList.toggle('hidden', !show);
          });
        };

        sortBtns.forEach(btn => btn.addEventListener('click', () => {
          if (btn.dataset.key === sortState.key) {
            sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
          } else {
            sortState = { key: btn.dataset.key, dir: btn.dataset.default };
          }
          localStorage.setItem('library-finished-sort', JSON.stringify(sortState));
          updateSortUI();
          renderFinishedSorted();
        }));

        updateSortUI();
        renderFinishedSorted();

        // Background-fetch release years

        const missing = finished.filter(b => b.gbid && b.releaseYear == null);
        if (missing.length) {
          (async () => {
            try {
              const slugs = missing.filter(b => !/^\d+$/.test(b.gbid)).map(b => b.gbid);
              const ids   = missing.filter(b => /^\d+$/.test(b.gbid)).map(b => parseInt(b.gbid, 10));
              const parts = [], vars = {};
              if (slugs.length) { parts.push('bySlug:books(where:{slug:{_in:$slugs}}){slug release_year}'); vars.slugs = slugs; }
              if (ids.length)   { parts.push('byId:books(where:{id:{_in:$ids}}){id release_year}');         vars.ids   = ids; }
              if (!parts.length) return;
              const paramStr = [slugs.length && '$slugs:[String!]!', ids.length && '$ids:[Int!]!'].filter(Boolean).join(',');
              const d = await hcPost(`query(${paramStr}){${parts.join(' ')}}`, vars);
              const yearMap = new Map();
              (d?.data?.bySlug || []).forEach(b => { const y = parseInt(b.release_year, 10); if (y >= 1000 && y <= 2100) yearMap.set(b.slug, y); });
              (d?.data?.byId   || []).forEach(b => { const y = parseInt(b.release_year, 10); if (y >= 1000 && y <= 2100) yearMap.set(String(b.id), y); });
              let updated = false;
              missing.forEach(b => { const y = yearMap.get(b.gbid); if (y) { b.releaseYear = y; updated = true; } });
              if (updated && sortState.key === 'release') renderFinishedSorted();
            } catch (e) { console.error('release year fetch:', e); }
          })();
        }
        return renderFinishedSorted;
      }

      let renderReadingFn    = () => {};
      let reRenderFinishedFn = () => {};
      let allLists = [];

      if (isOwn) {
        const [booksData, lists] = await Promise.all([
          getBooks(user.uid).then(sortBooks),
          getLists(user.uid).catch(() => [])
        ]);
        const { reading, finished } = booksData;
        allLists = lists;

        // Enrich books with list membership so data-lists persists across re-renders
        const gbidToLists = new Map();
        lists.forEach(l => {
          (l.books || []).forEach(b => {
            if (!b.gbid) return;
            if (!gbidToLists.has(b.gbid)) gbidToLists.set(b.gbid, []);
            gbidToLists.get(b.gbid).push(l.id);
          });
        });
        [...reading, ...finished].forEach(b => { b._listIds = (gbidToLists.get(b.gbid) || []).join(','); });

        allBooks = [...reading, ...finished];
        setTitles(reading, finished);

        renderReadingFn = () => {
          readingList.innerHTML = '';
          readingList.className = viewMode === 'list' ? 'books-list' : 'books-grid';
          if (!reading.length) { showEmpty(readingList, 'reading-empty', 'Nothing in progress.'); return; }
          reading.forEach(b => {
            if (viewMode === 'list') {
              const row = makeBookListRow(b);
              row.addEventListener('click', () => { let ov; const c = renderReading(b, row, () => ov?.remove()); ov = createBookModal(c); c.querySelector('.page-input:not(.page-total)')?.select(); });
              readingList.appendChild(row);
            } else {
              const cell = makeBookCoverCell(b);
              attachReadingCell(cell, b);
              readingList.appendChild(cell);
            }
          });
        };
        renderReadingFn();

        reRenderFinishedFn = setupFinishedSort(
          finished,
          (cell, b) => attachFinishedCell(cell, b),
          (row,  b) => { row.addEventListener('click', () => { let ov; const c = renderFinished(b, row, () => ov?.remove()); ov = createBookModal(c); }); }
        );
      } else {
        document.getElementById('add-book-card').style.display = 'none';

        const target = await getProfileByUsername(viewUser);
        if (target) {
          document.getElementById('page-title').innerHTML = `<a href="../profile/?u=${encodeURIComponent(target.username)}" style="color:var(--accent);text-decoration:none">${esc(target.username)}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>library<span class="title-dot">.</span>`;
          const { reading, finished } = sortBooks(await getBooks(target.uid));
          allBooks = [...reading, ...finished];
          setTitles(reading, finished);

          renderReadingFn = () => {
            readingList.innerHTML = '';
            readingList.className = viewMode === 'list' ? 'books-list' : 'books-grid';
            if (!reading.length) { showEmpty(readingList, 'reading-empty', 'Nothing in progress.'); return; }
            reading.forEach(b => {
              if (viewMode === 'list') {
                const row = makeBookListRow(b);
                row.addEventListener('click', () => createBookModal(renderReadingView(b)));
                readingList.appendChild(row);
              } else {
                const cell = makeBookCoverCell(b);
                cell.addEventListener('click', () => createBookModal(renderReadingView(b)));
                readingList.appendChild(cell);
              }
            });
          };
          renderReadingFn();

          reRenderFinishedFn = setupFinishedSort(
            finished,
            (cell, b) => cell.addEventListener('click', () => createBookModal(renderFinishedView(b))),
            (row,  b) => { row.addEventListener('click', () => createBookModal(renderFinishedView(b))); }
          );
        }
      }
      if (readingList.querySelector('[data-title]') || finishedList.querySelector('[data-title]')) {
        const filterWrap  = document.getElementById('library-filter-wrap');
        const filterInput = document.getElementById('library-filter');
        const gridBtn     = document.getElementById('view-grid-btn');
        const listBtn     = document.getElementById('view-list-btn');
        filterWrap.style.display = '';

        const activeFilters = { format: new Set(), language: new Set(), country: new Set(), lists: new Set() };

        const filterDropdownBtn = document.getElementById('filter-dropdown-btn');
        const filterDropdown    = document.getElementById('filter-dropdown');

        function applyFilter() {
          const q = filterInput.value.trim().toLowerCase();
          [readingList, finishedList].forEach(container => {
            container.querySelectorAll('[data-title]').forEach(el => {
              let show = !q || el.dataset.title.includes(q) || el.dataset.author.includes(q);
              if (show && activeFilters.format.size)   show = activeFilters.format.has(el.dataset.format || '');
              if (show && activeFilters.language.size) show = activeFilters.language.has(el.dataset.language || '');
              if (show && activeFilters.country.size)  show = activeFilters.country.has(el.dataset.country || '');
              if (show && activeFilters.lists.size) {
                const bookLists = (el.dataset.lists || '').split(',').filter(Boolean);
                show = bookLists.some(l => activeFilters.lists.has(l));
              }
              el.style.display = show ? '' : 'none';
              el.classList.toggle('hidden', !show);
            });
          });
          const total = Object.values(activeFilters).reduce((n, s) => n + s.size, 0);
          filterDropdownBtn.textContent = total ? `Filters (${total})` : 'Filters';
          filterDropdownBtn.style.color = total ? 'var(--accent)' : '';
        }
        filterInput.addEventListener('input', applyFilter);

        // Dropdown open/close
        const pageContent = document.querySelector('.page-content');
        function closeFilterDropdown() {
          filterDropdown.style.display = 'none';
          pageContent.style.paddingBottom = '';
        }
        filterDropdownBtn.addEventListener('click', e => {
          e.stopPropagation();
          const opening = filterDropdown.style.display === 'none';
          if (!opening) { closeFilterDropdown(); return; }
          filterDropdown.style.display = '';
          requestAnimationFrame(() => {
            const rect = filterDropdown.getBoundingClientRect();
            const overflow = rect.bottom - window.innerHeight + 16;
            if (overflow > 0) {
              pageContent.style.paddingBottom = overflow + 'px';
              filterDropdown.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          });
        });
        document.addEventListener('click', closeFilterDropdown);
        filterDropdown.addEventListener('click', e => e.stopPropagation());

        function addSection(heading, key, entries) {
          if (!entries.length) return;
          entries = [...entries].sort((a, b) => (b.count ?? 0) - (a.count ?? 0));
          const section = document.createElement('div');
          const hdr = document.createElement('div');
          hdr.style.cssText = 'font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;padding:.4rem .75rem .2rem';
          hdr.textContent = heading;
          section.appendChild(hdr);
          entries.forEach(({ val, label, count }) => {
            const row = document.createElement('label');
            row.style.cssText = 'display:flex;align-items:center;gap:.5rem;padding:.3rem .75rem;cursor:pointer;font-size:.85rem';
            row.addEventListener('mouseenter', () => row.style.background = 'var(--bg-alt)');
            row.addEventListener('mouseleave', () => row.style.background = '');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.style.accentColor = 'var(--accent)';
            cb.addEventListener('change', () => {
              if (cb.checked) activeFilters[key].add(val);
              else activeFilters[key].delete(val);
              applyFilter();
            });
            const countEl = document.createElement('span');
            countEl.style.cssText = 'margin-left:auto;font-size:.78rem;color:var(--text-muted)';
            countEl.textContent = count != null ? `(${count})` : '';
            row.append(cb, document.createTextNode(label), countEl);
            section.appendChild(row);
          });
          if (filterDropdown.children.length) {
            const div = document.createElement('div');
            div.style.cssText = 'border-top:1px solid var(--border);margin:.3rem 0';
            filterDropdown.appendChild(div);
          }
          filterDropdown.appendChild(section);
        }

        const formats   = [...new Set(allBooks.map(b => b.format).filter(Boolean))].sort();
        const languages = [...new Set(allBooks.map(b => b.language).filter(Boolean))].sort();
        const countries = [...new Set(allBooks.map(b => b.country).filter(Boolean))].sort();

        addSection('Format',   'format',   formats.map(v => ({ val: v.toLowerCase(), label: v, count: allBooks.filter(b => b.format === v).length })));
        addSection('Language', 'language', languages.map(v => ({ val: v.toLowerCase(), label: v, count: allBooks.filter(b => b.language === v).length })));
        const countryEntries = countries.map(v => ({ val: v.toLowerCase(), label: v, count: allBooks.filter(b => b.country === v).length }));
        const noCountryCount = allBooks.filter(b => !b.country).length;
        if (noCountryCount > 0) countryEntries.push({ val: '', label: 'No country', count: noCountryCount });
        addSection('Country',  'country',  countryEntries);

        if (isOwn && allLists.length) {
          const libraryGbids = new Set(allBooks.map(b => b.gbid).filter(Boolean));
          const relevantLists = allLists.filter(l => (l.books || []).some(b => b.gbid && libraryGbids.has(b.gbid)));
          addSection('Lists', 'lists', relevantLists.map(l => ({ val: l.id, label: l.name, count: (l.books || []).filter(b => b.gbid && libraryGbids.has(b.gbid)).length })));
        }

        if (!filterDropdown.children.length) filterDropdownBtn.style.display = 'none';

        const preCountry = params.get('country');
        if (preCountry) {
          activeFilters.country.add(preCountry);
          const cb = [...filterDropdown.querySelectorAll('input[type=checkbox]')]
            .find(el => el.closest('label')?.textContent.trim().toLowerCase().startsWith(preCountry));
          if (cb) cb.checked = true;
          applyFilter();
        }

        function updateToggleUI() {
          gridBtn.style.opacity = viewMode === 'grid' ? '1' : '0.45';
          listBtn.style.opacity = viewMode === 'list' ? '1' : '0.45';
        }
        updateToggleUI();

        gridBtn.addEventListener('click', () => {
          if (viewMode === 'grid') return;
          viewMode = 'grid';
          localStorage.setItem('library-view', 'grid');
          updateToggleUI();
          renderReadingFn();
          reRenderFinishedFn?.();
          applyFilter();
        });
        listBtn.addEventListener('click', () => {
          if (viewMode === 'list') return;
          viewMode = 'list';
          localStorage.setItem('library-view', 'list');
          updateToggleUI();
          renderReadingFn();
          reRenderFinishedFn?.();
          applyFilter();
        });
      }
    } finally {
      document.body.classList.remove('auth-loading');
    }

    if (isOwn) {
    // ── Add book form ──────────────────────────────────────────────────────────
    const toggle      = document.getElementById('add-book-toggle');
    const form        = document.getElementById('add-book-form');
    const cancelBtn   = document.getElementById('cancel-btn');
    const saveBtn     = document.getElementById('save-btn');
    const searchInput = document.getElementById('book-search');
    const suggestBox  = document.getElementById('book-suggestions');

    let selectedBook = null;
    let searchTimer;
    function setAddEnabled(on) {
      saveBtn.disabled     = !on;
      finishedBtn.disabled = !on;
    }

    function resetForm() {
      searchInput.value        = '';
      suggestBox.innerHTML     = '';
      suggestBox.style.display = 'none';
      selectedBook = null;
      setAddEnabled(false);
      // Restore form to initial state in case we were in the "Already read" rating step
      const searchWrap = document.getElementById('book-search-wrap');
      const fields     = form.querySelector('.add-book-fields');
      const actions    = form.querySelector('.add-book-actions');
      searchWrap.style.display = '';
      [...fields.children].forEach(el => { if (el !== searchWrap) el.remove(); });
      actions.innerHTML = '';
      actions.append(cancelBtn, finishedBtn, saveBtn);
    }

    function closeForm() { form.hidden = true; toggle.hidden = false; resetForm(); }

    toggle.addEventListener('click', () => { form.hidden = false; toggle.hidden = true; searchInput.focus(); });
    cancelBtn.addEventListener('click', closeForm);

    document.addEventListener('click', e => {
      if (!document.getElementById('book-search-wrap').contains(e.target)) {
        suggestBox.style.display = 'none';
      }
    });

    searchInput.addEventListener('input', () => {
      selectedBook = null;
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 3) { suggestBox.innerHTML = ''; suggestBox.style.display = 'none'; return; }
      searchTimer = setTimeout(() => fetchSuggestions(q), 250);
    });

    function showToast(msg) {
      let t = document.getElementById('global-toast');
      if (!t) { t = document.createElement('div'); t.id = 'global-toast'; t.className = 'global-toast'; document.body.appendChild(t); }
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('visible'), 5000);
    }

    async function fetchSuggestions(q) {
      try {
        const res = await fetch(HARDCOVER_PROXY, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `query Search($q: String!) {
              search(query: $q, query_type: "Book", per_page: 10) { results }
            }`,
            variables: { q }
          })
        });
        if (res.status === 429) { showToast('Our servers are busy - give it a moment and try again.'); return; }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const hits = data.data?.search?.results?.hits || [];
        const seen = new Set();
        const items = hits.map(h => h.document).filter(doc => {
          const author = Array.isArray(doc.author_names) ? (doc.author_names[0] || '') : (doc.author_names || '');
          const key = `${(doc.title || '').toLowerCase()}||${author.toLowerCase()}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        }).slice(0, 8);
        renderSuggestions(items);
      } catch (err) {
        console.error('Book search failed:', err);
      }
    }

    function showManualEntryForm(prefill) {
      suggestBox.innerHTML = '';
      suggestBox.style.display = '';

      const wrap = document.createElement('div');
      wrap.style.cssText = 'padding:.625rem .75rem;display:flex;flex-direction:column;gap:.4rem';

      const mkRow = (labelText, inp) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:.5rem';
        const lbl = document.createElement('label');
        lbl.style.cssText = 'font-size:.75rem;color:var(--text-muted);min-width:80px';
        lbl.textContent = labelText;
        row.append(lbl, inp);
        return row;
      };

      const titleInp = document.createElement('input');
      titleInp.type = 'text'; titleInp.value = prefill; titleInp.placeholder = 'Required';
      titleInp.className = 'page-input'; titleInp.style.cssText = 'flex:1;font-size:.85rem';

      const authorInp = document.createElement('input');
      authorInp.type = 'text'; authorInp.placeholder = 'Optional';
      authorInp.className = 'page-input'; authorInp.style.cssText = 'flex:1;font-size:.85rem';

      const pagesInp = document.createElement('input');
      pagesInp.type = 'number'; pagesInp.min = '0'; pagesInp.placeholder = 'Optional';
      pagesInp.className = 'page-input'; pagesInp.style.cssText = 'flex:1;font-size:.85rem';

      const yearInp = document.createElement('input');
      yearInp.type = 'number'; yearInp.min = '0'; yearInp.placeholder = 'Optional';
      yearInp.className = 'page-input'; yearInp.style.cssText = 'flex:1;font-size:.85rem';

      const btns = document.createElement('div');
      btns.style.cssText = 'display:flex;gap:.5rem;margin-top:.2rem';
      const addBtn = document.createElement('button');
      addBtn.type = 'button'; addBtn.className = 'join-club-btn'; addBtn.style.cssText = 'flex:1;font-size:.82rem';
      addBtn.textContent = 'Add to library';
      const cancelBtn2 = document.createElement('button');
      cancelBtn2.type = 'button'; cancelBtn2.className = 'btn-update'; cancelBtn2.style.cssText = 'font-size:.82rem';
      cancelBtn2.textContent = 'Cancel';
      btns.append(addBtn, cancelBtn2);

      wrap.append(
        mkRow('Title', titleInp),
        mkRow('Author', authorInp),
        mkRow('Pages', pagesInp),
        mkRow('Year', yearInp),
        btns
      );
      suggestBox.appendChild(wrap);
      titleInp.focus();

      addBtn.addEventListener('mousedown', e => e.preventDefault());
      addBtn.addEventListener('click', () => {
        const title = titleInp.value.trim();
        if (!title) { titleInp.style.outline = '1px solid var(--danger, #d44)'; return; }
        selectedBook = {
          title,
          author: authorInp.value.trim(),
          pages: parseInt(pagesInp.value) || 0,
          gbid: '',
          cover: '',
          releaseYear: (() => { const y = parseInt(yearInp.value, 10); return y >= 1000 && y <= 2100 ? y : null; })(),
        };
        searchInput.value        = title;
        suggestBox.innerHTML     = '';
        suggestBox.style.display = 'none';
        setAddEnabled(true);
      });

      cancelBtn2.addEventListener('mousedown', e => e.preventDefault());
      cancelBtn2.addEventListener('click', () => {
        suggestBox.innerHTML     = '';
        suggestBox.style.display = 'none';
      });
    }

    function renderSuggestions(items) {
      suggestBox.innerHTML = '';
      if (!items.length) {
        suggestBox.style.display = '';
        const prompt = document.createElement('div');
        prompt.className = 'book-suggestion-item';
        prompt.style.cssText = 'font-size:.85rem;color:var(--text-muted);padding:.6rem .75rem;cursor:pointer';
        prompt.textContent = `No results - add "${searchInput.value.trim()}" manually`;
        prompt.addEventListener('mousedown', e => { e.preventDefault(); showManualEntryForm(searchInput.value.trim()); });
        suggestBox.appendChild(prompt);
        return;
      }

      items.forEach(doc => {
        const title       = doc.title || '';
        const author      = Array.isArray(doc.author_names) ? doc.author_names[0] : doc.author_names || '';
        const pages       = doc.pages || 0;
        const cover       = doc.image?.url || '';
        const slug        = doc.slug || String(doc.id);
        const releaseYear = (() => { const y = parseInt(doc.release_year, 10); return y >= 1000 && y <= 2100 ? y : null; })();

        const el = document.createElement('div');
        el.className = 'book-suggestion-item';

        const img  = cover
          ? `<img class="suggestion-cover" src="${cover}" alt="">`
          : `<div class="suggestion-cover-placeholder"></div>`;
        const meta = author ? `by ${esc(author)}` : '';

        el.innerHTML = `<div class="suggestion-inner">${img}<div><div class="suggestion-title">${esc(title)}</div><div class="suggestion-meta">${meta}</div></div></div>`;

        el.addEventListener('mousedown', e => {
          e.preventDefault();
          el.style.background = 'var(--accent)';
          el.style.color      = '#fff';
          setTimeout(() => {
            selectedBook             = { title, author, pages, gbid: slug, cover, releaseYear };
            searchInput.value        = title;
            suggestBox.innerHTML     = '';
            suggestBox.style.display = 'none';
            setAddEnabled(true);
            // Background country fetch — overrides first, then Wikidata
            if (author) {
              const capturedBook = selectedBook;
              capturedBook._countryFetch = (async () => {
                try {
                  const overrides   = await getOverrides();
                  const overrideKey = author.toLowerCase().trim();
                  if (overrides[overrideKey]) {
                    capturedBook.country = overrides[overrideKey];
                    return;
                  }
                  const base = 'https://www.wikidata.org/w/api.php';
                  const sr = await fetch(`${base}?action=wbsearchentities&search=${encodeURIComponent(author)}&language=en&type=item&format=json&origin=*&limit=1`);
                  if (!sr.ok) return;
                  const sd = await sr.json();
                  const qid = sd.search?.[0]?.id;
                  if (!qid) return;
                  const er = await fetch(`${base}?action=wbgetentities&ids=${qid}&props=claims&format=json&origin=*`);
                  if (!er.ok) return;
                  const ed = await er.json();
                  const p27 = ed.entities?.[qid]?.claims?.P27 || [];
                  const bestP27 = p27.find(c => c.rank === 'preferred') || p27.find(c => c.rank === 'normal') || p27[0];
                  const countryQid = bestP27?.mainsnak?.datavalue?.value?.id;
                  if (!countryQid) return;
                  const lr = await fetch(`${base}?action=wbgetentities&ids=${countryQid}&props=labels&languages=en&format=json&origin=*`);
                  if (!lr.ok) return;
                  const ld = await lr.json();
                  const countryName = ld.entities?.[countryQid]?.labels?.en?.value;
                  if (countryName) capturedBook.country = normalizeCountry(countryName);
                } catch { /* silently ignore */ }
              })();
            }
          }, 150);
        });

        suggestBox.appendChild(el);
      });

      const manualPrompt = document.createElement('div');
      manualPrompt.className = 'book-suggestion-item';
      manualPrompt.style.cssText = 'font-size:.82rem;color:var(--text-muted);padding:.5rem .75rem;cursor:pointer;border-top:1px solid var(--border)';
      manualPrompt.textContent = 'Add manually…';
      manualPrompt.addEventListener('mousedown', e => { e.preventDefault(); showManualEntryForm(searchInput.value.trim()); });
      suggestBox.appendChild(manualPrompt);

      suggestBox.style.display = 'block';
    }

    const finishedBtn = document.getElementById('finished-btn');

    saveBtn.addEventListener('click', async () => {
      if (!selectedBook) return;
      saveBtn.disabled    = true;
      saveBtn.textContent = 'Adding…';
      if (selectedBook._countryFetch) {
        await Promise.race([selectedBook._countryFetch, new Promise(r => setTimeout(r, 5000))]);
      }
      const { title, author, pages, gbid, cover, releaseYear, country } = selectedBook;

      const id   = await addBook(user.uid, { title, author, totalPages: pages, gbid, coverUrl: cover, releaseYear, country }, profile.username);
      const book = { id, title, author, totalPages: pages, currentPage: 0, status: 'reading', gbid, coverUrl: cover, releaseYear, country, addedAt: { toDate: () => new Date() }, addedAtPrecision: 'day' };

      allBooks.push(book);
      document.getElementById('reading-empty')?.remove();
      if (viewMode === 'list') {
        const newRow = makeBookListRow(book);
        newRow.addEventListener('click', () => { let ov; const c = renderReading(book, newRow, () => ov?.remove()); ov = createBookModal(c); c.querySelector('.page-input:not(.page-total)')?.select(); });
        readingList.prepend(newRow);
      } else {
        const newCell = makeBookCoverCell(book);
        attachReadingCell(newCell, book);
        readingList.prepend(newCell);
      }
      updateCounts();

      saveBtn.disabled    = false;
      saveBtn.textContent = 'Start reading';
      cancelBtn.click();
    });

    finishedBtn.addEventListener('click', () => {
      if (!selectedBook) return;
      const { title, author, pages, gbid, cover, releaseYear } = selectedBook;

      const fields     = form.querySelector('.add-book-fields');
      const actions    = form.querySelector('.add-book-actions');
      const searchWrap = document.getElementById('book-search-wrap');
      const origBtns   = [...actions.children];

      searchWrap.style.display = 'none';

      const ratingDiv = document.createElement('div');
      const titleLabel = document.createElement('div');
      titleLabel.style.cssText = 'font-size:.85rem;font-weight:600;margin-bottom:.5rem';
      titleLabel.textContent = title;
      const rateLabel = document.createElement('div');
      rateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin-bottom:.35rem';
      rateLabel.textContent = 'Rate this book (optional)';
      const picker = createStarPicker(0);
      const ta = document.createElement('textarea');
      ta.className = 'review-input'; ta.placeholder = 'Write a review… (optional)'; ta.rows = 3;
      const startedLabel = document.createElement('div');
      startedLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.5rem 0 .25rem';
      startedLabel.textContent = 'Date started (optional)';
      const startedPicker = createPartialDatePicker(null, null);
      const dateLabel = document.createElement('div');
      dateLabel.style.cssText = 'font-size:.8rem;color:var(--text-muted);margin:.5rem 0 .25rem';
      dateLabel.textContent = 'Date finished (optional)';
      const datePicker = createPartialDatePicker(null, null);
      ratingDiv.append(titleLabel, rateLabel, picker, ta, startedLabel, startedPicker, dateLabel, datePicker);
      fields.appendChild(ratingDiv);

      actions.innerHTML = '';
      const backBtn    = document.createElement('button');
      backBtn.type = 'button'; backBtn.className = 'btn-update'; backBtn.textContent = 'Back';
      const confirmBtn = document.createElement('button');
      confirmBtn.type = 'button'; confirmBtn.className = 'join-club-btn'; confirmBtn.textContent = 'Add to finished';
      actions.append(backBtn, confirmBtn);

      backBtn.addEventListener('click', () => {
        ratingDiv.remove();
        searchWrap.style.display = '';
        actions.innerHTML = '';
        origBtns.forEach(b => actions.appendChild(b));
      });

      confirmBtn.addEventListener('click', async () => {
        confirmBtn.disabled = true; confirmBtn.textContent = 'Adding…';
        if (selectedBook._countryFetch) {
          await Promise.race([selectedBook._countryFetch, new Promise(r => setTimeout(r, 5000))]);
        }
        const country = selectedBook.country;
        const rating = picker.getValue();
        const review = ta.value.trim() || null;
        const { date: addedAt,    precision: startedPrec  } = startedPicker.getDate();
        const { date: finishedAt, precision: finishedPrec } = datePicker.getDate();

        // Match by gbid first, then fall back to title for books added before gbid was tracked
        const existingFinished =
          (gbid   && allBooks.find(b => b.gbid  === gbid                             && b.status === 'finished')) ||
          (title  && allBooks.find(b => b.title?.toLowerCase() === title.toLowerCase() && b.status === 'finished'));
        if (existingFinished) {
          const finishedAtDate = finishedAt || new Date();
          const finishedAtDatePrec = finishedAt ? finishedPrec : 'day';
          await finishBook(user.uid, existingFinished.id, { title: existingFinished.title, author: existingFinished.author, gbid: existingFinished.gbid, rating, review, coverUrl: existingFinished.coverUrl, startedAt: addedAt, startedAtPrecision: startedPrec, finishedAt: finishedAtDate, finishedAtPrecision: finishedAtDatePrec }, profile.username);
          existingFinished.status = 'finished';
          existingFinished.rating = rating;
          existingFinished.review = review;
          existingFinished.reads  = (existingFinished.reads || []).concat([{ startedAt: addedAt ? { toDate: () => addedAt } : null, startedAtPrecision: addedAt ? startedPrec : null, finishedAt: { toDate: () => finishedAtDate }, finishedAtPrecision: finishedAtDatePrec, rating, review }]);
          readingList.querySelector(`[data-gbid="${gbid}"]`)?.remove();
          finishedList.querySelector(`[data-title="${existingFinished.title.toLowerCase()}"]`)?.remove();
          document.getElementById('finished-empty')?.remove();
          if (viewMode === 'list') {
            const newRow = makeBookListRow(existingFinished);
            newRow.addEventListener('click', () => { let ov; const c = renderFinished(existingFinished, newRow, () => ov?.remove()); ov = createBookModal(c); });
            finishedList.prepend(newRow);
          } else {
            const newCell = makeBookCoverCell(existingFinished);
            attachFinishedCell(newCell, existingFinished);
            finishedList.prepend(newCell);
          }
          updateCounts();
        } else {
          const id = await addFinishedBook(user.uid, {
            title, author, totalPages: pages, gbid, coverUrl: cover, rating, review, releaseYear, country,
            finishedAt, finishedAtPrecision: finishedAt ? finishedPrec : undefined,
            addedAt,    addedAtPrecision:    addedAt    ? startedPrec  : undefined
          }, profile.username);
          const book = {
            id, title, author, totalPages: pages, currentPage: pages, status: 'finished',
            coverUrl:            cover,
            addedAt:             addedAt    ? { toDate: () => addedAt }    : { toDate: () => new Date() },
            addedAtPrecision:    addedAt    ? startedPrec  : null,
            finishedAt:          finishedAt ? { toDate: () => finishedAt } : null,
            finishedAtPrecision: finishedAt ? finishedPrec : null,
            gbid, rating, review, releaseYear, country,
            reads: [{ startedAt: addedAt ? { toDate: () => addedAt } : null, startedAtPrecision: addedAt ? startedPrec : null, finishedAt: finishedAt ? { toDate: () => finishedAt } : { toDate: () => new Date() }, finishedAtPrecision: finishedAt ? finishedPrec : null, rating, review }],
          };
          allBooks.push(book);
          document.getElementById('finished-empty')?.remove();
          if (viewMode === 'list') {
            const newRow = makeBookListRow(book);
            newRow.addEventListener('click', () => { let ov; const c = renderFinished(book, newRow, () => ov?.remove()); ov = createBookModal(c); });
            finishedList.prepend(newRow);
          } else {
            const newCell = makeBookCoverCell(book);
            attachFinishedCell(newCell, book);
            finishedList.prepend(newCell);
          }
          updateCounts();
        }
        closeForm();
      });
    });
    } // end if (isOwn)
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
