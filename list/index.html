<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  
  
  
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" crossorigin>
  <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>list - paperbackd</title>
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="/feed/">paperbackd<span class="title-dot">.</span></a>
      <nav class="desktop-nav">
        <a href="../feed/" data-nav="feed">feed</a>
        <a href="../search/"   data-nav="search">search</a>
        <a href="../library/"  data-nav="library">library</a>
        <a href="../profile/"  data-nav="profile">profile</a>
        <a href="../stats/"    data-nav="stats">stats</a>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <h1 class="page-title" id="page-title">lists<span class="title-dot">.</span></h1>
    <div id="list-header"></div>
    <div id="list-add" style="display:none"></div>

    <div id="list-filter-wrap" style="display:none;margin-bottom:.625rem">
      <div style="display:flex;gap:.5rem;align-items:center">
        <input type="text" id="list-filter" class="join-club-input" placeholder="Filter list…" autocomplete="off" spellcheck="false" style="flex:1;min-width:0;box-sizing:border-box">
        <button id="view-grid-btn" class="btn-update" title="Grid view" style="padding:.35rem .5rem;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></button>
        <button id="view-list-btn" class="btn-update" title="List view" style="padding:.35rem .5rem;flex-shrink:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"/></svg></button>
      </div>
    </div>

    <div class="section-header" id="sort-header" style="display:none;margin-bottom:.5rem">
      <div id="list-sort" class="sort-options">
        <button class="sort-btn" data-key="order"  data-default="asc" data-label="Added">Added</button>
        <button class="sort-btn" data-key="alpha"  data-default="asc" data-label="A–Z">A–Z</button>
        <button class="sort-btn" data-key="author" data-default="asc" data-label="Author">Author</button>
      </div>
    </div>

    <div id="list-books" class="books-grid"></div>
  </main>

  <nav class="mobile-nav">
    <a class="mobile-nav-item" href="../feed/" data-nav="feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      feed
    </a>
    <a class="mobile-nav-item" href="../search/" data-nav="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      search
    </a>
    <a class="mobile-nav-item" href="../library/" data-nav="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
      </svg>
      library
    </a>
    <a class="mobile-nav-item" href="../profile/" data-nav="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      profile
    </a>
    <a class="mobile-nav-item" href="../stats/" data-nav="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="13" width="4" height="7" rx="0.5"/>
        <rect x="10" y="3" width="4" height="17" rx="0.5"/>
        <rect x="17" y="9" width="4" height="11" rx="0.5"/>
      </svg>
      stats
    </a>
  </nav>

  <script src="../js/main.js"></script>
  <script>document.body.classList.add('auth-loading');</script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getProfileByUsername, getLists, addBookToList, removeBookFromList, deleteList, renameList, getBooks } from '../js/firebase.js';

    const HARDCOVER_PROXY = 'https://frosty-paper-e53b.phixel66.workers.dev/';

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let viewMode = localStorage.getItem('list-view') || 'grid';

    (async () => {
      const { user } = await requireAuth();
      const params   = new URLSearchParams(location.search);
      const listId   = params.get('id');
      const targetU  = params.get('u')?.toLowerCase();
      const isOwn    = !targetU;

      let ownerUid, ownerUsername;
      if (isOwn) {
        const { profile } = await (await import('../js/auth.js')).requireAuth();
        ownerUid      = user.uid;
        ownerUsername = profile.username;
      } else {
        const target = await getProfileByUsername(targetU);
        if (!target) {
          document.getElementById('list-books').innerHTML = '<p style="color:var(--text-muted)">User not found.</p>';
          document.body.classList.remove('auth-loading');
          return;
        }
        ownerUid      = target.uid;
        ownerUsername = target.username;

      }

      const listsHref = isOwn ? `../lists/` : `../lists/?u=${encodeURIComponent(ownerUsername)}`;
      document.getElementById('page-title').innerHTML =
        `<a href="${listsHref}" style="color:var(--accent);text-decoration:none">${ownerUsername}</a><span style="color:var(--text-muted);font-weight:400;margin:0 .3em">//</span>lists<span class="title-dot">.</span>`;

      const [lists, libBooks] = await Promise.all([
        getLists(ownerUid),
        getBooks(ownerUid),
      ]);
      const libraryCovers = {};
      for (const b of libBooks) { if (b.gbid && b.coverUrl) libraryCovers[b.gbid] = b.coverUrl; }

      const list  = lists.find(l => l.id === listId);

      if (!list) {
        document.getElementById('list-books').innerHTML = '<p style="color:var(--text-muted)">List not found.</p>';
        document.body.classList.remove('auth-loading');
        return;
      }

      document.title = `${ownerUsername} // lists. - paperbackd`;
      let books = [...(list.books || [])];

      // ── Header ───────────────────────────────────────────────────────────────
      const headerEl = document.getElementById('list-header');

      function renderHeader() {
        headerEl.innerHTML = '';
        const card = document.createElement('div');
        card.className = 'card';
        card.style.marginBottom = '.625rem';

        if (isOwn && !list.isDefault && !list.isDnf) {
          card.innerHTML = `<div style="display:flex;align-items:center;gap:.5rem">
            <div id="list-title-display" style="font-size:1.1rem;font-weight:700;flex:1">${esc(list.name)}</div>
            <button class="btn-update" id="rename-btn" style="font-size:.75rem;padding:.25rem .6rem">Rename</button>
            <button class="btn-danger" id="delete-btn" style="font-size:.75rem;padding:.25rem .6rem">Delete</button>
          </div>`;
          headerEl.appendChild(card);

          card.querySelector('#rename-btn').addEventListener('click', () => {
            card.innerHTML = `<div style="display:flex;align-items:center;gap:.5rem">
              <input id="rename-input" class="join-club-input" value="${esc(list.name)}" style="flex:1;font-size:.875rem" maxlength="60">
              <button class="join-club-btn" id="rename-save" style="font-size:.8rem;padding:.35rem .75rem">Save</button>
              <button class="btn-update" id="rename-cancel" style="font-size:.8rem;padding:.35rem .75rem">Cancel</button>
            </div>`;
            const inp = card.querySelector('#rename-input');
            inp.focus(); inp.select();
            card.querySelector('#rename-cancel').addEventListener('click', renderHeader);
            card.querySelector('#rename-save').addEventListener('click', async () => {
              const name = inp.value.trim();
              if (!name) return;
              await renameList(user.uid, list.id, name);
              list.name = name;
              document.title = `${ownerUsername} // lists. - paperbackd`;
              renderHeader();
            });
            inp.addEventListener('keydown', e => { if (e.key === 'Enter') card.querySelector('#rename-save').click(); });
          });

          card.querySelector('#delete-btn').addEventListener('click', async () => {
            if (!confirm(`Delete "${list.name}"?`)) return;
            await deleteList(user.uid, list.id);
            location.replace(`../profile/`);
          });
        } else {
          card.innerHTML = `<div style="font-size:1.1rem;font-weight:700">${esc(list.name)}</div>
            ${!isOwn ? `<div style="font-size:.8rem;color:var(--text-muted);margin-top:.2rem">${esc(ownerUsername)}'s list</div>` : ''}`;
          headerEl.appendChild(card);
        }
      }
      renderHeader();

      // ── Add search (own only) ─────────────────────────────────────────────────
      if (isOwn) {
        const addEl = document.getElementById('list-add');
        addEl.style.display = '';
        addEl.innerHTML = `<div class="card" style="margin-bottom:.625rem">
          <div class="book-search-wrap">
            <input type="text" id="list-search" class="join-club-input"
              placeholder="Search to add a book…" autocomplete="off" spellcheck="false"
              style="width:100%;box-sizing:border-box">
            <div id="list-suggestions" class="book-suggestions" style="display:none"></div>
          </div>
        </div>`;

        const searchInput = addEl.querySelector('#list-search');
        const suggestBox  = addEl.querySelector('#list-suggestions');
        let searchTimer;

        function showToast(msg) {
          let t = document.getElementById('global-toast');
          if (!t) { t = document.createElement('div'); t.id = 'global-toast'; t.className = 'global-toast'; document.body.appendChild(t); }
          t.textContent = msg;
          t.classList.add('visible');
          clearTimeout(t._timer);
          t._timer = setTimeout(() => t.classList.remove('visible'), 5000);
        }

        searchInput.addEventListener('input', () => {
          clearTimeout(searchTimer);
          const q = searchInput.value.trim();
          if (q.length < 2) { suggestBox.style.display = 'none'; return; }
          searchTimer = setTimeout(async () => {
            try {
              const res  = await fetch(HARDCOVER_PROXY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  query: `query Search($q: String!) { search(query: $q, query_type: "Book", per_page: 8, page: 1) { results } }`,
                  variables: { q }
                })
              });
              if (res.status === 429) { showToast('Our servers are busy — give it a moment and try again.'); return; }
              const data = res.ok ? await res.json() : {};
              const hits = data?.data?.search?.results?.hits || [];
              suggestBox.innerHTML = '';
              if (!hits.length) {
                suggestBox.style.display = '';
                const prompt = document.createElement('div');
                prompt.className = 'book-suggestion-item';
                prompt.style.cssText = 'font-size:.85rem;color:var(--text-muted);padding:.6rem .75rem;cursor:pointer';
                prompt.textContent = `No results - add "${q}" manually`;
                prompt.addEventListener('click', () => {
                  suggestBox.innerHTML = '';
                  const wrap = document.createElement('div');
                  wrap.style.cssText = 'padding:.625rem .75rem;display:flex;flex-direction:column;gap:.4rem';

                  const mkRow = (labelText, inp) => {
                    const row = document.createElement('div');
                    row.style.cssText = 'display:flex;align-items:center;gap:.5rem';
                    const lbl = document.createElement('label');
                    lbl.style.cssText = 'font-size:.75rem;color:var(--text-muted);min-width:60px';
                    lbl.textContent = labelText;
                    row.append(lbl, inp);
                    return row;
                  };

                  const titleInp = document.createElement('input');
                  titleInp.type = 'text'; titleInp.value = q; titleInp.placeholder = 'Required';
                  titleInp.className = 'join-club-input'; titleInp.style.cssText = 'flex:1;font-size:.85rem';

                  const authorInp = document.createElement('input');
                  authorInp.type = 'text'; authorInp.placeholder = 'Optional';
                  authorInp.className = 'join-club-input'; authorInp.style.cssText = 'flex:1;font-size:.85rem';

                  const btns = document.createElement('div');
                  btns.style.cssText = 'display:flex;gap:.5rem;margin-top:.2rem';
                  const addBtn = document.createElement('button');
                  addBtn.type = 'button'; addBtn.className = 'join-club-btn'; addBtn.style.cssText = 'flex:1;font-size:.82rem';
                  addBtn.textContent = 'Add to list';
                  const cancelBtn = document.createElement('button');
                  cancelBtn.type = 'button'; cancelBtn.className = 'btn-update'; cancelBtn.style.cssText = 'font-size:.82rem';
                  cancelBtn.textContent = 'Cancel';
                  btns.append(addBtn, cancelBtn);

                  wrap.append(mkRow('Title', titleInp), mkRow('Author', authorInp), btns);
                  suggestBox.appendChild(wrap);
                  titleInp.focus();

                  addBtn.addEventListener('click', async () => {
                    const title = titleInp.value.trim();
                    if (!title) { titleInp.style.outline = '1px solid var(--danger, #d44)'; return; }
                    const author = authorInp.value.trim();
                    suggestBox.style.display = 'none';
                    searchInput.value = '';
                    await addBookToList(user.uid, list.id, { gbid: '', title, author, coverUrl: '' });
                    if (!books.find(b => b.title === title)) {
                      books = [...books, { gbid: '', title, author, coverUrl: '' }];
                      renderBooks();
                    }
                    const toast = document.createElement('div');
                    toast.textContent = `✓ ${title} added`;
                    toast.style.cssText = 'font-size:.8rem;color:var(--accent);margin-top:.4rem;font-weight:500';
                    searchInput.parentElement.appendChild(toast);
                    setTimeout(() => toast.remove(), 2000);
                  });

                  cancelBtn.addEventListener('click', () => { suggestBox.style.display = 'none'; });
                });
                suggestBox.appendChild(prompt);
                return;
              }
              hits.forEach(hit => {
                const doc      = hit.document || {};
                const gbid     = doc.slug || String(doc.id || '');
                const title    = doc.title || '';
                const author   = doc.author_names?.[0] || '';
                const coverUrl = doc.image?.url || '';
                if (!gbid || !title) return;
                const item = document.createElement('div');
                item.className = 'book-suggestion-item';
                item.innerHTML = `<div class="suggestion-inner">
                  ${coverUrl ? `<img class="suggestion-cover" src="${esc(coverUrl)}" alt="">` : '<div class="suggestion-cover" style="background:var(--border)"></div>'}
                  <div>
                    <div class="suggestion-title">${esc(title)}</div>
                    <div class="suggestion-meta">${esc(author)}</div>
                  </div>
                </div>`;
                item.addEventListener('click', async () => {
                  suggestBox.style.display = 'none';
                  searchInput.value = '';
                  await addBookToList(user.uid, list.id, { gbid, title, author, coverUrl });
                  if (!books.find(b => b.gbid === gbid)) {
                    books = [...books, { gbid, title, author, coverUrl }];
                    renderBooks();
                  }
                  const toast = document.createElement('div');
                  toast.textContent = `✓ ${title} added`;
                  toast.style.cssText = 'font-size:.8rem;color:var(--accent);margin-top:.4rem;font-weight:500';
                  searchInput.parentElement.appendChild(toast);
                  setTimeout(() => toast.remove(), 2000);
                });
                suggestBox.appendChild(item);
              });

              const manualPrompt = document.createElement('div');
              manualPrompt.className = 'book-suggestion-item';
              manualPrompt.style.cssText = 'font-size:.82rem;color:var(--text-muted);padding:.5rem .75rem;cursor:pointer;border-top:1px solid var(--border)';
              manualPrompt.textContent = 'Add manually…';
              manualPrompt.addEventListener('click', () => {
                suggestBox.innerHTML = '';
                const wrap = document.createElement('div');
                wrap.style.cssText = 'padding:.625rem .75rem;display:flex;flex-direction:column;gap:.4rem';

                const mkRow = (labelText, inp) => {
                  const row = document.createElement('div');
                  row.style.cssText = 'display:flex;align-items:center;gap:.5rem';
                  const lbl = document.createElement('label');
                  lbl.style.cssText = 'font-size:.75rem;color:var(--text-muted);min-width:60px';
                  lbl.textContent = labelText;
                  row.append(lbl, inp);
                  return row;
                };

                const titleInp = document.createElement('input');
                titleInp.type = 'text'; titleInp.value = q; titleInp.placeholder = 'Required';
                titleInp.className = 'join-club-input'; titleInp.style.cssText = 'flex:1;font-size:.85rem';

                const authorInp = document.createElement('input');
                authorInp.type = 'text'; authorInp.placeholder = 'Optional';
                authorInp.className = 'join-club-input'; authorInp.style.cssText = 'flex:1;font-size:.85rem';

                const btns = document.createElement('div');
                btns.style.cssText = 'display:flex;gap:.5rem;margin-top:.2rem';
                const addBtn = document.createElement('button');
                addBtn.type = 'button'; addBtn.className = 'join-club-btn'; addBtn.style.cssText = 'flex:1;font-size:.82rem';
                addBtn.textContent = 'Add to list';
                const cancelBtn = document.createElement('button');
                cancelBtn.type = 'button'; cancelBtn.className = 'btn-update'; cancelBtn.style.cssText = 'font-size:.82rem';
                cancelBtn.textContent = 'Cancel';
                btns.append(addBtn, cancelBtn);

                wrap.append(mkRow('Title', titleInp), mkRow('Author', authorInp), btns);
                suggestBox.appendChild(wrap);
                suggestBox.style.display = '';
                titleInp.focus();

                addBtn.addEventListener('click', async () => {
                  const title = titleInp.value.trim();
                  if (!title) { titleInp.style.outline = '1px solid var(--danger, #d44)'; return; }
                  const author = authorInp.value.trim();
                  suggestBox.style.display = 'none';
                  searchInput.value = '';
                  await addBookToList(user.uid, list.id, { gbid: '', title, author, coverUrl: '' });
                  if (!books.find(b => b.title === title)) {
                    books = [...books, { gbid: '', title, author, coverUrl: '' }];
                    renderBooks();
                  }
                  const toast = document.createElement('div');
                  toast.textContent = `✓ ${title} added`;
                  toast.style.cssText = 'font-size:.8rem;color:var(--accent);margin-top:.4rem;font-weight:500';
                  searchInput.parentElement.appendChild(toast);
                  setTimeout(() => toast.remove(), 2000);
                });

                cancelBtn.addEventListener('click', () => { suggestBox.style.display = 'none'; });
              });
              suggestBox.appendChild(manualPrompt);
              suggestBox.style.display = '';
            } catch (e) { console.error(e); }
          }, 280);
        });

        document.addEventListener('click', e => {
          if (!suggestBox.contains(e.target) && e.target !== searchInput) {
            suggestBox.style.display = 'none';
          }
        });
      }

      // ── Books ─────────────────────────────────────────────────────────────────
      const booksEl   = document.getElementById('list-books');
      const filterWrap = document.getElementById('list-filter-wrap');
      const filterInput = document.getElementById('list-filter');
      const sortHeader = document.getElementById('sort-header');
      const gridBtn    = document.getElementById('view-grid-btn');
      const listBtn    = document.getElementById('view-list-btn');

      let sortState = (() => { try { return JSON.parse(localStorage.getItem('list-sort')) || {}; } catch { return {}; } })();
      if (!sortState.key) sortState = { key: 'order', dir: 'asc' };

      const sortBtns = sortHeader.querySelectorAll('.sort-btn');

      function updateSortUI() {
        sortBtns.forEach(btn => {
          const active = btn.dataset.key === sortState.key;
          btn.classList.toggle('sort-btn-active', active);
          if (active) {
            btn.textContent = btn.dataset.key === 'alpha'
              ? (sortState.dir === 'asc' ? 'A–Z' : 'Z–A')
              : btn.dataset.key === 'author'
              ? (sortState.dir === 'asc' ? 'Author ↑' : 'Author ↓')
              : btn.dataset.label;
          } else {
            btn.textContent = btn.dataset.label;
          }
        });
      }

      function updateToggleUI() {
        gridBtn.style.opacity = viewMode === 'grid' ? '1' : '0.45';
        listBtn.style.opacity = viewMode === 'list' ? '1' : '0.45';
      }

      function applyFilter() {
        const q = filterInput.value.trim().toLowerCase();
        booksEl.querySelectorAll('[data-title]').forEach(el => {
          el.style.display = (!q || el.dataset.title.includes(q) || (el.dataset.author || '').includes(q)) ? '' : 'none';
        });
      }

      function makeBookCoverCell(book) {
        const cell = document.createElement('a');
        cell.className = 'library-cover-cell';
        cell.href = `../book/?gbid=${encodeURIComponent(book.gbid)}`;
        cell.dataset.title  = (book.title  || '').toLowerCase();
        cell.dataset.author = (book.author || '').toLowerCase();
        const cover = (book.gbid && libraryCovers[book.gbid]) || book.coverUrl;
        if (cover) {
          const img = document.createElement('img');
          img.src = cover; img.alt = '';
          cell.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'library-cover-placeholder';
          ph.textContent = '📖';
          cell.appendChild(ph);
        }
        const info = document.createElement('div');
        info.className = 'library-cover-info';
        const titleEl = document.createElement('div');
        titleEl.className = 'library-cover-title';
        titleEl.textContent = book.title;
        info.appendChild(titleEl);
        cell.appendChild(info);
        return cell;
      }

      function makeBookListRow(book) {
        const el = document.createElement('div');
        el.className = 'books-list-row';
        el.dataset.title  = (book.title  || '').toLowerCase();
        el.dataset.author = (book.author || '').toLowerCase();
        const author = book.author ? `<span style="color:var(--text-muted);font-weight:400"> · ${esc(book.author)}</span>` : '';
        const removeHtml = isOwn
          ? `<button class="btn-danger list-remove-btn" data-gbid="${esc(book.gbid)}" style="margin-left:.5rem;font-size:.72rem;padding:.2rem .5rem;flex-shrink:0">Remove</button>`
          : '';
        el.innerHTML = `<a href="../book/?gbid=${encodeURIComponent(book.gbid)}" style="flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.875rem;font-weight:600;color:inherit;text-decoration:none">${esc(book.title)}${author}</a>${removeHtml}`;
        if (isOwn) {
          el.querySelector('.list-remove-btn').addEventListener('click', async e => {
            e.preventDefault();
            await removeBookFromList(user.uid, list.id, book.gbid);
            books = books.filter(b => b.gbid !== book.gbid);
            renderBooks();
          });
        }
        return el;
      }

      const alphaKey = t => (t || '').replace(/^the\s+/i, '');

      function getSorted() {
        const { key, dir } = sortState;
        const asc = dir === 'asc';
        if (key === 'order') return asc ? [...books] : [...books].reverse();
        const sorted = [...books];
        if (key === 'alpha')  sorted.sort((a, b) => asc ? alphaKey(a.title).localeCompare(alphaKey(b.title)) : alphaKey(b.title).localeCompare(alphaKey(a.title)));
        if (key === 'author') sorted.sort((a, b) => asc ? (a.author||'').localeCompare(b.author||'') : (b.author||'').localeCompare(a.author||''));
        return sorted;
      }

      function renderBooks() {
        booksEl.innerHTML = '';
        booksEl.className = viewMode === 'list' ? 'books-list' : 'books-grid';

        if (!books.length) {
          booksEl.innerHTML = `<p style="color:var(--text-muted);font-size:.875rem">${isOwn ? 'Search above to add books.' : 'No books yet.'}</p>`;
          filterWrap.style.display = 'none';
          sortHeader.style.display = 'none';
          return;
        }

        filterWrap.style.display = '';
        sortHeader.style.display = '';
        updateSortUI();
        updateToggleUI();

        getSorted().forEach(book => {
          if (viewMode === 'list') {
            booksEl.appendChild(makeBookListRow(book));
          } else {
            booksEl.appendChild(makeBookCoverCell(book));
          }
        });

        applyFilter();
      }

      renderBooks();

      // Sort buttons
      sortBtns.forEach(btn => btn.addEventListener('click', () => {
        if (btn.dataset.key === sortState.key) {
          sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
        } else {
          sortState = { key: btn.dataset.key, dir: btn.dataset.default };
        }
        localStorage.setItem('list-sort', JSON.stringify(sortState));
        updateSortUI();
        renderBooks();
      }));

      // View toggle
      gridBtn.addEventListener('click', () => {
        if (viewMode === 'grid') return;
        viewMode = 'grid';
        localStorage.setItem('list-view', 'grid');
        renderBooks();
      });
      listBtn.addEventListener('click', () => {
        if (viewMode === 'list') return;
        viewMode = 'list';
        localStorage.setItem('list-view', 'list');
        renderBooks();
      });

      // Filter
      filterInput.addEventListener('input', applyFilter);

      document.body.classList.remove('auth-loading');
    })();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
